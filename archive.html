<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>文章归档 · 织星屿</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <style>
        /* 归档页额外样式 */
        .archive-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .archive-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 12px 28px var(--card-shadow);
        }
        .timeline {
            position: relative;
            padding-left: 2rem;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, #FB7299, transparent);
        }
        .timeline-year {
            position: relative;
            margin-bottom: 2rem;
        }
        .year-marker {
            position: absolute;
            left: -2rem;
            top: 0;
            background: #FB7299;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        .year-title {
            font-size: 2rem;
            font-weight: 700;
            color: #FB7299;
            margin-bottom: 1rem;
            padding-left: 1rem;
            border-left: 4px solid #FB7299;
        }
        .month-group {
            margin-bottom: 1.5rem;
        }
        .month-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.8rem;
            padding-left: 0.5rem;
            border-left: 3px solid rgba(251,114,153,0.5);
        }
        .article-list {
            list-style: none;
            padding: 0;
        }
        .article-item {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            padding: 0.6rem 0;
            border-bottom: 1px dashed rgba(251,114,153,0.2);
            flex-wrap: wrap;
        }
        .article-date {
            font-size: 0.85rem;
            color: #888;
            min-width: 70px;
        }
        .article-title {
            flex: 2;
            min-width: 150px;
        }
        .article-title a {
            text-decoration: none;
            color: var(--text-main);
            transition: color 0.2s;
            font-weight: 500;
        }
        .article-title a:hover {
            color: #FB7299;
        }
        .article-author {
            font-size: 0.85rem;
            color: #FB7299;
            background: rgba(251,114,153,0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            white-space: nowrap;
        }
        .loading, .no-posts {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        @media (max-width: 680px) {
            .archive-card {
                padding: 1.5rem;
            }
            .timeline {
                padding-left: 1rem;
            }
            .year-marker {
                left: -1rem;
                font-size: 0.8rem;
                padding: 0.1rem 0.6rem;
            }
            .year-title {
                font-size: 1.6rem;
            }
            .month-title {
                font-size: 1.1rem;
            }
            .article-item {
                flex-direction: column;
                gap: 0.3rem;
            }
            .article-date {
                min-width: auto;
            }
            .article-title {
                flex: auto;
            }
            .article-author {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- 简洁导航栏（二级页面通用） -->
    <blog-navbar-secondary></blog-navbar-secondary>
    <!-- 侧边栏 -->
    <blog-sidebar></blog-sidebar>

    <div class="archive-container">
        <div class="archive-card glass">
            <h2 style="color: #FB7299; margin-bottom: 1.5rem;">
                <i class="fas fa-archive"></i> 文章归档
            </h2>
            <div id="archive-content" class="timeline">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <blog-footer></blog-footer>

    <script>
        async function loadArchive() {
            const container = document.getElementById('archive-content');
            try {
                // 归档页请求全部文章（设置一个较大的 limit）
                const response = await fetch('/api/posts?limit=1000');
                if (!response.ok) throw new Error('网络错误');
                const data = await response.json();
                const posts = data.posts || [];
                
                if (!posts.length) {
                    container.innerHTML = '<div class="no-posts">✨ 还没有文章，快去写一篇吧～</div>';
                    return;
                }

                // 按年份和月份分组
                const grouped = {};
                posts.forEach(post => {
                    const date = new Date(post.updated_at);
                    // 强制使用北京时间进行分组
                    const year = parseInt(date.toLocaleDateString('zh-CN', { timeZone: 'Asia/Shanghai', year: 'numeric' }));
                    const month = parseInt(date.toLocaleDateString('zh-CN', { timeZone: 'Asia/Shanghai', month: 'numeric' }));
                    const monthStr = `${year}-${String(month).padStart(2,'0')}`;
                    
                    if (!grouped[year]) grouped[year] = {};
                    if (!grouped[year][monthStr]) grouped[year][monthStr] = [];
                    grouped[year][monthStr].push(post);
                });

                // 生成 HTML
                let html = '';
                const years = Object.keys(grouped).sort((a,b) => b - a);
                for (const year of years) {
                    html += `<div class="timeline-year">`;
                    html += `<div class="year-title">${year}</div>`;
                    const months = Object.keys(grouped[year]).sort((a,b) => b - a);
                    for (const monthStr of months) {
                        const monthName = new Date(monthStr + '-01').toLocaleDateString('zh-CN', { month: 'long' });
                        html += `<div class="month-group">`;
                        html += `<div class="month-title">📅 ${monthName}</div>`;
                        html += `<ul class="article-list">`;
                        
                        // 排序当前月份的文章
                        const postsInMonth = grouped[year][monthStr].sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
                        
                        postsInMonth.forEach(post => {
                            const date = new Date(post.updated_at);
                            const day = parseInt(date.toLocaleDateString('zh-CN', { timeZone: 'Asia/Shanghai', day: 'numeric' }));
                            html += `
                                <li class="article-item">
                                    <span class="article-date">${day}日</span>
                                    <span class="article-title"><a href="post.html?slug=${post.slug}">${post.title}</a></span>
                                    <span class="article-author"><i class="fas fa-user"></i> ${post.author || '匿名'}</span>
                                </li>
                            `;
                        });
                        html += `</ul></div>`;
                    }
                    html += `</div>`;
                }
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="no-posts">加载失败，请刷新重试</div>';
            }
        }
        document.addEventListener('DOMContentLoaded', loadArchive);
    </script>
</body>
</html>
