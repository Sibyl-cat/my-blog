<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>织星屿 · 坠落人间的星海</title>
    <meta name="description" content="织星屿 - 探索技术与生活的无限可能。分享编程、设计与个人成长的心得体会。">
    <meta name="keywords" content="博客, 编程, 技术, 生活, 织星屿, 设计">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-blog-url.com/">
    <meta property="og:title" content="织星屿 · 坠落人间的星海">
    <meta property="og:description" content="探索技术与生活的无限可能。">
    <meta property="og:image" content="/images/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="织星屿 · 坠落人间的星海">
    <meta property="twitter:description" content="探索技术与生活的无限可能。">

    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
</head>
<body>
    <div class="blog-container">
        <!-- 宽屏导航栏（使用主页专用组件，已去掉悬浮条） -->
        <blog-navbar-home></blog-navbar-home>
    
        <!-- 全局侧边栏 -->
        <blog-sidebar></blog-sidebar>
    
        <div class="blog-container new-home">
            <!-- 左侧信息区（整合了原个人资料卡要素） -->
            <aside class="home-sidebar">
                <div class="author-card glass">
                    <div class="author-avatar">
                        <i class="fa-regular fa-face-smile-wink"></i>
                    </div>
                    <div class="author-name">织星屿</div>
                    <div class="author-bio">✨ 一起写点有趣的东西吧 ✨</div>
                    <div class="author-stats">
                        <div class="stat-item">
                            <span class="stat-number" id="totalPosts">0</span><span class="stat-label">篇宝藏</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="totalUsers">0</span><span class="stat-label">位小伙伴</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">努力运行</span>
                            <span class="stat-number"><runtime-display></runtime-display></span>  
                            <a href="https://icp.gov.moe/?keyword=20260226" target="_blank">萌ICP备20260226号</a>
                        </div>
                    </div>
                    <div class="author-links">
                        <a href="authors.html"><i class="fas fa-users"></i> 作者列表</a>
                        <a href="tags.html"><i class="fas fa-tags"></i> 标签云</a>
                        <a href="register.html"><i class="fas fa-user-plus"></i> 注册</a>
                    </div>
                </div>
            </aside>
    
            <!-- 右侧文章列表区 -->
            <main class="home-main">
                <div class="posts-header">
                    <h2><i class="fas fa-arrow-trend-up" style="color:#FB7299; margin-right: 8px;"></i> 最新放映</h2>
                    <a href="archive.html" class="more-link">查看全部 <i class="fas fa-arrow-right"></i></a>
                </div>
                <div class="article-list" id="post-list">
                    <!-- 动态加载文章卡片 -->
                </div>
                <div class="pagination-controls" id="pagination-controls">
                    <button id="loadMoreBtn" class="load-more-btn">加载更多 <i class="fas fa-arrow-down"></i></button>
                    <div class="pagination-info" id="paginationInfo"></div>
                </div>
            </main>
        </div>
    
        <!-- 欢迎弹窗 -->
        <div class="welcome-toast" id="welcomeToast">
            <!-- 顶部彩虹条 -->
            <div class="welcome-toast-bar"></div>
            <!-- 标题行 -->
            <div class="welcome-toast-header">
                <div class="welcome-toast-greeting">
                    <span class="greeting-emoji" id="greetEmoji">👋</span>
                    <span id="greetTitle">您好！</span>
                </div>
                <button class="welcome-toast-close" id="toastCloseBtn" title="关闭">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <!-- 用户欢迎语 -->
            <div class="welcome-toast-user" id="toastUserMsg">
                <i class="fas fa-spinner fa-spin" style="color: var(--primary-pink);"></i> 加载中...
            </div>
            <div class="welcome-toast-divider"></div>
            <!-- 站点统计 -->
            <div class="welcome-toast-stats">
                <div class="welcome-toast-stat">
                    <span class="welcome-toast-stat-num" id="toastPosts">-</span>
                    <span class="welcome-toast-stat-label">篇宝藏</span>
                </div>
                <div class="welcome-toast-stat">
                    <span class="welcome-toast-stat-num" id="toastUsers">-</span>
                    <span class="welcome-toast-stat-label">位小伙伴</span>
                </div>
                <div class="welcome-toast-stat">
                    <span class="welcome-toast-stat-num" id="toastTime">-</span>
                    <span class="welcome-toast-stat-label">天精彩运行</span>
                </div>
            </div>
            <div class="welcome-toast-divider"></div>
            <!-- 时间与地区信息 -->
            <div class="welcome-toast-meta">
                <div class="welcome-toast-meta-item">
                    <i class="fas fa-clock"></i>
                    <span id="toastClock">--:--</span>
                </div>
                <div class="welcome-toast-meta-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="toastLocation">定位中...</span>
                </div>
                <div class="welcome-toast-meta-item">
                    <i class="fas fa-calendar-day"></i>
                    <span id="toastDate">--</span>
                </div>
            </div>
            <!-- 倒计时进度条 -->
            <div class="welcome-toast-progress">
                <div class="welcome-toast-progress-bar" id="toastProgressBar"></div>
            </div>
        </div>

        <!-- 宽屏页脚 -->
        <blog-footer></blog-footer>
    </div>

    <script>
        // 分页配置
        let currentPage = 1;
        const postsPerPage = 6;
        let totalPostsCount = 0;
        let isLoading = false;

        // 获取文章分页数据
        async function fetchPosts(page) {
            try {
                const res = await fetch(`/api/posts?page=${page}&limit=${postsPerPage}`);
                const data = await res.json();
                totalPostsCount = data.total;
                return data.posts;
            } catch (err) {
                console.error('加载文章失败', err);
                return [];
            }
        }

        // 渲染文章
        function renderPosts(posts, append = false) {
            const container = document.getElementById('post-list');
            if (!posts.length && !append) {
                container.innerHTML = '<div class="no-posts">✨ 还没有文章，快去写一篇吧～</div>';
                return;
            }
            
            const html = posts.map(post => {
                const date = new Date(post.updated_at);
                // 强制显示北京时间 (UTC+8)
                const formattedDate = date.toLocaleDateString('zh-CN', {
                    timeZone: 'Asia/Shanghai',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                }).replace(/\//g, '-');

                return `
                    <article class="post-item-card" style="animation: cardFadeIn 0.5s ease-out both;">
                        <div class="post-item-meta">
                            <span class="post-date"><i class="far fa-calendar-alt"></i> ${formattedDate}</span>
                            <span class="post-author"><i class="fas fa-user"></i> ${post.author || '匿名'}</span>
                        </div>
                        <h3 class="post-item-title">
                            <a href="post.html?slug=${post.slug}">${post.title}</a>
                        </h3>
                        <p class="post-item-excerpt">${post.excerpt || ''}</p>
                        <div class="post-item-tags">
                            ${post.tags ? post.tags.split(',').map(t => `<span class="tag">#${t.trim()}</span>`).join('') : ''}
                        </div>
                    </article>
                `;
            }).join('');

            if (append) {
                container.insertAdjacentHTML('beforeend', html);
            } else {
                container.innerHTML = html;
            }
            updatePaginationInfo();
        }

        function updatePaginationInfo() {
            const totalPages = Math.ceil(totalPostsCount / postsPerPage);
            const infoDiv = document.getElementById('paginationInfo');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            
            if (currentPage >= totalPages) {
                loadMoreBtn.style.display = 'none';
                infoDiv.textContent = totalPostsCount > 0 ? `—— 已加载全部 ${totalPostsCount} 篇文章 ——` : '';
            } else {
                loadMoreBtn.style.display = 'inline-flex';
                infoDiv.textContent = `已加载 ${Math.min(currentPage * postsPerPage, totalPostsCount)} / ${totalPostsCount} 篇文章`;
            }
        }

        async function loadMore() {
            if (isLoading) return;
            const totalPages = Math.ceil(totalPostsCount / postsPerPage);
            if (currentPage < totalPages) {
                isLoading = true;
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                const originalText = loadMoreBtn.innerHTML;
                loadMoreBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 加载中...';
                
                currentPage++;
                const newPosts = await fetchPosts(currentPage);
                renderPosts(newPosts, true);
                
                loadMoreBtn.innerHTML = originalText;
                isLoading = false;
            }
        }

        async function initHome() {
            // 加载统计数据
            try {
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                document.getElementById('totalPosts').textContent = stats.postsCount;
                document.getElementById('totalUsers').textContent = stats.usersCount;
            } catch (err) { console.error(err); }

            // 初始加载第一页
            const initialPosts = await fetchPosts(1);
            renderPosts(initialPosts);

            // 绑定加载更多按钮
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (loadMoreBtn) loadMoreBtn.addEventListener('click', loadMore);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initHome();
            initWelcomeToast();
        });
    </script>
    <style>
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script>
        // ========== 欢迎弹窗逻辑 ==========
        function initWelcomeToast() {
            const toast = document.getElementById('welcomeToast');
            const closeBtn = document.getElementById('toastCloseBtn');
            const progressBar = document.getElementById('toastProgressBar');
            const AUTO_CLOSE_MS = 7000; // 7秒自动关闭

            // 时间问候语
            function getGreeting() {
                const h = new Date().getHours();
                if (h >= 5 && h < 9)  return { emoji: '🌅', text: '早安！', sub: '新的一天，加油！' };
                if (h >= 9 && h < 12) return { emoji: '☀️', text: '上午好！', sub: '编程快乐，愛生活！' };
                if (h >= 12 && h < 14) return { emoji: '🌞', text: '中午好！', sub: '平安顺遂～' };
                if (h >= 14 && h < 18) return { emoji: '🍵', text: '下午好！', sub: '喝杯茶，慢慢看呀' };
                if (h >= 18 && h < 22) return { emoji: '🌙', text: '晚上好！', sub: '晋江山就，离此不远～' };
                return { emoji: '✨', text: '夜深了！', sub: '注意休息哦~' };
            }

            // 更新时钟和日期
            function updateClock() {
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                document.getElementById('toastClock').textContent = `${hh}:${mm}`;
                const dateEl = document.getElementById('toastDate');
                if (dateEl) {
                    const m = now.getMonth() + 1;
                    const d = now.getDate();
                    dateEl.textContent = `${m}月${d}日`;
                }
            }

            // 设置问候标题
            const greet = getGreeting();
            document.getElementById('greetEmoji').textContent = greet.emoji;
            document.getElementById('greetTitle').textContent = greet.text;
            updateClock();
            setInterval(updateClock, 30000);

            // 运行天数
            const startTime = new Date(2026, 1, 25, 9, 7, 0);
            const runDays = Math.floor((Date.now() - startTime) / 86400000);
            const toastTimeEl = document.getElementById('toastTime');
            if (toastTimeEl) toastTimeEl.textContent = runDays > 0 ? runDays : 1;

            // 弹出弹窗
            function showToast() {
                setTimeout(() => toast.classList.add('show'), 600);

                // 倒计时进度条
                setTimeout(() => {
                    if (progressBar) {
                        progressBar.style.transition = `width ${AUTO_CLOSE_MS}ms linear`;
                        progressBar.style.width = '0%';
                    }
                }, 800);

                // 自动关闭
                setTimeout(() => hideToast(), AUTO_CLOSE_MS + 800);
            }

            function hideToast() {
                toast.classList.remove('show');
                toast.classList.add('hide');
            }

            closeBtn.addEventListener('click', hideToast);

            // 并行请求：登录状态 + 站点统计
            Promise.all([
                fetch('/api/user/me').then(r => r.ok ? r.json() : null).catch(() => null),
                fetch('/api/stats').then(r => r.ok ? r.json() : null).catch(() => null)
            ]).then(async ([user, stats]) => {
                // 填入统计
                if (stats) {
                    const pEl = document.getElementById('toastPosts');
                    const uEl = document.getElementById('toastUsers');
                    if (pEl) pEl.textContent = stats.postsCount || 0;
                    if (uEl) uEl.textContent = stats.usersCount || 0;
                }

                const msgEl = document.getElementById('toastUserMsg');
                if (user && user.username) {
                    // 已登录 — 隐藏地区项（无需显示 IP）
                    const locItem = document.getElementById('toastLocation');
                    if (locItem) locItem.closest('.welcome-toast-meta-item').style.display = 'none';
                    msgEl.innerHTML = `欢迎回来，<strong>${escapeHtmlInline(user.username)}</strong> ！<br><span style="font-size:0.85rem;">${greet.sub}</span>`;
                } else {
                    // 未登录 — 获取 IP 地理
                    try {
                        const ipRes = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(4000) });
                        const ipData = await ipRes.json();
                        const city = ipData.city || ipData.region || ipData.country_name || null;
                        if (city) {
                            msgEl.innerHTML = `欢迎来自 <strong>${escapeHtmlInline(city)}</strong> 的小伙伴！<br><span style="font-size:0.85rem;">在织星屿，慢慢逗留吧～</span>`;
                            const locEl = document.getElementById('toastLocation');
                            if (locEl) locEl.textContent = city;
                        } else {
                            throw new Error('no city');
                        }
                    } catch {
                        msgEl.innerHTML = `欢迎来自远方的小伙伴！<br><span style="font-size:0.85rem;">在织星屿，慢慢逗留吧～</span>`;
                        const locEl = document.getElementById('toastLocation');
                        if (locEl) locEl.textContent = '远方';
                    }
                }
                showToast();
            });
        }

        // 简化转义（内联用，避免依赖 components.js 的 escapeHtml）
        function escapeHtmlInline(s) {
            return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
        }
    </script>
</body>
</html>
