<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>星辰空间站 · 星辰大海</title>
    <meta name="description" content="星辰空间站 - 探索技术与生活的无限可能。分享编程、设计与个人成长的心得体会。">
    <meta name="keywords" content="博客, 编程, 技术, 生活, 星辰空间站, 设计">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-blog-url.com/">
    <meta property="og:title" content="星辰空间站 · 星辰大海">
    <meta property="og:description" content="探索技术与生活的无限可能。">
    <meta property="og:image" content="/images/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="星辰空间站 · 星辰大海">
    <meta property="twitter:description" content="探索技术与生活的无限可能。">

    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
</head>
<body>
    <div class="blog-container">
        <!-- 宽屏导航栏（使用主页专用组件，已去掉悬浮条） -->
        <blog-navbar-home></blog-navbar-home>
    
        <!-- 全局侧边栏 -->
        <blog-sidebar></blog-sidebar>
    
        <div class="blog-container new-home">
            <!-- 左侧信息区（整合了原个人资料卡要素） -->
            <aside class="home-sidebar">
                <div class="author-card glass">
                    <div class="author-avatar">
                        <i class="fa-regular fa-face-smile-wink"></i>
                    </div>
                    <div class="author-name">星辰空间站</div>
                    <div class="author-bio">✨ 一起写点有趣的东西吧 ✨</div>
                    <div class="author-stats">
                        <div class="stat-item">
                            <span class="stat-number" id="totalPosts">0</span><span class="stat-label">篇宝藏</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="totalUsers">0</span><span class="stat-label">位小伙伴</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">努力运行</span>
                            <span class="stat-number"><runtime-display></runtime-display></span>  
                            <a href="https://icp.gov.moe/?keyword=20260226" target="_blank">萌ICP备20260226号</a>
                        </div>
                    </div>
                    <div class="author-links">
                        <a href="authors.html"><i class="fas fa-users"></i> 作者列表</a>
                        <a href="tags.html"><i class="fas fa-tags"></i> 标签云</a>
                        <a href="register.html"><i class="fas fa-user-plus"></i> 注册</a>
                    </div>
                </div>
            </aside>
    
            <!-- 右侧文章列表区 -->
            <main class="home-main">
                <div class="posts-header">
                    <h2><i class="fas fa-arrow-trend-up" style="color:#FB7299; margin-right: 8px;"></i> 最新放映</h2>
                    <a href="archive.html" class="more-link">查看全部 <i class="fas fa-arrow-right"></i></a>
                </div>
                <div class="article-list" id="post-list">
                    <!-- 动态加载文章卡片 -->
                </div>
                <div class="pagination-controls" id="pagination-controls">
                    <button id="loadMoreBtn" class="load-more-btn">加载更多 <i class="fas fa-arrow-down"></i></button>
                    <div class="pagination-info" id="paginationInfo"></div>
                </div>
            </main>
        </div>
    
        <!-- 宽屏页脚 -->
        <blog-footer></blog-footer>
    </div>

    <script>
        // 分页配置
        let currentPage = 1;
        const postsPerPage = 6;
        let totalPostsCount = 0;
        let isLoading = false;

        // 获取文章分页数据
        async function fetchPosts(page) {
            try {
                const res = await fetch(`/api/posts?page=${page}&limit=${postsPerPage}`);
                const data = await res.json();
                totalPostsCount = data.total;
                return data.posts;
            } catch (err) {
                console.error('加载文章失败', err);
                return [];
            }
        }

        // 渲染文章
        function renderPosts(posts, append = false) {
            const container = document.getElementById('post-list');
            if (!posts.length && !append) {
                container.innerHTML = '<div class="no-posts">✨ 还没有文章，快去写一篇吧～</div>';
                return;
            }
            
            const html = posts.map(post => {
                const date = new Date(post.updated_at);
                // 强制显示北京时间 (UTC+8)
                const formattedDate = date.toLocaleDateString('zh-CN', {
                    timeZone: 'Asia/Shanghai',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                }).replace(/\//g, '-');

                return `
                    <article class="post-item-card" style="animation: cardFadeIn 0.5s ease-out both;">
                        <div class="post-item-meta">
                            <span class="post-date"><i class="far fa-calendar-alt"></i> ${formattedDate}</span>
                            <span class="post-author"><i class="fas fa-user"></i> ${post.author || '匿名'}</span>
                        </div>
                        <h3 class="post-item-title">
                            <a href="post.html?slug=${post.slug}">${post.title}</a>
                        </h3>
                        <p class="post-item-excerpt">${post.excerpt || ''}</p>
                        <div class="post-item-tags">
                            ${post.tags ? post.tags.split(',').map(t => `<span class="tag">#${t.trim()}</span>`).join('') : ''}
                        </div>
                    </article>
                `;
            }).join('');

            if (append) {
                container.insertAdjacentHTML('beforeend', html);
            } else {
                container.innerHTML = html;
            }
            updatePaginationInfo();
        }

        function updatePaginationInfo() {
            const totalPages = Math.ceil(totalPostsCount / postsPerPage);
            const infoDiv = document.getElementById('paginationInfo');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            
            if (currentPage >= totalPages) {
                loadMoreBtn.style.display = 'none';
                infoDiv.textContent = totalPostsCount > 0 ? `—— 已加载全部 ${totalPostsCount} 篇文章 ——` : '';
            } else {
                loadMoreBtn.style.display = 'inline-flex';
                infoDiv.textContent = `已加载 ${Math.min(currentPage * postsPerPage, totalPostsCount)} / ${totalPostsCount} 篇文章`;
            }
        }

        async function loadMore() {
            if (isLoading) return;
            const totalPages = Math.ceil(totalPostsCount / postsPerPage);
            if (currentPage < totalPages) {
                isLoading = true;
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                const originalText = loadMoreBtn.innerHTML;
                loadMoreBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 加载中...';
                
                currentPage++;
                const newPosts = await fetchPosts(currentPage);
                renderPosts(newPosts, true);
                
                loadMoreBtn.innerHTML = originalText;
                isLoading = false;
            }
        }

        async function initHome() {
            // 加载统计数据
            try {
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                document.getElementById('totalPosts').textContent = stats.postsCount;
                document.getElementById('totalUsers').textContent = stats.usersCount;
            } catch (err) { console.error(err); }

            // 初始加载第一页
            const initialPosts = await fetchPosts(1);
            renderPosts(initialPosts);

            // 绑定加载更多按钮
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (loadMoreBtn) loadMoreBtn.addEventListener('click', loadMore);
        }

        document.addEventListener('DOMContentLoaded', initHome);
    </script>
    <style>
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
