<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 · 星辰空间站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <style>
        /* 个人主页额外样式 */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #FB7299;
            background: rgba(251,114,153,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: #FB7299;
            overflow: hidden;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-details {
            flex: 1;
        }
        .profile-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: #FB7299;
        }
        .profile-role {
            font-size: 1.1rem;
            color: #666;
            margin: 0.5rem 0;
        }
        .profile-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }
        .stat {
            background: rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 0.3rem 1rem;
            font-size: 0.9rem;
        }
        .stat i {
            color: #FB7299;
            margin-right: 0.3rem;
        }
        .post-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid rgba(251,114,153,0.3);
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.5rem 1.5rem;
            font-size: 1.1rem;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
            border-radius: 30px 30px 0 0;
        }
        .tab-btn.active {
            color: #FB7299;
            border-bottom: 2px solid #FB7299;
            margin-bottom: -2px;
        }
        .post-list-container {
            display: none;
        }
        .post-list-container.active {
            display: block;
        }
        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid rgba(251,114,153,0.2);
        }
        .post-title {
            font-weight: 600;
            color: #2a2a2a;
        }
        .post-meta {
            font-size: 0.8rem;
            color: #888;
        }
        .post-actions {
            display: flex;
            gap: 0.5rem;
        }
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .profile-stats {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="blog-container">
        <!-- 导航栏（复用全局） -->
        <nav class="navbar glass">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div class="logo" style="display: flex; align-items: center; gap: 12px;">
                    <i class="fab fa-bilibili" id="sidebarToggle" style="color: #FB7299; cursor: pointer; padding: 4px;" title="打开侧边栏"></i>
                    <a href="./index.html" style="text-decoration: none; color: inherit; cursor: pointer;" title="返回首页">
                        <span>星辰空间站</span>
                    </a>
                </div>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-house"></i> 首页</a>
                <a href="authors.html"><i class="fas fa-users"></i> 作者</a>
                <a href="register.html"><i class="fas fa-user-plus"></i> 注册</a>
                <a href="tags.html"><i class="fas fa-magnifying-glass"></i> 搜索</a>
            </div>
            <user-menu></user-menu>
        </nav>

        <!-- 全局侧边栏 -->
        <blog-sidebar></blog-sidebar>

        <!-- 个人资料卡片 -->
        <div class="profile-card glass" style="margin-bottom: 2rem;">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="profile-details">
                    <div class="profile-name" id="profileName">加载中...</div>
                    <div class="profile-role" id="profileRole"></div>
                    <div class="profile-stats">
                        <div class="stat"><i class="fas fa-calendar-alt"></i> 注册时间: <span id="joinDate">--</span></div>
                        <div class="stat"><i class="fas fa-pen-fancy"></i> 文章总数: <span id="totalArticles">--</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 文章列表标签页 -->
        <div class="post-tabs">
            <button class="tab-btn active" data-tab="published">已发表</button>
            <button class="tab-btn" data-tab="drafts">草稿箱</button>
        </div>

        <div id="published-list" class="post-list-container active">
            <!-- 动态加载已发表文章 -->
        </div>
        <div id="drafts-list" class="post-list-container">
            <!-- 动态加载草稿文章 -->
        </div>
    </div>

    <script>
        // 获取用户信息及文章
        let currentUser = null;
        let allPosts = [];

        async function loadProfile() {
            try {
                const res = await fetch('/api/user/me');
                if (!res.ok) {
                    window.location.href = '/admin/login.html';
                    return;
                }
                const user = await res.json();
                currentUser = user;
                // 填充基本信息
                document.getElementById('profileName').textContent = user.username;
                let roleText = '';
                if (user.role === 'admin') roleText = '管理员';
                else if (user.role === 'superadmin') roleText = '超级管理员';
                else roleText = '普通用户';
                document.getElementById('profileRole').textContent = roleText;
                if (user.created_at) {
                    const date = new Date(user.created_at);
                    document.getElementById('joinDate').textContent = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                } else {
                    document.getElementById('joinDate').textContent = '未知';
                }

                // 处理头像
                const avatarDiv = document.getElementById('profileAvatar');
                if (user.avatar) {
                    avatarDiv.innerHTML = `<img src="${user.avatar}" alt="头像">`;
                } else {
                    avatarDiv.innerHTML = '<i class="fas fa-user-circle"></i>';
                }
            } catch (err) {
                console.error('加载用户信息失败', err);
                window.location.href = '/admin/login.html';
            }
        }

        async function loadUserPosts() {
            try {
                const res = await fetch('/api/admin/posts');
                if (!res.ok) throw new Error('加载文章失败');
                const posts = await res.json();
                allPosts = posts;
                document.getElementById('totalArticles').textContent = posts.length;
                renderPublished(posts.filter(p => p.is_published == 1));
                renderDrafts(posts.filter(p => p.is_published == 0));
            } catch (err) {
                console.error('加载文章失败', err);
            }
        }

        function renderPublished(posts) {
            const container = document.getElementById('published-list');
            if (posts.length === 0) {
                container.innerHTML = '<p style="text-align:center;">暂无已发表文章</p>';
                return;
            }
            let html = '';
            posts.forEach(post => {
                const date = new Date(post.updated_at);
                const formattedDate = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                html += `
                    <div class="post-item">
                        <div>
                            <div class="post-title">${post.title}</div>
                            <div class="post-meta"><i class="far fa-calendar"></i> ${formattedDate} | 标签: ${post.tags || '无'}</div>
                        </div>
                        <div class="post-actions">
                            <a href="editor.html?slug=${post.slug}" class="btn" style="padding: 0.3rem 0.8rem;">编辑</a>
                            <button class="btn btn-danger" style="padding: 0.3rem 0.8rem;" onclick="deletePost('${post.slug}')">删除</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderDrafts(posts) {
            const container = document.getElementById('drafts-list');
            if (posts.length === 0) {
                container.innerHTML = '<p style="text-align:center;">暂无草稿</p>';
                return;
            }
            let html = '';
            posts.forEach(post => {
                const date = new Date(post.updated_at);
                const formattedDate = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                html += `
                    <div class="post-item">
                        <div>
                            <div class="post-title">${post.title}</div>
                            <div class="post-meta"><i class="far fa-calendar"></i> ${formattedDate} | 标签: ${post.tags || '无'}</div>
                        </div>
                        <div class="post-actions">
                            <a href="editor.html?slug=${post.slug}" class="btn" style="padding: 0.3rem 0.8rem;">编辑</a>
                            <button class="btn btn-danger" style="padding: 0.3rem 0.8rem;" onclick="deletePost('${post.slug}')">删除</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.deletePost = async function(slug) {
            if (!confirm(`确定要删除文章 "${slug}" 吗？`)) return;
            const formData = new FormData();
            formData.append('slug', slug);
            try {
                const response = await fetch('/api/admin/post/delete', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    alert('删除成功');
                    loadUserPosts(); // 刷新列表
                } else {
                    alert(result.error || '删除失败');
                }
            } catch (err) {
                alert('删除失败');
            }
        };

        // 标签页切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.post-list-container').forEach(container => container.classList.remove('active'));
                if (tab === 'published') {
                    document.getElementById('published-list').classList.add('active');
                } else {
                    document.getElementById('drafts-list').classList.add('active');
                }
            });
        });

        // 页面加载
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProfile();
            await loadUserPosts();
        });
    </script>
</body>
</html>
