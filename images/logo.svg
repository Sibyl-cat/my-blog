<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd1dc" />
      <stop offset="50%" stop-color="#e6e6fa" />
      <stop offset="100%" stop-color="#b0c4de" />
    </linearGradient>
    
    <filter id="hexGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="50" cy="50" r="48" fill="url(#starGradient)" opacity="0.9" />

  <ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="#ffffff" stroke-width="1.2" transform="rotate(-15 50 50)" opacity="0.6" />

  <g fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" filter="url(#hexGlow)">
    <path d="M 50 22 L 75 65 L 25 65 Z" opacity="0.9" />
    <path d="M 50 78 L 25 35 L 75 35 Z" opacity="0.9" />
  </g>

  <circle cx="50" cy="50" r="2.5" fill="#ffffff" filter="url(#hexGlow)" />

  <circle cx="20" cy="35" r="1.2" fill="#ffffff" opacity="0.7" />
  <circle cx="82" cy="60" r="0.8" fill="#ffffff" opacity="0.5" />
  <circle cx="40" cy="85" r="1" fill="#ffffff" opacity="0.6" />
</svg>
