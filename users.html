<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>用户管理 · 星辰空间站</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #ffe9f0, #ffd9e5);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.03), 0 4px 12px rgba(251, 114, 153, 0.1);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .users-container {
            max-width: 1300px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }

        .panel {
            padding: 2rem;
        }

        h2 {
            color: #FB7299;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #FB7299;
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-list {
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .user-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            border-bottom: 1px solid rgba(251, 114, 153, 0.2);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 20px;
            margin-bottom: 0.3rem;
        }

        .user-item:hover {
            background: rgba(251, 114, 153, 0.1);
        }

        .user-item.selected {
            background: rgba(251, 114, 153, 0.2);
            border: 1px solid #FB7299;
            box-shadow: 0 4px 10px rgba(251, 114, 153, 0.2);
        }

        .user-avatar {
            width: 40px;
            text-align: center;
        }

        .user-avatar i {
            font-size: 2rem;
            color: #FB7299;
        }

        .user-details {
            flex: 3;
            min-width: 180px;
        }

        .user-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .user-meta {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.2rem;
        }

        .user-status {
            flex: 0 0 100px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-role {
            flex: 0 0 100px;
        }

        .role-select {
            padding: 0.3rem 0.5rem;
            border-radius: 30px;
            border: 1px solid rgba(251,114,153,0.5);
            background: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #FB7299;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2a2a2a;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid rgba(251, 114, 153, 0.3);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #FB7299;
            box-shadow: 0 0 0 3px rgba(251, 114, 153, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(251, 114, 153, 0.3);
            color: #2a2a2a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex: 1;
        }

        .btn:hover {
            background: #FB7299;
            color: white;
            border-color: #FB7299;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(251, 114, 153, 0.3);
        }

        .btn-danger {
            background: rgba(255, 100, 100, 0.15);
            border-color: #ff7d7d;
            color: #b30000;
        }

        .btn-danger:hover {
            background: #ff4d4d;
            color: white;
            border-color: #ff4d4d;
        }

        .message {
            margin-top: 1.5rem;
            padding: 0.8rem 1.2rem;
            border-radius: 30px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background: rgba(0, 200, 0, 0.15);
            border: 1px solid #2ecc71;
            color: #27ae60;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff7d7d;
            color: #c0392b;
        }

        .refresh-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 0.8rem;
            background: rgba(251, 114, 153, 0.1);
            border: 1px dashed #FB7299;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            color: #FB7299;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            background: rgba(251, 114, 153, 0.2);
            border-style: solid;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .users-container {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .user-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .user-status, .user-role {
                flex: auto;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="blog-container">
        <blog-navbar-secondary></blog-navbar-secondary>
        <blog-sidebar></blog-sidebar>

        <div class="users-container">
            <!-- 左侧：用户列表卡片 -->
            <div class="panel glass">
                <h2><i class="fas fa-users"></i> 用户列表</h2>
                <div class="user-list" id="user-list"></div>
                <button class="refresh-btn" id="refreshUsersBtn">
                    <i class="fas fa-sync-alt"></i> 刷新列表
                </button>
            </div>

            <!-- 右侧：操作卡片 -->
            <div class="panel glass">
                <h2><i class="fas fa-user-edit"></i> 用户操作</h2>
                <form id="userForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> 用户名</label>
                        <input type="text" id="username" disabled>
                    </div>
                    <div class="btn-group">
                        <button type="button" id="deleteUserBtn" class="btn btn-danger"><i class="fas fa-trash"></i> 删除用户</button>
                    </div>
                    <div id="message" class="message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let selectedUserId = null;
        const userListDiv = document.getElementById('user-list');
        const usernameInput = document.getElementById('username');
        const deleteBtn = document.getElementById('deleteUserBtn');
        const refreshBtn = document.getElementById('refreshUsersBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                if (!res.ok) throw new Error('加载失败');
                const users = await res.json();
                let html = '';
                users.forEach(user => {
                    const selectedClass = selectedUserId === user.id ? 'selected' : '';
                    const regDate = new Date(user.created_at).toLocaleString('zh-CN', { hour12: false });
                    const lastLogin = user.last_login_at ? new Date(user.last_login_at).toLocaleString('zh-CN', { hour12: false }): '从未登录';
                    const roleText = user.role === 'admin' ? '管理员' : '普通用户';
                    html += `
                        <div class="user-item ${selectedClass}" data-id="${user.id}" data-username="${user.username}">
                            <div class="user-avatar">
                                <i class="fas fa-user-circle"></i>
                            </div>
                            <div class="user-details">
                                <div class="user-name">${user.username}</div>
                                <div class="user-meta">
                                    注册: ${regDate}<br>
                                    最后登录: ${lastLogin}
                                </div>
                            </div>
                            <div class="user-status">
                                <label class="switch">
                                    <input type="checkbox" class="active-toggle" data-id="${user.id}" ${user.is_active ? 'checked' : ''}>
                                    <span class="slider round"></span>
                                </label>
                                <span style="font-size:0.75rem;">${user.is_active ? '启用' : '禁用'}</span>
                            </div>
                            <div class="user-role">
                                <select class="role-select" data-id="${user.id}">
                                    <option value="user" ${user.role === 'user' ? 'selected' : ''}>用户</option>
                                    <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>管理员</option>
                                </select>
                            </div>
                        </div>
                    `;
                });
                userListDiv.innerHTML = html || '<p style="text-align:center; padding:2rem; color:#666;">暂无用户</p>';

                // 绑定角色修改
                document.querySelectorAll('.role-select').forEach(select => {
                    select.addEventListener('change', async (e) => {
                        e.stopPropagation();
                        const userId = parseInt(select.dataset.id);
                        const newRole = select.value;
                        try {
                            const res = await fetch('/api/admin/user/role', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ targetUserId: userId, newRole })
                            });
                            const data = await res.json();
                            if (res.ok) {
                                showMessage('角色已更新', 'success');
                                loadUsers(); // 刷新列表以更新选中状态
                            } else {
                                showMessage(data.error || '更新失败', 'error');
                                loadUsers(); // 恢复原状
                            }
                        } catch (err) {
                            showMessage('网络错误', 'error');
                            loadUsers();
                        }
                    });
                });

                // 绑定启用/禁用开关
                document.querySelectorAll('.active-toggle').forEach(toggle => {
                    toggle.addEventListener('change', async (e) => {
                        e.stopPropagation();
                        const userId = parseInt(toggle.dataset.id);
                        const active = toggle.checked;
                        try {
                            const res = await fetch('/api/admin/user/toggle-active', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ targetUserId: userId, active })
                            });
                            const data = await res.json();
                            if (!res.ok) {
                                showMessage(data.error || '操作失败', 'error');
                                loadUsers(); // 恢复
                            } else {
                                showMessage(active ? '用户已启用' : '用户已禁用', 'success');
                            }
                        } catch (err) {
                            showMessage('网络错误', 'error');
                            loadUsers();
                        }
                    });
                });

                // 绑定选择用户（点击条目）
                document.querySelectorAll('.user-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        // 避免点击内部控件时触发
                        if (e.target.closest('.role-select') || e.target.closest('.active-toggle')) return;
                        document.querySelectorAll('.user-item').forEach(i => i.classList.remove('selected'));
                        item.classList.add('selected');
                        selectedUserId = parseInt(item.dataset.id);
                        usernameInput.value = item.dataset.username;
                    });
                });

                // 如果之前选中的用户仍在列表中，保持选中样式
                if (selectedUserId) {
                    const selectedItem = document.querySelector(`.user-item[data-id="${selectedUserId}"]`);
                    if (selectedItem) {
                        selectedItem.classList.add('selected');
                        usernameInput.value = selectedItem.dataset.username;
                    } else {
                        selectedUserId = null;
                        usernameInput.value = '';
                    }
                }
            } catch (err) {
                console.error(err);
                userListDiv.innerHTML = '<p style="color:red; text-align:center;">加载失败</p>';
            }
        }

        // 删除用户
        deleteBtn.addEventListener('click', async () => {
            if (!selectedUserId) {
                showMessage('请先选择一个用户', 'error');
                return;
            }
            if (!confirm('确定要删除该用户吗？此操作不可撤销。')) return;
            try {
                const res = await fetch('/api/admin/user/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: selectedUserId })
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage('用户删除成功', 'success');
                    selectedUserId = null;
                    usernameInput.value = '';
                    loadUsers();
                } else {
                    showMessage(data.error || '删除失败', 'error');
                }
            } catch (err) {
                showMessage('网络错误', 'error');
            }
        });

        refreshBtn.addEventListener('click', () => loadUsers());
        loadUsers();
    </script>
</body>

</html>
