<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>用户管理 · 织星屿</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #ffe9f0, #ffd9e5);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.03), 0 4px 12px rgba(251, 114, 153, 0.1);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .users-container {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 2rem;
            height: 80vh;
            min-height: 700px;
        }

        .panel {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #FB7299;
        }

        h2 {
            color: #FB7299;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
            border: none;
            padding: 0;
        }

        .stats-badge {
            background: #FB7299;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .search-box {
            position: relative;
            margin-bottom: 1.2rem;
            transition: transform 0.3s ease;
        }

        .search-box:focus-within {
            transform: translateY(-2px);
        }

        .search-box i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #FB7299;
            font-size: 1.1rem;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .search-box input {
            padding: 0.9rem 1rem 0.9rem 3rem;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(251, 114, 153, 0.2);
            border-radius: 20px;
            width: 100%;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }

        .search-box input:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #FB7299;
            box-shadow: 0 8px 20px rgba(251, 114, 153, 0.15);
            outline: none;
        }

        .search-box input:focus + i {
            transform: translateY(-50%) scale(1.1);
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding-right: 0.5rem;
        }

        /* 滚动条美化 */
        .user-list::-webkit-scrollbar {
            width: 6px;
        }
        .user-list::-webkit-scrollbar-thumb {
            background: rgba(251, 114, 153, 0.2);
            border-radius: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(251, 114, 153, 0.1);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
            margin-bottom: 0.8rem;
        }

        .user-item:hover {
            background: rgba(251, 114, 153, 0.1);
            transform: translateX(5px);
        }

        .user-item.selected {
            background: white;
            border: 1px solid #FB7299;
            box-shadow: 0 8px 20px rgba(251, 114, 153, 0.15);
        }

        .user-avatar i {
            font-size: 2.2rem;
            color: #FB7299;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 1.05rem;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        .user-meta-brief {
            font-size: 0.75rem;
            color: #888;
            margin-top: 0.1rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        .status-dot.active {
            background: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        /* 右侧面板详情样式 */
        .detail-panel {
            background: rgba(255, 255, 255, 0.4);
        }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(251, 114, 153, 0.4);
            gap: 1.5rem;
        }

        .empty-state i {
            font-size: 5rem;
        }

        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2.5rem;
            padding: 1.5rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .large-avatar i {
            font-size: 5rem;
            color: #FB7299;
        }

        .header-info {
            flex: 1;
            min-width: 0;
        }

        .header-info h3 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .role-tag {
            padding: 0.3rem 1rem;
            background: rgba(251, 114, 153, 0.1);
            color: #FB7299;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-item {
            background: rgba(255,255,255,0.5);
            padding: 1rem;
            border-radius: 16px;
        }

        .info-item label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.3rem;
        }

        .info-item .value {
            font-weight: 600;
            color: #333;
        }

        .role-select-large {
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid rgba(251, 114, 153, 0.2);
            background: white;
            font-size: 1rem;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FB7299' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }

        .status-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem;
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
        }

        .sub-label {
            font-size: 0.75rem;
            color: #999;
        }

        .danger-zone {
            margin-top: 3rem;
            padding: 1.5rem;
            border: 1.5px solid rgba(255, 77, 77, 0.3);
            border-radius: 24px;
            background: linear-gradient(145deg, rgba(255, 77, 77, 0.05), rgba(255, 77, 77, 0.02));
            position: relative;
            overflow: hidden;
        }

        .danger-zone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #ff4d4d;
        }

        .danger-zone h4 {
            color: #ff4d4d;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.1rem;
        }

        .danger-zone p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .skeleton-item {
            height: 80px;
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.1) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 20px;
            margin-bottom: 0.8rem;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .refresh-btn {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.9rem;
            background: white;
            border: 1px solid rgba(251, 114, 153, 0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #FB7299;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            box-shadow: 0 4px 12px rgba(251, 114, 153, 0.1);
        }

        .refresh-btn:hover {
            background: #FB7299;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(251, 114, 153, 0.25);
        }

        .refresh-btn i {
            transition: transform 0.5s ease;
        }

        .refresh-btn:active i {
            transform: rotate(180deg);
        }

        @media (max-width: 1024px) {
            .users-container {
                grid-template-columns: 350px 1fr;
                gap: 1.5rem;
                padding: 1rem;
                height: auto;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
                align-items: flex-start;
            }

            .users-container {
                grid-template-columns: 1fr;
                height: auto;
                min-height: auto;
                gap: 1.5rem;
            }
            
            .panel {
                padding: 1.5rem;
                height: auto;
                border-radius: 24px;
            }

            .user-list {
                max-height: 50vh;
            }

            .user-profile-header {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
                padding: 2rem 1.5rem;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .user-name {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="blog-container">
        <blog-navbar-secondary></blog-navbar-secondary>
        <blog-sidebar></blog-sidebar>

        <div class="users-container">
            <!-- 左侧：用户列表卡片 -->
            <div class="panel glass">
                <div class="panel-header">
                    <h2><i class="fas fa-users"></i> 用户列表</h2>
                    <div class="stats-badge" id="totalUsersBadge">0 用户</div>
                </div>
                
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="userSearch" placeholder="搜索用户名...">
                </div>

                <div class="user-list" id="user-list">
                    <!-- 骨架屏加载状态 -->
                    <div class="skeleton-item"></div>
                    <div class="skeleton-item"></div>
                    <div class="skeleton-item"></div>
                </div>
                
                <button class="refresh-btn" id="refreshUsersBtn">
                    <i class="fas fa-sync-alt"></i> 刷新列表
                </button>
            </div>

            <!-- 右侧：操作卡片 -->
            <div class="panel glass detail-panel" id="detailPanel">
                <div class="empty-state" id="emptyState">
                    <i class="fas fa-user-shield"></i>
                    <p>请从左侧选择一个用户进行管理</p>
                </div>
                
                <div class="user-detail-content" id="userDetailContent" style="display: none;">
                    <h2><i class="fas fa-user-edit"></i> 用户详情与操作</h2>
                    
                    <div class="user-profile-header">
                        <div class="large-avatar" id="detailAvatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="header-info">
                            <h3 id="detailUsernameDisplay">用户名</h3>
                            <span class="role-tag" id="detailRoleBadge">普通用户</span>
                        </div>
                    </div>

                    <form id="userForm">
                        <div class="info-grid">
                            <div class="info-item">
                                <label><i class="fas fa-calendar-alt"></i> 注册时间</label>
                                <div class="value" id="detailRegDate">-</div>
                            </div>
                            <div class="info-item">
                                <label><i class="fas fa-clock"></i> 最后登录</label>
                                <div class="value" id="detailLastLogin">-</div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-user-tag"></i> 修改权限</label>
                            <select class="role-select-large" id="detailRoleSelect">
                                <option value="user">普通用户</option>
                                <option value="admin">管理员</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <div class="status-control">
                                <div>
                                    <label><i class="fas fa-toggle-on"></i> 账号状态</label>
                                    <p class="sub-label">禁用后用户将无法登录</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="detailActiveToggle">
                                    <span class="slider round"></span>
                                </label>
                            </div>
                        </div>

                        <div class="danger-zone">
                            <h4><i class="fas fa-exclamation-triangle"></i> 危险区域</h4>
                            <p>这些操作无法撤销，请谨慎操作。</p>
                            <div class="btn-group">
                                <button type="button" id="deleteUserBtn" class="btn btn-danger">
                                    <i class="fas fa-trash"></i> 删除该用户
                                </button>
                            </div>
                        </div>
                        
                        <div id="message" class="message"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allUsers = [];
        let selectedUser = null;
        
        const userListDiv = document.getElementById('user-list');
        const userSearchInput = document.getElementById('userSearch');
        const totalBadge = document.getElementById('totalUsersBadge');
        const emptyState = document.getElementById('emptyState');
        const detailContent = document.getElementById('userDetailContent');
        
        // 详情面板元素
        const detailUsername = document.getElementById('detailUsernameDisplay');
        const detailRoleBadge = document.getElementById('detailRoleBadge');
        const detailRegDate = document.getElementById('detailRegDate');
        const detailLastLogin = document.getElementById('detailLastLogin');
        const detailRoleSelect = document.getElementById('detailRoleSelect');
        const detailActiveToggle = document.getElementById('detailActiveToggle');
        const deleteBtn = document.getElementById('deleteUserBtn');
        const refreshBtn = document.getElementById('refreshUsersBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                if (!res.ok) throw new Error('加载失败');
                allUsers = await res.json();
                renderUserList(allUsers);
                updateStats();
            } catch (err) {
                console.error(err);
                userListDiv.innerHTML = '<p style="color:red; text-align:center; padding: 2rem;">加载失败</p>';
            }
        }

        function renderUserList(users) {
            let html = '';
            users.forEach(user => {
                const isSelected = selectedUser && selectedUser.id === user.id;
                const statusClass = user.is_active ? 'active' : '';
                html += `
                    <div class="user-item ${isSelected ? 'selected' : ''}" data-id="${user.id}">
                        <div class="user-avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="user-details">
                            <div class="user-name">${user.username}</div>
                            <div class="user-meta-brief">${user.role === 'admin' ? '管理员' : '普通用户'}</div>
                        </div>
                        <div class="status-dot ${statusClass}" title="${user.is_active ? '正常' : '禁用'}"></div>
                    </div>
                `;
            });
            userListDiv.innerHTML = html || '<p style="text-align:center; padding:2rem; color:#666;">暂无用户</p>';
            
            // 绑定选择事件
            document.querySelectorAll('.user-item').forEach(item => {
                item.addEventListener('click', () => {
                    const userId = parseInt(item.dataset.id);
                    selectUser(userId);
                });
            });
        }

        function updateStats() {
            totalBadge.textContent = `${allUsers.length} 用户`;
        }

        function selectUser(userId) {
            selectedUser = allUsers.find(u => u.id === userId);
            if (!selectedUser) return;

            // 更新样式
            document.querySelectorAll('.user-item').forEach(item => {
                item.classList.toggle('selected', parseInt(item.dataset.id) === userId);
            });

            // 填充详情
            emptyState.style.display = 'none';
            detailContent.style.display = 'block';

            detailUsername.textContent = selectedUser.username;
            detailRoleBadge.textContent = selectedUser.role === 'admin' ? '管理员' : '普通用户';
            detailRegDate.textContent = window.formatDateToBeijing(selectedUser.created_at);
            detailLastLogin.textContent = selectedUser.last_login_at ? window.formatDateToBeijing(selectedUser.last_login_at) : '从未登录';
            
            detailRoleSelect.value = selectedUser.role;
            detailActiveToggle.checked = selectedUser.is_active;
        }

        // 搜索功能
        userSearchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u => u.username.toLowerCase().includes(query));
            renderUserList(filtered);
        });

        // 修改角色
        detailRoleSelect.addEventListener('change', async () => {
            if (!selectedUser) return;
            const newRole = detailRoleSelect.value;
            try {
                const res = await fetch('/api/admin/user/role', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetUserId: selectedUser.id, newRole })
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage('角色已更新', 'success');
                    selectedUser.role = newRole;
                    detailRoleBadge.textContent = newRole === 'admin' ? '管理员' : '普通用户';
                    renderUserList(allUsers); // 更新列表中的身份标记
                } else {
                    showMessage(data.error || '更新失败', 'error');
                    detailRoleSelect.value = selectedUser.role; // 恢复
                }
            } catch (err) {
                showMessage('网络错误', 'error');
            }
        });

        // 修改状态
        detailActiveToggle.addEventListener('change', async () => {
            if (!selectedUser) return;
            const active = detailActiveToggle.checked;
            try {
                const res = await fetch('/api/admin/user/toggle-active', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetUserId: selectedUser.id, active })
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage(active ? '用户已启用' : '用户已禁用', 'success');
                    selectedUser.is_active = active;
                    renderUserList(allUsers); // 更新列表中的状态点
                } else {
                    showMessage(data.error || '操作失败', 'error');
                    detailActiveToggle.checked = !active; // 恢复
                }
            } catch (err) {
                showMessage('网络错误', 'error');
            }
        });

        // 删除用户
        deleteBtn.addEventListener('click', async () => {
            if (!selectedUser) return;
            if (!confirm(`确定要删除用户 "${selectedUser.username}" 吗？此操作不可撤销。`)) return;
            
            try {
                const res = await fetch('/api/admin/user/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: selectedUser.id })
                });
                if (res.ok) {
                    showMessage('用户删除成功', 'success');
                    allUsers = allUsers.filter(u => u.id !== selectedUser.id);
                    selectedUser = null;
                    detailContent.style.display = 'none';
                    emptyState.style.display = 'flex';
                    renderUserList(allUsers);
                    updateStats();
                } else {
                    const data = await res.json();
                    showMessage(data.error || '删除失败', 'error');
                }
            } catch (err) {
                showMessage('网络错误', 'error');
            }
        });

        refreshBtn.addEventListener('click', () => loadUsers());
        loadUsers();
    </script>
</body>

</html>
