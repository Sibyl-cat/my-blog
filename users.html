<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 · 星辰空间站</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #ffe9f0, #ffd9e5);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.03), 0 4px 12px rgba(251, 114, 153, 0.1);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .users-container {
            max-width: 1300px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }

        .panel {
            padding: 2rem;
        }

        h2 {
            color: #FB7299;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #FB7299;
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(251, 114, 153, 0.2);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 20px;
            margin-bottom: 0.3rem;
        }

        .user-item:hover {
            background: rgba(251, 114, 153, 0.1);
        }

        .user-item.selected {
            background: rgba(251, 114, 153, 0.2);
            border: 1px solid #FB7299;
            box-shadow: 0 4px 10px rgba(251, 114, 153, 0.2);
        }

        .user-avatar {
            width: 40px;
            text-align: center;
            flex-shrink: 0;
        }

        .user-avatar i {
            font-size: 2rem;
            color: #FB7299;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .user-last-login {
            font-size: 0.7rem;
            color: #888;
            margin-top: 0.2rem;
        }

        .user-status {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #FB7299;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* 右侧详情卡片 */
        .detail-group {
            margin-bottom: 1.5rem;
        }

        .detail-label {
            font-weight: 500;
            color: #2a2a2a;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }

        .detail-value {
            background: rgba(255, 255, 255, 0.5);
            padding: 0.6rem 1rem;
            border-radius: 30px;
            font-size: 1rem;
            color: #333;
            word-break: break-all;
        }

        .role-select {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 30px;
            border: 1px solid rgba(251,114,153,0.5);
            background: rgba(255,255,255,0.5);
            font-size: 1rem;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(251, 114, 153, 0.3);
            color: #2a2a2a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex: 1;
        }

        .btn:hover {
            background: #FB7299;
            color: white;
            border-color: #FB7299;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(251, 114, 153, 0.3);
        }

        .btn-danger {
            background: rgba(255, 100, 100, 0.15);
            border-color: #ff7d7d;
            color: #b30000;
        }

        .btn-danger:hover {
            background: #ff4d4d;
            color: white;
            border-color: #ff4d4d;
        }

        .message {
            margin-top: 1.5rem;
            padding: 0.8rem 1.2rem;
            border-radius: 30px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background: rgba(0, 200, 0, 0.15);
            border: 1px solid #2ecc71;
            color: #27ae60;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff7d7d;
            color: #c0392b;
        }

        .refresh-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 0.8rem;
            background: rgba(251, 114, 153, 0.1);
            border: 1px dashed #FB7299;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            color: #FB7299;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            background: rgba(251, 114, 153, 0.2);
            border-style: solid;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .users-container {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="blog-container">
        <blog-navbar-secondary></blog-navbar-secondary>
        <blog-sidebar></blog-sidebar>

        <div class="users-container">
            <!-- 左侧：用户列表（紧凑） -->
            <div class="panel glass">
                <h2><i class="fas fa-users"></i> 用户列表</h2>
                <div class="user-list" id="user-list"></div>
                <button class="refresh-btn" id="refreshUsersBtn">
                    <i class="fas fa-sync-alt"></i> 刷新列表
                </button>
            </div>

            <!-- 右侧：用户详情与操作 -->
            <div class="panel glass">
                <h2><i class="fas fa-user-edit"></i> 用户详情</h2>
                <div id="userDetailPanel">
                    <p style="color:#666; text-align:center;">请从左侧选择一个用户</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedUserId = null;
        let usersData = [];
        const userListDiv = document.getElementById('user-list');
        const userDetailPanel = document.getElementById('userDetailPanel');
        const refreshBtn = document.getElementById('refreshUsersBtn');
        const messageDiv = document.createElement('div');
        messageDiv.id = 'message';
        messageDiv.className = 'message';
        userDetailPanel.parentNode.appendChild(messageDiv);

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                if (!res.ok) throw new Error('加载失败');
                usersData = await res.json();
                renderUserList();
                if (selectedUserId) {
                    const selectedUser = usersData.find(u => u.id === selectedUserId);
                    if (selectedUser) {
                        renderUserDetail(selectedUser);
                    } else {
                        selectedUserId = null;
                        userDetailPanel.innerHTML = '<p style="color:#666; text-align:center;">请从左侧选择一个用户</p>';
                    }
                } else {
                    userDetailPanel.innerHTML = '<p style="color:#666; text-align:center;">请从左侧选择一个用户</p>';
                }
            } catch (err) {
                console.error(err);
                userListDiv.innerHTML = '<p style="color:red; text-align:center;">加载失败</p>';
            }
        }

        function renderUserList() {
            let html = '';
            usersData.forEach(user => {
                const selectedClass = selectedUserId === user.id ? 'selected' : '';
                const lastLogin = user.last_login_at ? new Date(user.last_login_at).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '从未登录';
                html += `
                    <div class="user-item ${selectedClass}" data-id="${user.id}">
                        <div class="user-avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="user-info">
                            <div class="user-name">${user.username}</div>
                            <div class="user-last-login">最后登录: ${lastLogin}</div>
                        </div>
                        <div class="user-status">
                            <label class="switch">
                                <input type="checkbox" class="active-toggle" data-id="${user.id}" ${user.is_active ? 'checked' : ''}>
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                `;
            });
            userListDiv.innerHTML = html || '<p style="text-align:center; padding:2rem; color:#666;">暂无用户</p>';

            // 绑定启用/禁用开关
            document.querySelectorAll('.active-toggle').forEach(toggle => {
                toggle.addEventListener('change', async (e) => {
                    e.stopPropagation();
                    const userId = parseInt(toggle.dataset.id);
                    const active = toggle.checked;
                    try {
                        const res = await fetch('/api/admin/user/toggle-active', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ targetUserId: userId, active })
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            showMessage(data.error || '操作失败', 'error');
                            loadUsers();
                        } else {
                            showMessage(active ? '用户已启用' : '用户已禁用', 'success');
                            const user = usersData.find(u => u.id === userId);
                            if (user) user.is_active = active ? 1 : 0;
                            if (selectedUserId === userId) {
                                renderUserDetail(user);
                            }
                        }
                    } catch (err) {
                        showMessage('网络错误', 'error');
                        loadUsers();
                    }
                });
            });

            // 绑定点击选中用户
            document.querySelectorAll('.user-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.active-toggle')) return;
                    const userId = parseInt(item.dataset.id);
                    selectedUserId = userId;
                    const selectedUser = usersData.find(u => u.id === userId);
                    renderUserList();
                    renderUserDetail(selectedUser);
                });
            });
        }

        function renderUserDetail(user) {
            if (!user) return;
            const regDate = new Date(user.created_at).toLocaleString('zh-CN');
            const lastLogin = user.last_login_at ? new Date(user.last_login_at).toLocaleString('zh-CN') : '从未登录';
            userDetailPanel.innerHTML = `
                <div class="detail-group">
                    <div class="detail-label">用户名</div>
                    <div class="detail-value">${user.username}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label">注册时间</div>
                    <div class="detail-value">${regDate}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label">最后登录</div>
                    <div class="detail-value">${lastLogin}</div>
                </div>
                <div class="detail-group">
                    <div class="detail-label">角色</div>
                    <select class="role-select" id="roleSelect">
                        <option value="user" ${user.role === 'user' ? 'selected' : ''}>普通用户</option>
                        <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>管理员</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button id="deleteUserBtn" class="btn btn-danger"><i class="fas fa-trash"></i> 删除用户</button>
                </div>
            `;

            // 绑定角色修改
            const roleSelect = document.getElementById('roleSelect');
            roleSelect.addEventListener('change', async (e) => {
                const newRole = roleSelect.value;
                try {
                    const res = await fetch('/api/admin/user/role', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ targetUserId: user.id, newRole })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showMessage('角色已更新', 'success');
                        user.role = newRole;
                        renderUserList();
                        renderUserDetail(user);
                    } else {
                        showMessage(data.error || '更新失败', 'error');
                        roleSelect.value = user.role;
                    }
                } catch (err) {
                    showMessage('网络错误', 'error');
                    roleSelect.value = user.role;
                }
            });

            // 删除用户
            const deleteBtn = document.getElementById('deleteUserBtn');
            deleteBtn.addEventListener('click', async () => {
                if (!confirm('确定要删除该用户吗？此操作不可撤销。')) return;
                try {
                    const res = await fetch('/api/admin/user/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: user.id })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showMessage('用户删除成功', 'success');
                        if (selectedUserId === user.id) {
                            selectedUserId = null;
                            userDetailPanel.innerHTML = '<p style="color:#666; text-align:center;">请从左侧选择一个用户</p>';
                        }
                        loadUsers();
                    } else {
                        showMessage(data.error || '删除失败', 'error');
                    }
                } catch (err) {
                    showMessage('网络错误', 'error');
                }
            });
        }

        refreshBtn.addEventListener('click', () => loadUsers());
        loadUsers();
    </script>
</body>

</html>
