<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star 2048</title>
    <style>
        :root {
            --primary-pink: #FB7299;
            --primary-pink-hover: #ff8aa5;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Inter', sans-serif;
        }

        body {
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 450px;
            color: var(--text-main);
            overflow: hidden;
        }

        .game-container {
            width: 320px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .score-container {
            background: var(--glass-bg);
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .score-label {
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .score-value {
            font-size: 18px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 12px;
            position: relative;
        }

        .cell {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            transition: all 0.15s ease;
            position: relative;
            z-index: 2;
        }

        /* Tile colors */
        .tile-2 { background: rgba(251, 114, 153, 0.2); color: #fff; box-shadow: 0 0 10px rgba(251, 114, 153, 0.2); }
        .tile-4 { background: rgba(251, 114, 153, 0.3); color: #fff; box-shadow: 0 0 15px rgba(251, 114, 153, 0.3); }
        .tile-8 { background: rgba(251, 114, 153, 0.4); color: #fff; box-shadow: 0 0 20px rgba(251, 114, 153, 0.4); }
        .tile-16 { background: rgba(251, 114, 153, 0.5); color: #fff; }
        .tile-32 { background: rgba(251, 114, 153, 0.6); color: #fff; }
        .tile-64 { background: rgba(251, 114, 153, 0.7); color: #fff; }
        .tile-128 { background: rgba(251, 114, 153, 0.8); color: #fff; font-size: 18px; box-shadow: 0 0 25px rgba(251, 114, 153, 0.5); }
        .tile-256 { background: rgba(251, 114, 153, 0.9); color: #fff; font-size: 18px; box-shadow: 0 0 30px rgba(251, 114, 153, 0.6); }
        .tile-512 { background: #FB7299; color: #fff; font-size: 18px; box-shadow: 0 0 35px rgba(251, 114, 153, 0.7); }
        .tile-1024 { background: #ff8aa5; color: #fff; font-size: 16px; box-shadow: 0 0 40px rgba(251, 114, 153, 0.8); }
        .tile-2048 { background: #ffb3c1; color: #fff; font-size: 16px; box-shadow: 0 0 45px rgba(251, 114, 153, 0.9); }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn-restart {
            margin-top: 20px;
            padding: 10px 25px;
            background: var(--primary-pink);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-restart:hover {
            transform: scale(1.05);
            background: var(--primary-pink-hover);
        }

        .controls {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.6;
            text-align: center;
        }

        /* Animations */
        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .new-tile {
            animation: pop 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h2 style="font-size: 24px; color: var(--primary-pink);">Star 2048</h2>
            <div class="score-container">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
        </div>

        <div class="grid" id="grid">
            <!-- 16 cells -->
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>

        <div class="game-over" id="game-over">
            <h2 style="font-size: 32px;">Game Over</h2>
            <p id="final-score">Final Score: 0</p>
            <button class="btn-restart" onclick="resetGame()">再来一局</button>
        </div>

        <div class="controls">
            使用方向键或滑动来移动方块
        </div>
    </div>

    <script>
        let board = Array(16).fill(0);
        let score = 0;
        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        function init() {
            board = Array(16).fill(0);
            score = 0;
            addRandomTile();
            addRandomTile();
            updateBoard();
        }

        function addRandomTile() {
            const emptyCells = board.map((val, idx) => val === 0 ? idx : null).filter(val => val !== null);
            if (emptyCells.length > 0) {
                const randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomIdx] = Math.random() < 0.9 ? 2 : 4;
                return true;
            }
            return false;
        }

        function updateBoard() {
            const cells = gridElement.querySelectorAll('.cell');
            cells.forEach((cell, idx) => {
                const value = board[idx];
                cell.textContent = value === 0 ? '' : value;
                cell.className = 'cell' + (value ? ` tile-${value}` : '');
                if (value === 2 || value === 4) {
                    // Check if it's a newly added tile (rough approximation)
                }
            });
            scoreElement.textContent = score;
        }

        function move(direction) {
            let moved = false;
            const size = 4;

            function getLine(i, isRow) {
                let line = [];
                for (let j = 0; j < size; j++) {
                    line.push(isRow ? board[i * size + j] : board[j * size + i]);
                }
                return line;
            }

            function setLine(i, isRow, line) {
                for (let j = 0; j < size; j++) {
                    const idx = isRow ? i * size + j : j * size + i;
                    if (board[idx] !== line[j]) moved = true;
                    board[idx] = line[j];
                }
            }

            function slide(line, reverse) {
                if (reverse) line.reverse();
                
                let nonZero = line.filter(x => x !== 0);
                for (let j = 0; j < nonZero.length - 1; j++) {
                    if (nonZero[j] === nonZero[j + 1]) {
                        nonZero[j] *= 2;
                        score += nonZero[j];
                        nonZero[j + 1] = 0;
                    }
                }
                nonZero = nonZero.filter(x => x !== 0);
                while (nonZero.length < size) nonZero.push(0);
                
                if (reverse) nonZero.reverse();
                return nonZero;
            }

            const isVertical = direction === 'up' || direction === 'down';
            const isReverse = direction === 'right' || direction === 'down';

            for (let i = 0; i < size; i++) {
                let line = getLine(i, !isVertical);
                let newLine = slide(line, isReverse);
                setLine(i, !isVertical, newLine);
            }

            if (moved) {
                addRandomTile();
                updateBoard();
                if (isGameOver()) {
                    gameOver();
                }
            }
        }

        function isGameOver() {
            if (board.includes(0)) return false;
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const current = board[i * 4 + j];
                    if (j < 3 && current === board[i * 4 + (j + 1)]) return false;
                    if (i < 3 && current === board[(i + 1) * 4 + j]) return false;
                }
            }
            return true;
        }

        function gameOver() {
            gameOverElement.style.display = 'flex';
            finalScoreElement.textContent = `最终得分: ${score}`;
        }

        function resetGame() {
            gameOverElement.style.display = 'none';
            init();
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
        });

        // Touch support
        let touchStartX, touchStartY;
        window.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', e => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left');
            } else {
                if (Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up');
            }
            touchStartX = touchStartY = null;
        }, { passive: true });

        init();
    </script>
</body>
</html>
