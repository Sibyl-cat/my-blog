<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星际 2048 · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --tile-bg: rgba(255, 255, 255, 0.05);
            --grid-bg: rgba(0, 0, 0, 0.3);
            --primary-pink: #FB7299;
            --accent-blue: #00f2ff;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e1e3f, #111122, #000);
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: min(90vw, 420px);
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .title-group h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, var(--primary-pink), #ff8aa5);
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .scores-row {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 15px;
            border-radius: 16px;
            text-align: center;
            min-width: 80px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .score-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--primary-pink);
            letter-spacing: 1px;
            font-weight: 600;
        }

        .score-value {
            font-size: 20px;
            font-weight: 800;
            color: white;
        }

        .grid {
            position: relative;
            background: var(--grid-bg);
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 12px;
            padding: 12px;
            width: 100%;
            aspect-ratio: 1;
            box-sizing: border-box;
        }

        .grid-cell {
            background: var(--tile-bg);
            border-radius: 12px;
            width: 100%;
            height: 100%;
        }

        .tile-container {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            z-index: 2;
        }

        .tile {
            position: absolute;
            width: calc(25% - 9px);
            height: calc(25% - 9px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            transition: transform 0.15s ease-in-out, background 0.2s;
            animation: appear 0.2s ease-out;
            color: white;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tile-merged {
            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Tile Gradients */
        .tile-2 { background: linear-gradient(135deg, #3a3a5f, #2a2a4a); font-size: 32px; }
        .tile-4 { background: linear-gradient(135deg, #4a4a7f, #3a3a6f); font-size: 32px; }
        .tile-8 { background: linear-gradient(135deg, #FB7299, #d64a74); font-size: 32px; }
        .tile-16 { background: linear-gradient(135deg, #ff8aa5, #FB7299); font-size: 28px; }
        .tile-32 { background: linear-gradient(135deg, #ff4757, #ff6b81); font-size: 28px; }
        .tile-64 { background: linear-gradient(135deg, #ff6b81, #ff4757); font-size: 28px; }
        .tile-128 { background: linear-gradient(135deg, #00f2ff, #00d2df); color: #000; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); font-size: 24px; }
        .tile-256 { background: linear-gradient(135deg, #7a2ff7, #bc13fe); box-shadow: 0 0 25px rgba(122, 47, 247, 0.4); font-size: 24px; }
        .tile-512 { background: linear-gradient(135deg, #ff9f43, #ffaf40); color: #000; box-shadow: 0 0 30px rgba(255, 159, 67, 0.4); font-size: 24px; }
        .tile-1024 { background: linear-gradient(135deg, #1dd1a1, #10ac84); color: #000; font-size: 20px; }
        .tile-2048 { background: linear-gradient(135deg, #FFD700, #ff9f43); color: #000; box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); font-size: 20px; }

        .game-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 40px;
            text-align: center;
            padding: 20px;
            visibility: visible;
        }

        .btn-restart {
            margin-top: 20px;
            padding: 12px 35px;
            background: var(--primary-pink);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(251, 114, 153, 0.3);
        }

        .btn-restart:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(251, 114, 153, 0.5); }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 30px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px; font-weight: 600;
        }

        .controls-hint {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 480px) {
            .grid { grid-gap: 8px; padding: 8px; }
            .tile { width: calc(25% - 6px); height: calc(25% - 6px); border-radius: 8px; }
            .tile-container { top: 8px; left: 8px; right: 8px; bottom: 8px; }
            .grid-cell { border-radius: 8px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回游艺场</a>

    <div class="game-container" id="game-area">
        <div class="header">
            <div class="title-group">
                <h1>2048</h1>
                <div style="color: rgba(255,255,255,0.5); font-size: 12px;">星际跃迁版</div>
            </div>
            <div class="scores-row">
                <div class="score-box">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="current-score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Best</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="tile-container" id="tile-container"></div>
        </div>

        <div class="game-overlay" id="game-over">
            <h2 style="font-size: 3rem; color: var(--primary-pink); margin: 0;">跃迁中止</h2>
            <p style="color: white; opacity: 0.7; margin-top: 10px;">本次星际里程: <span id="final-score">0</span></p>
            <button class="btn-restart" onclick="game.restart()">再启航</button>
        </div>
    </div>

    <div class="controls-hint">
        使用键盘方向键或滑动屏幕控制
    </div>

    <script src="game-utils.js"></script>
    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.container = document.getElementById('tile-container');
                this.scoreEl = document.getElementById('current-score');
                this.bestEl = document.getElementById('best-score');
                this.overEl = document.getElementById('game-over');
                this.finalScoreEl = document.getElementById('final-score');
                this.restart();
            }

            restart() {
                this.board = Array(this.size).fill().map(() => Array(this.size).fill(0));
                this.score = 0;
                this.over = false;
                this.overEl.style.display = 'none';
                this.container.innerHTML = '';
                this.updateBest();
                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            updateBest() {
                this.best = GameUtils.getHighScore('star2048');
                this.bestEl.textContent = this.best;
            }

            addRandomTile() {
                const empty = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.board[r][c] === 0) empty.push({r, c});
                    }
                }
                if (empty.length > 0) {
                    const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                    this.board[r][c] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            render() {
                this.container.innerHTML = '';
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const val = this.board[r][c];
                        if (val > 0) {
                            const tile = document.createElement('div');
                            tile.className = `tile tile-${val}`;
                            tile.textContent = val;
                            
                            // 修复对齐逻辑：使用 calc 结合百分比和间隙补偿
                            // 基准偏移 c * 25%，每个格子间隙补偿 c * (12/4) = c * 3px
                            tile.style.left = `calc(${c} * (25% + 3px))`;
                            tile.style.top = `calc(${r} * (25% + 3px))`;
                            
                            // 设置方块尺寸，减去间隙占用的空间 (12px * 3 / 4 = 9px)
                            const gap = window.innerWidth <= 480 ? 8 : 12;
                            const corr = gap * 0.75;
                            tile.style.width = `calc(25% - ${corr}px)`;
                            tile.style.height = `calc(25% - ${corr}px)`;
                            
                            this.container.appendChild(tile);
                        }
                    }
                }
                this.scoreEl.textContent = this.score;
            }

            move(dir) {
                if (this.over) return;
                let moved = false;
                const prevBoard = JSON.stringify(this.board);

                const rotate = (board) => board[0].map((_, i) => board.map(row => row[i]).reverse());
                
                let tempBoard = JSON.parse(JSON.stringify(this.board));
                
                // Align to "left" move
                const rotations = { 'left': 0, 'up': 3, 'right': 2, 'down': 1 };
                for (let i = 0; i < rotations[dir]; i++) tempBoard = rotate(tempBoard);

                // Slide and merge
                for (let r = 0; r < this.size; r++) {
                    let row = tempBoard[r].filter(v => v !== 0);
                    for (let i = 0; i < row.length - 1; i++) {
                        if (row[i] === row[i+1]) {
                            row[i] *= 2;
                            this.score += row[i];
                            row.splice(i+1, 1);
                            moved = true;
                        }
                    }
                    while (row.length < this.size) row.push(0);
                    tempBoard[r] = row;
                }

                // Rotate back
                for (let i = 0; i < (4 - rotations[dir]) % 4; i++) tempBoard = rotate(tempBoard);

                if (JSON.stringify(tempBoard) !== prevBoard) {
                    this.board = tempBoard;
                    this.addRandomTile();
                    this.render();
                    if (this.isGameOver()) this.gameOver();
                }
            }

            isGameOver() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.board[r][c] === 0) return false;
                        if (c < this.size - 1 && this.board[r][c] === this.board[r][c+1]) return false;
                        if (r < this.size - 1 && this.board[r][c] === this.board[r+1][c]) return false;
                    }
                }
                return true;
            }

            gameOver() {
                this.over = true;
                const isNewHigh = GameUtils.saveScore('star2048', this.score);
                this.finalScoreEl.textContent = this.score;
                this.overEl.style.display = 'flex';
                if (isNewHigh) {
                    GameUtils.showToast('新纪录！', 'success');
                    this.updateBest();
                }
            }
        }

        const game = new Game2048();

        window.addEventListener('keydown', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                game.move(e.key.replace('Arrow', '').toLowerCase());
            }
        });

        GameUtils.initSwipe(document.getElementById('game-area'), dir => game.move(dir));
    </script>
</body>
</html>
