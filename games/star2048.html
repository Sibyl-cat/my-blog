<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际 2048 · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        .game-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .score-container {
            background: rgba(251, 114, 153, 0.1);
            padding: 10px 25px;
            border-radius: 20px;
            border: 1px solid rgba(251, 114, 153, 0.3);
            text-align: center;
        }

        .score-label { font-size: 10px; text-transform: uppercase; color: #FB7299; letter-spacing: 1px; }
        .score-value { font-size: 28px; font-weight: 800; color: white; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 15px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 25px;
            position: relative;
        }

        .cell {
            width: 85px;
            height: 85px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            transition: all 0.1s ease;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Tile colors with premium gradients */
        .tile-2 { background: linear-gradient(135deg, rgba(251, 114, 153, 0.2), rgba(251, 114, 153, 0.1)); color: #fff; box-shadow: 0 4px 15px rgba(251, 114, 153, 0.2); }
        .tile-4 { background: linear-gradient(135deg, rgba(251, 114, 153, 0.4), rgba(251, 114, 153, 0.2)); color: #fff; box-shadow: 0 4px 15px rgba(251, 114, 153, 0.3); }
        .tile-8 { background: linear-gradient(135deg, rgba(251, 114, 153, 0.6), rgba(251, 114, 153, 0.3)); color: #fff; }
        .tile-16 { background: #FB7299; color: #fff; }
        .tile-32 { background: #ff8aa5; color: #fff; }
        .tile-64 { background: #ff4757; color: #fff; }
        .tile-128 { background: #00f2ff; color: #000; box-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }
        .tile-256 { background: #7a2ff7; color: #fff; box-shadow: 0 0 25px rgba(122, 47, 247, 0.5); }
        .tile-512 { background: #ff9f43; color: #000; box-shadow: 0 0 30px rgba(255, 159, 67, 0.5); }
        .tile-1024 { background: #1dd1a1; color: #000; }
        .tile-2048 { background: linear-gradient(135deg, #FFD700, #ff9f43); color: #000; box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            z-index: 100;
        }

        .btn-restart {
            margin-top: 30px;
            padding: 15px 40px;
            background: #FB7299;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(251, 114, 153, 0.3);
        }

        .btn-restart:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(251, 114, 153, 0.5); }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 12px 24px; border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 500px) {
            .cell { width: 65px; height: 65px; font-size: 20px; }
            .grid { grid-gap: 10px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回游艺场</a>

    <div class="game-wrapper">
        <div class="header">
            <h1 style="font-size: 2.5rem; color: #FB7299; margin: 0; letter-spacing: -1px;">Star 2048</h1>
            <div class="score-container">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
        </div>

        <div class="grid" id="grid">
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>

        <div class="overlay" id="overlay">
            <h2 style="font-size: 3.5rem; color: #FB7299; margin: 0;">GAME OVER</h2>
            <p id="final-score" style="color: white; opacity: 0.7; font-size: 1.5rem; margin-top: 10px;">最终得分: 0</p>
            <button class="btn-restart" onclick="resetGame()">再来一局</button>
        </div>
    </div>

    <script>
        let board = Array(16).fill(0);
        let score = 0;
        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const finalScoreElement = document.getElementById('final-score');

        function init() {
            board = Array(16).fill(0);
            score = 0;
            addRandomTile();
            addRandomTile();
            updateBoard();
        }

        function addRandomTile() {
            const emptyCells = board.map((val, idx) => val === 0 ? idx : null).filter(val => val !== null);
            if (emptyCells.length > 0) {
                const randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomIdx] = Math.random() < 0.9 ? 2 : 4;
                return true;
            }
            return false;
        }

        function updateBoard() {
            const cells = gridElement.querySelectorAll('.cell');
            cells.forEach((cell, idx) => {
                const value = board[idx];
                cell.textContent = value === 0 ? '' : value;
                cell.className = 'cell' + (value ? ` tile-${value}` : '');
            });
            scoreElement.textContent = score;
        }

        function move(direction) {
            let moved = false;
            const size = 4;

            function slide(line, reverse) {
                if (reverse) line.reverse();
                let nonZero = line.filter(x => x !== 0);
                for (let j = 0; j < nonZero.length - 1; j++) {
                    if (nonZero[j] === nonZero[j + 1]) {
                        nonZero[j] *= 2;
                        score += nonZero[j];
                        nonZero[j + 1] = 0;
                    }
                }
                nonZero = nonZero.filter(x => x !== 0);
                while (nonZero.length < size) nonZero.push(0);
                if (reverse) nonZero.reverse();
                return nonZero;
            }

            const isVertical = direction === 'up' || direction === 'down';
            const isReverse = direction === 'right' || direction === 'down';

            for (let i = 0; i < size; i++) {
                let line = [];
                for (let j = 0; j < size; j++) {
                    line.push(isVertical ? board[j * size + i] : board[i * size + j]);
                }
                let newLine = slide(line, isReverse);
                for (let j = 0; j < size; j++) {
                    const idx = isVertical ? j * size + i : i * size + j;
                    if (board[idx] !== newLine[j]) moved = true;
                    board[idx] = newLine[j];
                }
            }

            if (moved) {
                addRandomTile();
                updateBoard();
                if (isGameOver()) gameOver();
            }
        }

        function isGameOver() {
            if (board.includes(0)) return false;
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const current = board[i * 4 + j];
                    if (j < 3 && current === board[i * 4 + (j + 1)]) return false;
                    if (i < 3 && current === board[(i + 1) * 4 + j]) return false;
                }
            }
            return true;
        }

        function gameOver() {
            overlay.style.display = 'flex';
            finalScoreElement.textContent = `最终得分: ${score}`;
        }

        function resetGame() {
            overlay.style.display = 'none';
            init();
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
        });

        init();
    </script>
</body>
</html>
