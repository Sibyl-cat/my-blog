<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>织星小恐龙 · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 250px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 2px solid rgba(255, 159, 67, 0.5);
            overflow: hidden;
            border-radius: 20px 20px 0 0;
        }

        #dino {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 44px;
            height: 48px;
            background: #ff9f43;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #000;
            z-index: 10;
        }

        .obstacle {
            position: absolute;
            bottom: 0;
            width: 30px;
            height: 40px;
            background: #ff4757;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            height: 20px;
            border-radius: 10px;
        }

        .game-info {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 24px;
            font-weight: 800;
            color: #ff9f43;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }

        .btn-start {
            margin-top: 20px;
            padding: 12px 35px;
            background: #ff9f43;
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start:hover { transform: scale(1.1); }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 12px 24px; border-radius: 30px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回游艺场</a>

    <div style="text-align: center; margin-bottom: 50px;">
        <h1 style="color: #ff9f43; font-size: 2.5rem; margin: 0;">Starry Dino</h1>
        <p style="color: white; opacity: 0.5;">[空格] 或 [点击] 向上跳跃</p>
    </div>

    <div id="game-container">
        <div id="dino"><i class="fas fa-dragon"></i></div>
        <div id="score" class="game-info">00000</div>
        
        <div id="overlay" class="overlay">
            <h2 id="msg" style="color: #ff9f43; font-size: 3rem;">Ready?</h2>
            <button class="btn-start" onclick="startGame()">开始奔跑</button>
        </div>
    </div>

    <script>
        const dino = document.getElementById('dino');
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const msg = document.getElementById('msg');

        let dinoY = 0;
        let isJumping = false;
        let gravity = 0.9;
        let score = 0;
        let gameActive = false;
        let speed = 6;

        function jump() {
            if (isJumping || !gameActive) return;
            isJumping = true;
            let upTimerId = setInterval(function () {
                // Move up
                if (dinoY >= 150) {
                    clearInterval(upTimerId);
                    // Move down
                    let downTimerId = setInterval(function () {
                        if (dinoY <= 0) {
                            clearInterval(downTimerId);
                            isJumping = false;
                            dinoY = 0;
                        }
                        dinoY -= 5;
                        dino.style.bottom = dinoY + 'px';
                    }, 20);
                }
                dinoY += 30;
                dino.style.bottom = dinoY + 'px';
            }, 20);
        }

        function createObstacle() {
            if (!gameActive) return;
            const obstacle = document.createElement('div');
            obstacle.classList.add('obstacle');
            obstacle.innerHTML = '<i class="fas fa-meteor"></i>';
            container.appendChild(obstacle);
            
            let obstaclePosition = 800;
            obstacle.style.left = obstaclePosition + 'px';

            let timerId = setInterval(function() {
                if (obstaclePosition > 50 && obstaclePosition < 94 && dinoY < 40) {
                    gameOver();
                    clearInterval(timerId);
                }

                obstaclePosition -= speed;
                obstacle.style.left = obstaclePosition + 'px';

                if (obstaclePosition < -30) {
                    clearInterval(timerId);
                    container.removeChild(obstacle);
                    score++;
                    updateScore();
                    if (score % 5 === 0) speed += 0.5; // Increase difficulty
                }
            }, 20);

            if (gameActive) {
                let randomTime = Math.random() * 2000 + 700;
                setTimeout(createObstacle, randomTime / (speed/6));
            }
        }

        function updateScore() {
            scoreEl.textContent = score.toString().padStart(5, '0');
        }

        function startGame() {
            score = 0;
            speed = 6;
            updateScore();
            gameActive = true;
            overlay.style.display = 'none';
            // Clear existing obstacles
            document.querySelectorAll('.obstacle').forEach(o => o.remove());
            createObstacle();
        }

        function gameOver() {
            gameActive = false;
            overlay.style.display = 'flex';
            msg.textContent = "GAME OVER";
        }

        document.addEventListener('keydown', e => {
            if (e.code === 'Space') jump();
        });
        container.addEventListener('click', jump);
    </script>
</body>
</html>
