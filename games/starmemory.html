<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星际记忆 · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-back: #1a1a2e;
            --card-front: #16213e;
            --accent: #00f2ff;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050510;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        .game-header {
            margin-bottom: 20px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: min(90vw, 500px);
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 1/1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: pulse 0.5s ease-out;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); box-shadow: 0 0 30px var(--accent); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .card-front {
            background: var(--card-front);
            transform: rotateY(180deg);
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .card-back {
            background: var(--card-back);
            background-image: radial-gradient(circle at center, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
        }

        .card-back::after {
            content: '\f005';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            opacity: 0.2;
        }

        .hud {
            margin-top: 30px;
            display: flex;
            gap: 40px;
        }

        .stat { text-align: center; }
        .stat-val { font-size: 24px; font-weight: 800; display: block; }
        .stat-label { font-size: 12px; color: var(--accent); text-transform: uppercase; }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }

        .btn {
            padding: 15px 40px; background: var(--accent); color: #000;
            border: none; border-radius: 50px; font-weight: 800; cursor: pointer;
            margin-top: 20px;
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>

    <div class="game-header">
        <h1 style="margin: 0; letter-spacing: 2px;">STAR MEMORY</h1>
        <p style="opacity: 0.5;">寻找星空中的配对</p>
    </div>

    <div class="grid" id="grid"></div>

    <div class="hud">
        <div class="stat">
            <span class="stat-val" id="moves">0</span>
            <span class="stat-label">Moves</span>
        </div>
        <div class="stat">
            <span class="stat-val" id="time">00:00</span>
            <span class="stat-label">Time</span>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <h2 style="font-size: 3rem; margin: 0;">完美匹配！</h2>
        <p id="result-msg" style="margin: 10px 0; opacity: 0.7;"></p>
        <button class="btn" onclick="location.reload()">再来一局</button>
    </div>

    <script src="game-utils.js"></script>
    <script>
        const icons = ['fa-moon', 'fa-sun', 'fa-star', 'fa-rocket', 'fa-user-astronaut', 'fa-meteor', 'fa-satellite', 'fa-globe'];
        let cards = [...icons, ...icons];
        let flippedCards = [];
        let matchedCount = 0;
        let moves = 0;
        let startTime = null;
        let timer = null;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            shuffle(cards).forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.icon = icon;
                card.innerHTML = `
                    <div class="card-face card-front"><i class="fas ${icon}"></i></div>
                    <div class="card-face card-back"></div>
                `;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (flippedCards.length === 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            if (!startTime) {
                startTime = Date.now();
                timer = setInterval(updateTimer, 1000);
            }

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.icon === c2.dataset.icon) {
                c1.classList.add('matched');
                c2.classList.add('matched');
                matchedCount += 2;
                flippedCards = [];
                if (matchedCount === cards.length) win();
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function updateTimer() {
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('time').textContent = `${m}:${s}`;
        }

        function win() {
            clearInterval(timer);
            const finalTime = document.getElementById('time').textContent;
            const score = Math.max(0, 10000 - moves * 100 - (Math.floor((Date.now() - startTime)/1000) * 10));
            const isNew = GameUtils.saveScore('starmemory', score);
            
            document.getElementById('result-msg').innerHTML = `耗时: ${finalTime} | 步数: ${moves}<br>${isNew ? '<b>新防卫纪录！</b>' : ''}`;
            document.getElementById('overlay').style.display = 'flex';
            if (isNew) GameUtils.showToast('记录刷新！', 'success');
        }

        createGrid();
    </script>
</body>
</html>
