<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #FB7299;
            --neon-purple: #bc13fe;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050510;
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stats-container {
            width: 90%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            min-width: 100px;
        }

        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--neon-blue); letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 800; color: white; }

        #canvas-container {
            position: relative;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 30px;
            padding: 10px;
            border: 2px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        #game-canvas {
            border-radius: 20px;
            display: block;
            max-width: 100%;
            height: auto;
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 30px;
            width: 240px;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .ctrl-btn:active { background: rgba(0, 242, 255, 0.2); transform: scale(0.95); }

        .game-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 30px;
            text-align: center;
            padding: 20px;
            visibility: visible;
        }

        .btn-start {
            margin-top: 2rem;
            padding: 1.2rem 3rem;
            background: var(--neon-blue);
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transition: all 0.3s;
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 30px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); z-index: 200;
        }

        @media (max-width: 768px) {
            .mobile-controls { display: grid; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回游艺场</a>

    <div class="game-wrapper">
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">High Score</div>
                <div id="high-score" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Score</div>
                <div id="current-score" class="stat-value">0</div>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="game-canvas" width="400" height="400"></canvas>
            
            <div class="game-overlay" id="overlay">
                <h1 style="font-size: 3rem; color: var(--neon-blue); text-shadow: 0 0 20px rgba(0,242,255,0.5); margin: 0;">NEON SNAKE</h1>
                <p id="overlay-msg" style="color: white; opacity: 0.6; margin-top: 10px;">光速竞技，挑战霓虹极限</p>
                <button class="btn-start" onclick="game.start()">启动引擎</button>
            </div>
        </div>

        <div class="mobile-controls">
            <div></div>
            <button class="ctrl-btn" onclick="game.setDir('up')"><i class="fas fa-chevron-up"></i></button>
            <div></div>
            <button class="ctrl-btn" onclick="game.setDir('left')"><i class="fas fa-chevron-left"></i></button>
            <button class="ctrl-btn" onclick="game.setDir('down')"><i class="fas fa-chevron-down"></i></button>
            <button class="ctrl-btn" onclick="game.setDir('right')"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <script src="game-utils.js"></script>
    <script>
        class NeonSnake {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.scoreEl = document.getElementById('current-score');
                this.highScoreEl = document.getElementById('high-score');
                this.overlay = document.getElementById('overlay');
                this.overlayMsg = document.getElementById('overlay-msg');
                
                this.gridSize = 20;
                this.tileCount = this.canvas.width / this.gridSize;
                
                this.highScore = GameUtils.getHighScore('neonsnake');
                this.highScoreEl.textContent = this.highScore;
                
                this.active = false;
                this.init();
            }

            init() {
                this.snake = [
                    {x: 10, y: 10},
                    {x: 10, y: 11},
                    {x: 10, y: 12}
                ];
                this.dir = {x: 0, y: -1};
                this.nextDir = {x: 0, y: -1};
                this.score = 0;
                this.speed = 7;
                this.spawnFood();
                this.updateUI();
            }

            start() {
                this.init();
                this.active = true;
                this.overlay.style.display = 'none';
                this.loop();
            }

            spawnFood() {
                this.food = {
                    x: Math.floor(Math.random() * this.tileCount),
                    y: Math.floor(Math.random() * this.tileCount)
                };
                if (this.snake.some(s => s.x === this.food.x && s.y === this.food.y)) this.spawnFood();
            }

            setDir(d) {
                if (d === 'up' && this.dir.y === 0) this.nextDir = {x: 0, y: -1};
                if (d === 'down' && this.dir.y === 0) this.nextDir = {x: 0, y: 1};
                if (d === 'left' && this.dir.x === 0) this.nextDir = {x: -1, y: 0};
                if (d === 'right' && this.dir.x === 0) this.nextDir = {x: 1, y: 0};
            }

            updateUI() {
                this.scoreEl.textContent = this.score;
                this.highScoreEl.textContent = this.highScore;
            }

            loop() {
                if (!this.active) return;

                this.dir = this.nextDir;
                const head = {x: this.snake[0].x + this.dir.x, y: this.snake[0].y + this.dir.y};

                // Walls
                if (head.x < 0 || head.x >= this.tileCount || head.y < 0 || head.y >= this.tileCount) {
                    return this.gameOver();
                }

                // Self
                if (this.snake.some(s => s.x === head.x && s.y === head.y)) {
                    return this.gameOver();
                }

                this.snake.unshift(head);

                if (head.x === this.food.x && head.y === this.food.y) {
                    this.score += 10;
                    this.speed = 7 + Math.floor(this.score / 50);
                    this.spawnFood();
                    this.updateUI();
                } else {
                    this.snake.pop();
                }

                this.draw();
                setTimeout(() => this.loop(), 1000 / this.speed);
            }

            draw() {
                this.ctx.fillStyle = '#050510';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Grid (subtle)
                this.ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
                for(let i=0; i<=this.canvas.width; i+=this.gridSize) {
                    this.ctx.beginPath(); this.ctx.moveTo(i, 0); this.ctx.lineTo(i, this.canvas.height); this.ctx.stroke();
                    this.ctx.beginPath(); this.ctx.moveTo(0, i); this.ctx.lineTo(this.canvas.width, i); this.ctx.stroke();
                }

                // Food
                this.ctx.shadowBlur = 15;
                this.ctx.shadowColor = '#FB7299';
                this.ctx.fillStyle = '#FB7299';
                this.ctx.beginPath();
                this.ctx.arc((this.food.x+0.5)*this.gridSize, (this.food.y+0.5)*this.gridSize, this.gridSize/3, 0, Math.PI*2);
                this.ctx.fill();

                // Snake
                this.ctx.shadowColor = '#00f2ff';
                this.snake.forEach((s, i) => {
                    const alpha = 1 - (i / this.snake.length) * 0.6;
                    this.ctx.fillStyle = `rgba(0, 242, 255, ${alpha})`;
                    this.ctx.shadowBlur = i === 0 ? 15 : 5;
                    this.ctx.beginPath();
                    this.ctx.roundRect(s.x*this.gridSize+1, s.y*this.gridSize+1, this.gridSize-2, this.gridSize-2, 6);
                    this.ctx.fill();
                });
                this.ctx.shadowBlur = 0;
            }

            gameOver() {
                this.active = false;
                const isNewHigh = GameUtils.saveScore('neonsnake', this.score);
                this.overlayMsg.innerHTML = `最终里程: ${this.score}<br>${isNewHigh ? '<b>新纪录！</b>' : ''}`;
                if (isNewHigh) {
                    this.highScore = this.score;
                    this.updateUI();
                    GameUtils.showToast('记录刷新！', 'success');
                }
                this.overlay.style.display = 'flex';
            }
        }

        const game = new NeonSnake();

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') game.setDir('up');
            if (e.key === 'ArrowDown') game.setDir('down');
            if (e.key === 'ArrowLeft') game.setDir('left');
            if (e.key === 'ArrowRight') game.setDir('right');
        });

        GameUtils.initSwipe(document.getElementById('canvas-container'), dir => game.setDir(dir));

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
            }
        }
    </script>
</body>
</html>
