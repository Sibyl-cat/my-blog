<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            margin: 0;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            z-index: 10;
        }

        #game-canvas {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            border: 2px solid rgba(0, 242, 255, 0.2);
            cursor: none;
        }

        .game-ui {
            position: absolute;
            top: -60px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label { font-size: 10px; text-transform: uppercase; color: #00f2ff; letter-spacing: 1px; }
        .stat-value { font-size: 20px; font-weight: 800; color: white; }

        .game-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
            transition: all 0.3s;
        }

        .btn-action {
            margin-top: 2rem;
            padding: 1rem 3rem;
            background: #00f2ff;
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .btn-action:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回游艺场</a>

    <div class="game-wrapper">
        <div class="game-ui">
            <div class="stat-card">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Speed</div>
                <div id="speed" class="stat-value">Lv.1</div>
            </div>
        </div>

        <canvas id="game-canvas" width="450" height="450"></canvas>

        <div class="game-overlay" id="overlay">
            <h1 style="font-size: 3rem; color: #00f2ff; text-shadow: 0 0 20px rgba(0,242,255,0.5);">NEON SNAKE</h1>
            <p id="msg" style="color: white; opacity: 0.7;">速度随分数提升，挑战极限反应</p>
            <button class="btn-action" onclick="startGame()">开始游戏</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const speedEl = document.getElementById('speed');
        const overlay = document.getElementById('overlay');
        const msgEl = document.getElementById('msg');

        const gridSize = 25;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let dx = 0, dy = 0;
        let score = 0;
        let gameActive = false;
        let baseSpeed = 7;
        let currentSpeed = baseSpeed;
        let timeoutId;

        function init() {
            snake = [
                {x: 10, y: 10},
                {x: 10, y: 11},
                {x: 10, y: 12}
            ];
            dx = 0; dy = -1;
            score = 0;
            currentSpeed = baseSpeed;
            updateStats();
        }

        function startGame() {
            init();
            spawnFood();
            gameActive = true;
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 300);
            gameLoop();
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            if (snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
        }

        function gameLoop() {
            if (!gameActive) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Collisions
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || 
                snake.some(s => s.x === head.x && s.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateStats();
                spawnFood();
                // Increase speed every 50 points
                currentSpeed = baseSpeed + Math.floor(score / 50);
            } else {
                snake.pop();
            }

            draw();
            
            // Dynamic interval
            clearTimeout(timeoutId);
            timeoutId = setTimeout(gameLoop, 1000 / currentSpeed);
        }

        function updateStats() {
            scoreEl.textContent = score;
            speedEl.textContent = 'Lv.' + (Math.floor(score / 50) + 1);
        }

        function draw() {
            // Background
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid lines (subtle)
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Food
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#FB7299';
            ctx.fillStyle = '#FB7299';
            ctx.beginPath();
            ctx.arc((food.x+0.5)*gridSize, (food.y+0.5)*gridSize, gridSize/3, 0, Math.PI*2);
            ctx.fill();

            // Snake
            ctx.shadowColor = '#00f2ff';
            snake.forEach((s, i) => {
                const alpha = 1 - (i / snake.length) * 0.7;
                ctx.fillStyle = `rgba(0, 242, 255, ${alpha})`;
                ctx.shadowBlur = i === 0 ? 20 : 5;
                
                // Draw rounded body
                const r = 8;
                ctx.beginPath();
                ctx.roundRect(s.x*gridSize+2, s.y*gridSize+2, gridSize-4, gridSize-4, r);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            gameActive = false;
            msgEl.textContent = `最终得分: ${score} | 速度等级: ${Math.floor(score/50)+1}`;
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';
        }

        window.addEventListener('keydown', e => {
            if (!gameActive) return;
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx === 0) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx === 0) { dx = 1; dy = 0; }
        });

        // RoundRect Polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            }
        }
    </script>
</body>
</html>
