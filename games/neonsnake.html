<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake</title>
    <style>
        :root {
            --primary-pink: #FB7299;
            --primary-pink-glow: rgba(251, 114, 153, 0.6);
            --neon-blue: #00f2ff;
            --neon-blue-glow: rgba(0, 242, 255, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 450px;
            color: white;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 320px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .score-box {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-pink);
            text-shadow: 0 0 10px var(--primary-pink-glow);
        }

        #game-canvas {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .btn-start {
            padding: 12px 30px;
            background: var(--primary-pink);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 20px var(--primary-pink-glow);
            transition: all 0.3s;
        }

        .btn-start:hover {
            transform: scale(1.1);
            background: #ff8aa5;
        }

        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 120px;
            margin-left: auto;
            margin-right: auto;
        }

        .control-btn {
            width: 35px;
            height: 35px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .control-btn:active {
            background: var(--primary-pink);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h2 style="font-size: 22px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue-glow);">Neon Snake</h2>
            <div class="score-box" id="score">0</div>
        </div>

        <canvas id="game-canvas" width="280" height="280"></canvas>

        <div class="overlay" id="overlay">
            <h1 id="msg" style="margin-bottom: 20px; font-size: 28px;">Snake</h1>
            <button class="btn-start" onclick="startGame()">开始游戏</button>
        </div>

        <div class="controls">
            <div></div><div class="control-btn" onclick="changeDir('up')">↑</div><div></div>
            <div class="control-btn" onclick="changeDir('left')">←</div><div class="control-btn" onclick="changeDir('down')">↓</div><div class="control-btn" onclick="changeDir('right')">→</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const msgElement = document.getElementById('msg');

        const gridSize = 14;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop;
        let lastTime = 0;
        const fps = 10;

        function startGame() {
            snake = [{x: 10, y: 10}];
            generateFood();
            dx = 1; dy = 0;
            score = 0;
            scoreElement.textContent = score;
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 300);
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, 1000 / fps);
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Don't spawn food on snake
            if (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                generateFood();
            }
        }

        function draw() {
            // Move snake
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return gameOver();
            }

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }

            // Render
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw food
            ctx.fillStyle = varColor('--primary-pink');
            ctx.shadowBlur = 15;
            ctx.shadowColor = varColor('--primary-pink-glow');
            ctx.beginPath();
            ctx.arc((food.x + 0.5) * gridSize, (food.y + 0.5) * gridSize, gridSize / 2.5, 0, Math.PI * 2);
            ctx.fill();

            // Draw snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? varColor('--neon-blue') : 'rgba(0, 242, 255, 0.5)';
                ctx.shadowBlur = index === 0 ? 15 : 5;
                ctx.shadowColor = varColor('--neon-blue-glow');
                
                ctx.beginPath();
                const r = index === 0 ? gridSize / 2.2 : gridSize / 3;
                ctx.roundRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2, 4);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function gameOver() {
            clearInterval(gameLoop);
            msgElement.textContent = 'Game Over';
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.opacity = '1', 10);
        }

        function changeDir(dir) {
            if (dir === 'up' && dy === 0) { dx = 0; dy = -1; }
            if (dir === 'down' && dy === 0) { dx = 0; dy = 1; }
            if (dir === 'left' && dx === 0) { dx = -1; dy = 0; }
            if (dir === 'right' && dx === 0) { dx = 1; dy = 0; }
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') changeDir('up');
            if (e.key === 'ArrowDown') changeDir('down');
            if (e.key === 'ArrowLeft') changeDir('left');
            if (e.key === 'ArrowRight') changeDir('right');
        });

        // Add roundRect polyfill if needed
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            }
        }
    </script>
</body>
</html>
