<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陨石生存战 · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050510;
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: min(95vw, 600px);
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-label { font-size: 10px; color: var(--neon-blue); text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: 800; color: white; }

        .game-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 2rem;
        }

        .btn-start {
            margin-top: 2rem;
            padding: 1.2rem 3rem;
            background: var(--neon-blue);
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 30px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); z-index: 200;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>

    <div class="game-container" id="game-area">
        <canvas id="game-canvas"></canvas>
        
        <div class="hud">
            <div class="stat-box">
                <div class="stat-label">Time</div>
                <div id="time" class="stat-value">0s</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Kills</div>
                <div id="score" class="stat-value">0</div>
            </div>
        </div>

        <div id="overlay" class="game-overlay">
            <h1 style="color: var(--neon-blue); font-size: 3rem; margin: 0;">METEOR SURVIVOR</h1>
            <p id="overlay-msg" style="color: white; opacity: 0.6; margin: 1rem 0;">在陨石雨中生存。拖动移动，自动射击。</p>
            <button class="btn-start" onclick="game.start()">进入虚空</button>
        </div>
    </div>

    <script src="game-utils.js"></script>
    <script>
        class MeteorSurvivor {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.timeEl = document.getElementById('time');
                this.scoreEl = document.getElementById('score');
                this.overlay = document.getElementById('overlay');
                this.overlayMsg = document.getElementById('overlay-msg');
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                this.mouse = { x: this.canvas.width / 2, y: this.canvas.height / 2 };
                this.canvas.onmousemove = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    this.mouse.x = (e.clientX - rect.left) * (this.canvas.width / rect.width);
                    this.mouse.y = (e.clientY - rect.top) * (this.canvas.height / rect.height);
                };
                this.canvas.ontouchmove = (e) => {
                    e.preventDefault();
                    const rect = this.canvas.getBoundingClientRect();
                    this.mouse.x = (e.touches[0].clientX - rect.left) * (this.canvas.width / rect.width);
                    this.mouse.y = (e.touches[0].clientY - rect.top) * (this.canvas.height / rect.height);
                };

                this.active = false;
            }

            resize() {
                this.canvas.width = 600;
                this.canvas.height = 600;
            }

            init() {
                this.player = { x: 300, y: 300, r: 18, angle: 0 };
                this.enemies = [];
                this.bullets = [];
                this.particles = [];
                this.trails = [];
                this.score = 0;
                this.startTime = Date.now();
                this.lastSpawn = 0;
                this.lastShot = 0;
                this.updateUI();
            }

            start() {
                this.init();
                this.active = true;
                this.overlay.style.display = 'none';
                this.loop();
            }

            updateUI() {
                this.scoreEl.textContent = this.score;
            }

            loop() {
                if (!this.active) return;
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }

            update() {
                const now = Date.now();
                const survivalTime = (now - this.startTime) / 1000;
                this.timeEl.textContent = Math.floor(survivalTime) + 's';
                
                // Player movement & rotation
                const dx = this.mouse.x - this.player.x;
                const dy = this.mouse.y - this.player.y;
                if (Math.hypot(dx, dy) > 5) {
                    this.player.x += dx * 0.1;
                    this.player.y += dy * 0.1;
                    this.player.angle = Math.atan2(dy, dx);
                }

                // Trails
                if (now % 2 === 0) {
                    this.trails.push({ x: this.player.x, y: this.player.y, life: 1 });
                }
                this.trails.forEach((t, i) => {
                    t.life -= 0.05;
                    if (t.life <= 0) this.trails.splice(i, 1);
                });

                // Spawn enemies (Smarter Curve)
                const spawnRate = Math.max(150, 1200 - survivalTime * 15);
                if (now - this.lastSpawn > spawnRate) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 500;
                    this.enemies.push({
                        x: 300 + Math.cos(angle) * dist,
                        y: 300 + Math.sin(angle) * dist,
                        r: 15 + Math.random() * 20,
                        hp: 1 + Math.floor(survivalTime / 40),
                        speed: 1.2 + Math.random() * 0.8 + (survivalTime / 100)
                    });
                    this.lastSpawn = now;
                }

                // Auto shot (Smooth)
                const fireRate = Math.max(100, 400 - (survivalTime * 2));
                if (now - this.lastShot > fireRate && this.enemies.length > 0) {
                    let target = null;
                    let minDist = 300;
                    this.enemies.forEach(e => {
                        const d = Math.hypot(e.x - this.player.x, e.y - this.player.y);
                        if (d < minDist) { minDist = d; target = e; }
                    });
                    
                    if (target) {
                        const angle = Math.atan2(target.y - this.player.y, target.x - this.player.x);
                        this.bullets.push({ 
                            x: this.player.x, y: this.player.y, 
                            vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10 
                        });
                        this.lastShot = now;
                    }
                }

                // Update items
                this.bullets.forEach((b, i) => {
                    b.x += b.vx; b.y += b.vy;
                    if (b.x < -100 || b.x > 700 || b.y < -100 || b.y > 700) this.bullets.splice(i, 1);
                });

                this.enemies.forEach((e, i) => {
                    const angle = Math.atan2(this.player.y - e.y, this.player.x - e.x);
                    e.x += Math.cos(angle) * e.speed;
                    e.y += Math.sin(angle) * e.speed;

                    // Collision with bullets
                    this.bullets.forEach((b, bj) => {
                        if (Math.hypot(b.x - e.x, b.y - e.y) < e.r) {
                            e.hp--;
                            this.bullets.splice(bj, 1);
                            this.createExplosion(e.x, e.y, '#bc13fe', 3);
                            if (e.hp <= 0) {
                                this.enemies.splice(i, 1);
                                this.score += 10;
                                this.scoreEl.textContent = this.score;
                                this.createExplosion(e.x, e.y, '#bc13fe', 12);
                            }
                        }
                    });

                    // Collision with Player
                    if (Math.hypot(e.x - this.player.x, e.y - this.player.y) < e.r + 10) {
                        this.gameOver(Math.floor(survivalTime));
                    }
                });

                this.particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                    if (p.life <= 0) this.particles.splice(i, 1);
                });
            }

            createExplosion(x, y, color, count) {
                for(let i=0; i<count; i++) {
                    this.particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 1,
                        color
                    });
                }
            }

            draw() {
                this.ctx.fillStyle = '#050510';
                this.ctx.fillRect(0, 0, 600, 600);

                // Grid
                this.ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
                for(let i=0; i<600; i+=100) {
                    this.ctx.beginPath(); this.ctx.moveTo(i, 0); this.ctx.lineTo(i, 600); this.ctx.stroke();
                    this.ctx.beginPath(); this.ctx.moveTo(0, i); this.ctx.lineTo(600, i); this.ctx.stroke();
                }

                // Player Trails
                this.trails.forEach(t => {
                    this.ctx.globalAlpha = t.life * 0.3;
                    this.ctx.fillStyle = '#00f2ff';
                    this.ctx.beginPath();
                    this.ctx.arc(t.x, t.y, 8 * t.life, 0, Math.PI*2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1;

                // Player (Ship)
                this.ctx.save();
                this.ctx.translate(this.player.x, this.player.y);
                this.ctx.rotate(this.player.angle);
                this.ctx.shadowBlur = 15;
                this.ctx.shadowColor = '#00f2ff';
                this.ctx.fillStyle = '#00f2ff';
                this.ctx.beginPath();
                this.ctx.moveTo(15, 0);
                this.ctx.lineTo(-10, -12);
                this.ctx.lineTo(-10, 12);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.restore();
                this.ctx.shadowBlur = 0;

                // Bullets
                this.ctx.fillStyle = '#fff';
                this.bullets.forEach(b => {
                    this.ctx.beginPath();
                    this.ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
                    this.ctx.fill();
                });

                // Enemies (Meteors)
                this.enemies.forEach(e => {
                    this.ctx.save();
                    this.ctx.translate(e.x, e.y);
                    this.ctx.fillStyle = '#1e1e3f';
                    this.ctx.strokeStyle = '#bc13fe';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    for(let i=0; i<8; i++) {
                        const a = (i/8) * Math.PI * 2;
                        const r = e.r * (0.8 + Math.random() * 0.4);
                        const px = Math.cos(a) * r;
                        const py = Math.sin(a) * r;
                        if(i===0) this.ctx.moveTo(px, py); else this.ctx.lineTo(px, py);
                    }
                    this.ctx.closePath();
                    this.ctx.fill();
                    this.ctx.stroke();
                    this.ctx.restore();
                });

                // Particles
                this.particles.forEach(p => {
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1;
            }

            gameOver(time) {
                this.active = false;
                const isNew = GameUtils.saveScore('meteorsurvivor', this.score);
                this.overlay.style.display = 'flex';
                this.overlayMsg.innerHTML = `本次生还: ${time}s | 击破陨石: ${this.score}<br>${isNew ? '<b style="color:#00f2ff">创下新的星际纪录！</b>' : ''}`;
                if (isNew) GameUtils.showToast('记录刷新！', 'success');
            }
        }

        const game = new MeteorSurvivor();
    </script>
</body>
</html>
