<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Breaker</title>
    <style>
        :root {
            --primary-pink: #FB7299;
            --primary-pink-glow: rgba(251, 114, 153, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 480px;
            color: white;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 340px;
            padding: 15px;
            background: rgba(15, 15, 25, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .stats {
            display: flex;
            gap: 15px;
            font-size: 14px;
            font-weight: 600;
        }

        #game-canvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            display: block;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: crosshair;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
        }

        .btn-play {
            padding: 12px 35px;
            background: linear-gradient(135deg, var(--primary-pink), #ff8aa5);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 20px var(--primary-pink-glow);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px;
        }

        .btn-play:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 8px 25px var(--primary-pink-glow);
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h2 style="font-size: 20px; color: var(--primary-pink); letter-spacing: 1px;">Planet Breaker</h2>
            <div class="stats">
                <div>Score: <span id="score">0</span></div>
                <div>Lives: <span id="lives">3</span></div>
            </div>
        </div>

        <canvas id="game-canvas" width="310" height="320"></canvas>

        <div class="overlay" id="overlay">
            <h1 id="msg" style="font-size: 32px; background: linear-gradient(to right, #FB7299, #00f2ff); -webkit-background-clip: text; color: transparent;">READY?</h1>
            <p id="sub-msg" style="margin-top: 10px; opacity: 0.8;">击碎星辰，开启星际之旅</p>
            <button class="btn-play" onclick="startGame()">开始挑战</button>
        </div>

        <div class="controls-hint">
            使用鼠标或左右滑动控制挡板
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const overlay = document.getElementById('overlay');
        const msgElement = document.getElementById('msg');
        const subMsgElement = document.getElementById('sub-msg');

        let score = 0;
        let lives = 3;
        let gameRunning = false;

        // Paddle
        const paddleHeight = 10;
        const paddleWidth = 75;
        let paddleX = (canvas.width - paddleWidth) / 2;

        // Ball
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 2.5;
        let dy = -2.5;
        const ballRadius = 6;

        // Bricks
        const brickRowCount = 5;
        const brickColumnCount = 4;
        const brickWidth = 65;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 30;
        const brickOffsetLeft = 15;

        let bricks = [];
        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1, color: `hsla(${340 + r * 10}, 90%, 70%, 0.8)` };
                }
            }
        }

        // Input
        let rightPressed = false;
        let leftPressed = false;

        document.addEventListener("keydown", keyDownHandler, false);
        document.addEventListener("keyup", keyUpHandler, false);
        document.addEventListener("mousemove", mouseMoveHandler, false);
        canvas.addEventListener("touchmove", touchMoveHandler, { passive: false });

        function keyDownHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
            else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
        }

        function keyUpHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
            else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
        }

        function mouseMoveHandler(e) {
            const relativeX = e.clientX - canvas.getBoundingClientRect().left;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        }

        function touchMoveHandler(e) {
            e.preventDefault();
            const relativeX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        }

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score++;
                            scoreElement.textContent = score;
                            if (score === brickRowCount * brickColumnCount) {
                                winGame();
                            }
                        }
                    }
                }
            }
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#FB7299";
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight, 5);
            ctx.fillStyle = "#FB7299";
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        const brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brickWidth, brickHeight, 4);
                        ctx.fillStyle = bricks[c][r].color;
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function draw() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }
            if (y + dy < ballRadius) {
                dy = -dy;
            } else if (y + dy > canvas.height - ballRadius) {
                if (x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy;
                    // Add some speed
                    dx *= 1.05;
                    dy *= 1.05;
                } else {
                    lives--;
                    livesElement.textContent = lives;
                    if (!lives) {
                        gameOver();
                    } else {
                        x = canvas.width / 2;
                        y = canvas.height - 30;
                        dx = 2.5;
                        dy = -2.5;
                        paddleX = (canvas.width - paddleWidth) / 2;
                    }
                }
            }

            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 7;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= 7;
            }

            x += dx;
            y += dy;
            requestAnimationFrame(draw);
        }

        function startGame() {
            score = 0;
            lives = 3;
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            initBricks();
            x = canvas.width / 2;
            y = canvas.height - 30;
            dx = 2.5;
            dy = -2.5;
            gameRunning = true;
            overlay.style.display = "none";
            draw();
        }

        function gameOver() {
            gameRunning = false;
            msgElement.textContent = "GAME OVER";
            subMsgElement.textContent = "你的得分为: " + score;
            overlay.style.display = "flex";
        }

        function winGame() {
            gameRunning = false;
            msgElement.textContent = "MISSION CLEAR!";
            subMsgElement.textContent = "你成功守护了星系！";
            overlay.style.display = "flex";
        }

        // roundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            }
        }
    </script>
</body>
</html>
