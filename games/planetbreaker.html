<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planet Breaker · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-cyan: #00f2ff;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050510;
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
        }

        .game-wrapper {
            position: relative;
            width: 95%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            padding: 15px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .stat-group { display: flex; gap: 15px; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 10px; color: var(--neon-purple); text-transform: uppercase; font-weight: 700; }
        .stat-value { font-size: 20px; font-weight: 800; color: white; }

        #game-canvas {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050510 100%);
            border-radius: 25px;
            display: block;
            width: 100%;
            height: auto;
            border: 1px solid rgba(188, 19, 254, 0.2);
        }

        .game-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
            visibility: visible;
        }

        .btn-play {
            margin-top: 2rem;
            padding: 1.2rem 3.5rem;
            background: linear-gradient(135deg, var(--neon-purple), #7a2ff7);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(188, 19, 254, 0.4);
            transition: all 0.3s;
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 30px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); z-index: 200;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回游艺场</a>

    <div class="game-wrapper">
        <div class="game-header">
            <h1 style="color: var(--neon-purple); font-size: 1.8rem; margin: 0; letter-spacing: -1px;">PLANET BREAKER</h1>
            <div class="stat-group">
                <div class="stat-item"><div class="stat-label">HI-SCORE</div><div id="high-score" class="stat-value">0</div></div>
                <div class="stat-item"><div class="stat-label">SCORE</div><div id="score" class="stat-value">0</div></div>
                <div class="stat-item"><div class="stat-label">LIVES</div><div id="lives" class="stat-value">3</div></div>
            </div>
        </div>

        <canvas id="game-canvas" width="600" height="500"></canvas>

        <div class="game-overlay" id="overlay">
            <h2 id="msg-title" style="font-size: 3rem; background: linear-gradient(to right, var(--neon-purple), var(--neon-cyan)); -webkit-background-clip: text; color: transparent; margin: 0;">星际挑战</h2>
            <p id="msg-desc" style="color: white; opacity: 0.6; margin-top: 1rem;">击碎星体，穿越无尽星域</p>
            <button class="btn-play" onclick="game.start()">启动引擎</button>
        </div>
    </div>

    <script src="game-utils.js"></script>
    <script>
        class PlanetBreaker {
            constructor() {
                // 设备检测：拦截不适合移动端的游戏
                if (!GameUtils.checkMobileSupport('行星粉碎者', true)) return;

                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.scoreEl = document.getElementById('score');
                this.highScoreEl = document.getElementById('high-score');
                this.livesEl = document.getElementById('lives');
                this.overlay = document.getElementById('overlay');
                this.msgTitle = document.getElementById('msg-title');
                this.msgDesc = document.getElementById('msg-desc');

                this.paddleWidth = 100;
                this.paddleHeight = 12;
                this.ballRadius = 7;
                
                this.highScore = GameUtils.getHighScore('planetbreaker');
                this.highScoreEl.textContent = this.highScore;
                
                this.active = false;
                this.init();
            }

            init() {
                this.score = 0;
                this.lives = 3;
                this.level = 1;
                this.resetBall();
                this.initBricks();
                this.updateUI();
            }

            resetBall() {
                this.x = this.canvas.width / 2;
                this.y = this.canvas.height - 35;
                this.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
                this.dy = -4;
                this.paddleX = (this.canvas.width - this.paddleWidth) / 2;
            }

            initBricks() {
                const rows = 3 + Math.min(this.level, 3);
                const cols = 8;
                const brickPadding = 10;
                const offsetTop = 40;
                const offsetLeft = 30;
                const brickWidth = (this.canvas.width - (offsetLeft * 2) - (cols - 1) * brickPadding) / cols;
                
                this.bricks = [];
                for (let c = 0; c < cols; c++) {
                    this.bricks[c] = [];
                    for (let r = 0; r < rows; r++) {
                        this.bricks[c][r] = { x: 0, y: 0, status: 1, w: brickWidth };
                    }
                }
            }

            start() {
                this.active = true;
                this.overlay.style.display = 'none';
                this.loop();
            }

            updateUI() {
                this.scoreEl.textContent = this.score;
                this.livesEl.textContent = this.lives;
                this.highScoreEl.textContent = this.highScore;
            }

            loop() {
                if (!this.active) return;
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }

            update() {
                // Ball movement
                this.x += this.dx;
                this.y += this.dy;

                // Wall collisions
                if (this.x + this.dx > this.canvas.width - this.ballRadius || this.x + this.dx < this.ballRadius) this.dx = -this.dx;
                if (this.y + this.dy < this.ballRadius) this.dy = -this.dy;
                else if (this.y + this.dy > this.canvas.height - this.ballRadius - 15) {
                    if (this.x > this.paddleX && this.x < this.paddleX + this.paddleWidth) {
                        this.dy = -this.dy;
                        // Angle change based on hit location
                        let delta = this.x - (this.paddleX + this.paddleWidth / 2);
                        this.dx = delta * 0.15;
                    } else {
                        this.lives--;
                        this.updateUI();
                        if (this.lives <= 0) {
                            this.gameOver();
                        } else {
                            this.active = false;
                            this.msgTitle.textContent = "星际受损";
                            this.msgDesc.textContent = "剩余护盾: " + this.lives;
                            this.overlay.style.display = 'flex';
                            this.resetBall();
                        }
                    }
                }

                // Brick collisions
                let bricksLeft = 0;
                for (let c = 0; c < this.bricks.length; c++) {
                    for (let r = 0; r < this.bricks[c].length; r++) {
                        let b = this.bricks[c][r];
                        if (b.status === 1) {
                            bricksLeft++;
                            let bx = c * (b.w + 10) + 30;
                            let by = r * (25 + 10) + 40;
                            if (this.x > bx && this.x < bx + b.w && this.y > by && this.y < by + 25) {
                                this.dy = -this.dy;
                                b.status = 0;
                                this.score += 10;
                                this.updateUI();
                            }
                        }
                    }
                }

                if (bricksLeft === 0) {
                    this.level++;
                    this.active = false;
                    this.msgTitle.textContent = "星域清理完毕";
                    this.msgDesc.textContent = "准备跃迁至第 " + (this.level) + " 星域";
                    this.overlay.style.display = 'flex';
                    this.initBricks();
                    this.resetBall();
                }
            }

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Bricks
                this.bricks.forEach((col, c) => {
                    col.forEach((b, r) => {
                        if (b.status === 1) {
                            let bx = c * (b.w + 10) + 30;
                            let by = r * (25 + 10) + 40;
                            const grad = this.ctx.createLinearGradient(bx, by, bx, by + 25);
                            grad.addColorStop(0, `hsla(${280 + r * 15}, 80%, 60%, 1)`);
                            grad.addColorStop(1, `hsla(${280 + r * 15}, 80%, 40%, 1)`);
                            this.ctx.fillStyle = grad;
                            this.ctx.beginPath();
                            this.ctx.roundRect(bx, by, b.w, 25, 5);
                            this.ctx.fill();
                        }
                    });
                });

                // Ball
                this.ctx.beginPath();
                this.ctx.arc(this.x, this.y, this.ballRadius, 0, Math.PI * 2);
                this.ctx.fillStyle = "white";
                this.ctx.shadowBlur = 10;
                this.ctx.shadowColor = var_neon_cyan;
                this.ctx.fill();
                this.ctx.shadowBlur = 0;

                // Paddle
                const pGrad = this.ctx.createLinearGradient(this.paddleX, 0, this.paddleX + this.paddleWidth, 0);
                pGrad.addColorStop(0, var_neon_purple); pGrad.addColorStop(1, var_neon_cyan);
                this.ctx.fillStyle = pGrad;
                this.ctx.beginPath();
                this.ctx.roundRect(this.paddleX, this.canvas.height - 20, this.paddleWidth, this.paddleHeight, 6);
                this.ctx.fill();
            }

            gameOver() {
                this.active = false;
                const isNewHigh = GameUtils.saveScore('planetbreaker', this.score);
                this.msgTitle.textContent = "星际迷航";
                this.msgDesc.innerHTML = `最终积分: ${this.score}<br>${isNewHigh ? '<b>新星域纪录！</b>' : ''}`;
                if (isNewHigh) {
                    this.highScore = this.score;
                    this.updateUI();
                    GameUtils.showToast('记录刷新！', 'success');
                }
                this.overlay.style.display = 'flex';
                this.init();
            }
        }

        // CSS Var fallback for JS
        const var_neon_purple = '#bc13fe';
        const var_neon_cyan = '#00f2ff';

        const game = new PlanetBreaker();

        if (game.canvas) {
            game.canvas.addEventListener('mousemove', e => {
                const rect = game.canvas.getBoundingClientRect();
                const rx = (e.clientX - rect.left) * (game.canvas.width / rect.width);
                game.paddleX = rx - game.paddleWidth / 2;
                if (game.paddleX < 0) game.paddleX = 0;
                if (game.paddleX > game.canvas.width - game.paddleWidth) game.paddleX = game.canvas.width - game.paddleWidth;
            });

            game.canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                const rect = game.canvas.getBoundingClientRect();
                const rx = (e.touches[0].clientX - rect.left) * (game.canvas.width / rect.width);
                game.paddleX = rx - game.paddleWidth / 2;
                if (game.paddleX < 0) game.paddleX = 0;
                if (game.paddleX > game.canvas.width - game.paddleWidth) game.paddleX = game.canvas.width - game.paddleWidth;
            }, { passive: false });
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
            }
        }
    </script>
</body>
</html>
