<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Breaker · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050510;
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        .game-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }

        #game-canvas {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050510 100%);
            border-radius: 24px;
            border: 1px solid rgba(188, 19, 254, 0.3);
        }

        .game-header {
            position: absolute;
            top: -70px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px;
        }

        .stat-group { display: flex; gap: 20px; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 10px; color: #bc13fe; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: 800; color: white; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            transition: all 0.4s;
        }

        .btn-play {
            margin-top: 2rem;
            padding: 1.2rem 3.5rem;
            background: linear-gradient(135deg, #bc13fe, #7a2ff7);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(188, 19, 254, 0.4);
            transition: all 0.3s;
        }

        .btn-play:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 35px rgba(188, 19, 254, 0.6); }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 12px 24px; border-radius: 30px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回游艺场</a>

    <div class="game-wrapper">
        <div class="game-header">
            <h1 style="color: #bc13fe; font-size: 2rem; margin: 0;">Planet Breaker</h1>
            <div class="stat-group">
                <div class="stat-item"><div class="stat-label">Level</div><div id="level" class="stat-value">1</div></div>
                <div class="stat-item"><div class="stat-label">Score</div><div id="score" class="stat-value">0</div></div>
                <div class="stat-item"><div class="stat-label">Lives</div><div id="lives" class="stat-value">3</div></div>
            </div>
        </div>

        <canvas id="game-canvas" width="600" height="500"></canvas>

        <div class="overlay" id="overlay">
            <h2 id="msg-title" style="font-size: 3.5rem; background: linear-gradient(to right, #bc13fe, #00f2ff); -webkit-background-clip: text; color: transparent; margin: 0;">LEVEL 1</h2>
            <p id="msg-desc" style="color: white; opacity: 0.6; font-size: 1.2rem; margin-top: 1rem;">击碎障碍，进入下一星域</p>
            <button class="btn-play" onclick="startLevel()">开始挑战</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const overlay = document.getElementById('overlay');
        const msgTitle = document.getElementById('msg-title');
        const msgDesc = document.getElementById('msg-desc');

        let score = 0, lives = 3, level = 1;
        let gameRunning = false;

        // Paddle
        const paddleWidth = 100, paddleHeight = 15;
        let paddleX = (canvas.width - paddleWidth) / 2;

        // Ball
        let x, y, dx, dy;
        const ballRadius = 8;

        // Bricks
        let bricks = [];
        const brickPadding = 10;
        const brickOffsetTop = 40;
        const brickOffsetLeft = 35;

        const levels = [
            { rows: 3, cols: 6, speed: 4 },
            { rows: 4, cols: 7, speed: 5 },
            { rows: 5, cols: 8, speed: 6 },
            { rows: 6, cols: 8, speed: 7 }
        ];

        function initLevel() {
            const config = levels[Math.min(level - 1, levels.length - 1)];
            const brickWidth = (canvas.width - 2 * brickOffsetLeft - (config.cols - 1) * brickPadding) / config.cols;
            
            bricks = [];
            for (let c = 0; c < config.cols; c++) {
                bricks[c] = [];
                for (let r = 0; r < config.rows; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1, w: brickWidth };
                }
            }
            
            x = canvas.width / 2;
            y = canvas.height - 40;
            dx = config.speed * (Math.random() > 0.5 ? 1 : -1);
            dy = -config.speed;
            paddleX = (canvas.width - paddleWidth) / 2;
        }

        function startLevel() {
            initLevel();
            gameRunning = true;
            overlay.style.display = 'none';
            draw();
        }

        function draw() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            // Wall bounce
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
            if (y + dy < ballRadius) dy = -dy;
            else if (y + dy > canvas.height - ballRadius - 10) {
                if (x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy;
                    // Physics adjustment based on where it hits the paddle
                    let delta = x - (paddleX + paddleWidth / 2);
                    dx = delta * 0.15;
                } else {
                    lives--;
                    livesEl.textContent = lives;
                    if (!lives) return gameOver();
                    else {
                        gameRunning = false;
                        msgTitle.textContent = "OOPS!";
                        msgDesc.textContent = "损失了一次机会，准备重回星场";
                        overlay.style.display = 'flex';
                    }
                }
            }

            // Paddle move
            if (rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 8;
            else if (leftPressed && paddleX > 0) paddleX -= 8;

            x += dx; y += dy;
            requestAnimationFrame(draw);
        }

        function drawBricks() {
            bricks.forEach((col, c) => {
                col.forEach((b, r) => {
                    if (b.status === 1) {
                        const bx = (c * (b.w + brickPadding)) + brickOffsetLeft;
                        const by = (r * (30 + brickPadding)) + brickOffsetTop;
                        b.x = bx; b.y = by;
                        
                        const gradient = ctx.createLinearGradient(bx, by, bx, by + 30);
                        gradient.addColorStop(0, `hsla(${280 + r * 15}, 80%, 60%, 1)`);
                        gradient.addColorStop(1, `hsla(${280 + r * 15}, 80%, 40%, 1)`);
                        
                        ctx.beginPath();
                        ctx.roundRect(bx, by, b.w, 30, 8);
                        ctx.fillStyle = gradient;
                        ctx.fill();
                        ctx.strokeStyle = "rgba(255,255,255,0.2)";
                        ctx.stroke();
                        ctx.closePath();
                    }
                });
            });
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#bc13fe";
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.closePath();
        }

        function drawPaddle() {
            const grad = ctx.createLinearGradient(paddleX, 0, paddleX + paddleWidth, 0);
            grad.addColorStop(0, "#bc13fe"); grad.addColorStop(1, "#00f2ff");
            ctx.beginPath();
            ctx.roundRect(paddleX, canvas.height - 20, paddleWidth, paddleHeight, 10);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.closePath();
        }

        function collisionDetection() {
            let activeBricks = 0;
            bricks.forEach(col => {
                col.forEach(b => {
                    if (b.status === 1) {
                        activeBricks++;
                        if (x > b.x && x < b.x + b.w && y > b.y && y < b.y + 30) {
                            dy = -dy;
                            b.status = 0;
                            score += 10;
                            scoreEl.textContent = score;
                        }
                    }
                });
            });
            if (activeBricks === 0) levelWin();
        }

        function levelWin() {
            gameRunning = false;
            level++;
            levelEl.textContent = level;
            msgTitle.textContent = "星际跃迁!";
            msgDesc.textContent = `准备进入第 ${level} 星域`;
            overlay.style.display = 'flex';
        }

        function gameOver() {
            gameRunning = false;
            msgTitle.textContent = "GAME OVER";
            msgDesc.textContent = `最终得分: ${score}`;
            level = 1; score = 0; lives = 3;
            overlay.style.display = 'flex';
        }

        // Controls
        let rightPressed = false, leftPressed = false;
        document.addEventListener("keydown", (e) => {
            if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
            else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
        });
        document.addEventListener("keyup", (e) => {
            if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
            else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
        });
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            const rx = e.clientX - rect.left;
            if (rx > 0 && rx < canvas.width) paddleX = rx - paddleWidth / 2;
        });

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
            }
        }
    </script>
</body>
</html>
