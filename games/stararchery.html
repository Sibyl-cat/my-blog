<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星际射手 · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050510;
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: min(95vw, 800px);
            aspect-ratio: 16/9;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            overflow: hidden;
        }

        #game-canvas { width: 100%; height: 100%; }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }

        .btn {
            margin-top: 20px; padding: 15px 40px; background: #00f2ff;
            color: #000; border: none; border-radius: 50px; font-weight: 800;
            cursor: pointer;
        }

        .hud {
            position: absolute; top: 20px; width: 100%; display: flex;
            justify-content: space-around; pointer-events: none;
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 30px;
            z-index: 200;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>

    <div class="game-container">
        <canvas id="game-canvas"></canvas>
        <div class="hud">
            <div style="color: #00f2ff;">ARROWS: <span id="arrows">10</span></div>
            <div style="color: #fff;">SCORE: <span id="score">0</span></div>
        </div>
        <div id="overlay" class="overlay">
            <h1 style="color: #00f2ff; font-size: 3rem;">STAR ARCHERY</h1>
            <p id="msg" style="color: white; opacity: 0.6;">拉动弓箭，命中移动的星标。考虑重力影响。</p>
            <button class="btn" onclick="window.game.start()">开始射击</button>
        </div>
    </div>

    <script src="game-utils.js"></script>
    <script>
        class StarArchery {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.scoreEl = document.getElementById('score');
                this.arrowEl = document.getElementById('arrows');
                this.overlay = document.getElementById('overlay');
                this.msg = document.getElementById('msg');

                this.canvas.width = 800;
                this.canvas.height = 450;

                this.mouse = { x: 0, y: 0, down: false, startX: 0, startY: 0 };
                this.gravity = 0.15;
                this.active = false;

                const getPos = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    const rw = rect.width || 800;
                    const rh = rect.height || 450;
                    return {
                        x: (clientX - rect.left) * (this.canvas.width / rw),
                        y: (clientY - rect.top) * (this.canvas.height / rh)
                    };
                };

                const down = (e) => {
                    if(!this.active) return;
                    const pos = getPos(e);
                    if(pos.x < 150) {
                        this.mouse.down = true;
                        this.mouse.startX = pos.x;
                        this.mouse.startY = pos.y;
                    }
                };

                const up = (e) => {
                    if(!this.mouse.down) return;
                    this.mouse.down = false;
                    const pos = getPos(e);
                    this.fire(pos);
                };

                const move = (e) => {
                    const pos = getPos(e);
                    this.mouse.x = pos.x;
                    this.mouse.y = pos.y;
                };

                this.canvas.addEventListener('mousedown', down);
                window.addEventListener('mouseup', up);
                window.addEventListener('mousemove', move);
                this.canvas.addEventListener('touchstart', down);
                window.addEventListener('touchend', up);
                window.addEventListener('touchmove', move, {passive: false});
            }

            init() {
                this.score = 0;
                this.arrowsLeft = 10;
                this.currentArrow = null;
                this.target = { x: 700, y: 225, r: 30, vy: 2 };
                this.particles = [];
                this.updateUI();
            }

            start() {
                this.init();
                this.active = true;
                this.overlay.style.display = 'none';
                this.loop();
            }

            updateUI() {
                this.scoreEl.textContent = this.score;
                this.arrowEl.textContent = this.arrowsLeft;
            }

            fire(pos) {
                if(this.arrowsLeft <= 0 || this.currentArrow) return;
                
                const dx = this.mouse.startX - pos.x;
                const dy = this.mouse.startY - pos.y;
                const power = Math.min(Math.hypot(dx, dy), 150) / 10;
                const angle = Math.atan2(dy, dx);

                this.currentArrow = {
                    x: 100, y: this.mouse.startY,
                    vx: Math.cos(angle) * power,
                    vy: Math.sin(angle) * power,
                    trail: []
                };
                this.arrowsLeft--;
                this.updateUI();
            }

            loop() {
                if(!this.active) return;
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }

            update() {
                // Target movement
                this.target.y += this.target.vy;
                if(this.target.y < 50 || this.target.y > 400) this.target.vy *= -1;

                // Arrow movement
                if(this.currentArrow) {
                    const a = this.currentArrow;
                    a.trail.push({x: a.x, y: a.y});
                    if(a.trail.length > 10) a.trail.shift();

                    a.vx *= 0.99;
                    a.vy += this.gravity;
                    a.x += a.vx;
                    a.y += a.vy;

                    // Collision with Target
                    const dist = Math.hypot(a.x - this.target.x, a.y - this.target.y);
                    if(dist < this.target.r) {
                        const hitScore = Math.floor((1 - dist/this.target.r) * 100) + 50;
                        this.score += hitScore;
                        this.createExplosion(this.target.x, this.target.y, '#00f2ff');
                        this.currentArrow = null;
                        this.updateUI();
                        // Randomize target position
                        this.target.y = 50 + Math.random() * 350;
                        this.target.vy *= 1.1; // Increase speed
                    } else if(a.x > 850 || a.y > 500 || a.x < -50) {
                        this.currentArrow = null;
                        if(this.arrowsLeft <= 0) setTimeout(() => this.gameOver(), 1000);
                    }
                }

                // Particles
                this.particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    if(p.life <= 0) this.particles.splice(i, 1);
                });
            }

            createExplosion(x, y, color) {
                for(let i=0; i<20; i++) {
                    this.particles.push({
                        x, y,
                        vx: (Math.random()-0.5)*10,
                        vy: (Math.random()-0.5)*10,
                        life: 1,
                        color
                    });
                }
            }

            draw() {
                this.ctx.fillStyle = '#050510';
                this.ctx.fillRect(0, 0, 800, 450);

                // Target
                this.ctx.shadowBlur = 20;
                this.ctx.shadowColor = '#00f2ff';
                this.ctx.strokeStyle = '#00f2ff';
                this.ctx.lineWidth = 4;
                for(let i=1; i<=3; i++) {
                    this.ctx.beginPath();
                    this.ctx.arc(this.target.x, this.target.y, (this.target.r/3)*i, 0, Math.PI*2);
                    this.ctx.stroke();
                }

                // Bow area preview
                if(this.mouse.down) {
                    this.ctx.strokeStyle = 'rgba(0, 242, 255, 0.3)';
                    this.ctx.setLineDash([5, 5]);
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.mouse.startX, this.mouse.startY);
                    this.ctx.lineTo(this.mouse.x, this.mouse.y);
                    this.ctx.stroke();
                    this.ctx.setLineDash([]);
                }

                // Arrow
                if(this.currentArrow) {
                    const a = this.currentArrow;
                    this.ctx.strokeStyle = '#fff';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    const angle = Math.atan2(a.vy, a.vx);
                    this.ctx.moveTo(a.x, a.y);
                    this.ctx.lineTo(a.x - Math.cos(angle)*30, a.y - Math.sin(angle)*30);
                    this.ctx.stroke();
                }

                // Particles
                this.particles.forEach(p => {
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1;
                this.ctx.shadowBlur = 0;
            }

            gameOver() {
                this.active = false;
                const isNew = GameUtils.saveScore('stararchery', this.score);
                this.overlay.style.display = 'flex';
                this.msg.innerHTML = `最终得分: ${this.score}<br>${isNew ? '<b>新纪元射手诞生！</b>' : ''}`;
                if (isNew) GameUtils.showToast('记录刷新！', 'success');
            }
        }

        window.game = new StarArchery();
    </script>
</body>
</html>
