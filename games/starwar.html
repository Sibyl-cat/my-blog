<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星际战机 · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff4757;
            --neon-blue: #00f2ff;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: min(95vw, 450px);
            aspect-ratio: 9/14;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 71, 87, 0.3);
            box-shadow: 0 0 50px rgba(255, 71, 87, 0.1);
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label { font-size: 9px; color: var(--neon-red); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 18px; font-weight: 800; color: white; }

        .health-bar-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .health-bar {
            height: 100%;
            background: linear-gradient(to right, var(--neon-red), #ff6b81);
            width: 100%;
            transition: width 0.3s;
        }

        .game-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
            visibility: visible;
        }

        .btn-start {
            margin-top: 20px;
            padding: 12px 40px;
            background: var(--neon-red);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 30px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); z-index: 200;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回游艺场</a>

    <div class="game-container" id="game-area">
        <canvas id="game-canvas" width="450" height="700"></canvas>
        
        <div class="ui-overlay">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Best</div>
                <div id="high-score" class="stat-value">0</div>
            </div>
        </div>

        <div class="health-bar-container">
            <div class="health-bar" id="health-bar"></div>
        </div>

        <div id="overlay" class="game-overlay">
            <h1 style="font-size: 3rem; color: var(--neon-red); margin: 0; letter-spacing: -2px;">STAR DEFENDER</h1>
            <p id="overlay-msg" style="color: white; opacity: 0.6; margin-top: 10px;">移动鼠标或滑动操控战机</p>
            <button class="btn-start" onclick="game.start()">启动战机</button>
        </div>
    </div>

    <script src="game-utils.js"></script>
    <script>
        class StarDefender {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.scoreEl = document.getElementById('score');
                this.highScoreEl = document.getElementById('high-score');
                this.healthBar = document.getElementById('health-bar');
                this.overlay = document.getElementById('overlay');
                this.overlayMsg = document.getElementById('overlay-msg');

                this.highScore = GameUtils.getHighScore('starwar');
                this.highScoreEl.textContent = this.highScore;
                
                this.active = false;
                this.init();
            }

            init() {
                this.score = 0;
                this.health = 100;
                this.player = { x: this.canvas.width / 2, y: this.canvas.height - 100, w: 40, h: 40 };
                this.bullets = [];
                this.enemies = [];
                this.particles = [];
                this.stars = [];
                for(let i=0; i<80; i++) {
                    this.stars.push({ x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height, s: Math.random() * 2 });
                }
                this.lastShot = 0;
                this.enemyTimer = 0;
                this.updateUI();
            }

            start() {
                this.init();
                this.active = true;
                this.overlay.style.display = 'none';
                this.loop();
            }

            updateUI() {
                this.scoreEl.textContent = this.score;
                this.healthBar.style.width = this.health + '%';
                this.highScoreEl.textContent = this.highScore;
            }

            loop() {
                if (!this.active) return;
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }

            update() {
                // Stars
                this.stars.forEach(s => {
                    s.y += s.s * 2;
                    if (s.y > this.canvas.height) s.y = 0;
                });

                // Bullets
                const now = Date.now();
                if (now - this.lastShot > 150) {
                    this.bullets.push({ x: this.player.x, y: this.player.y, r: 4 });
                    this.lastShot = now;
                }

                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    this.bullets[i].y -= 12;
                    if (this.bullets[i].y < 0) this.bullets.splice(i, 1);
                }

                // Enemies
                this.enemyTimer++;
                if (this.enemyTimer > Math.max(10, 60 - this.score / 100)) {
                    this.enemies.push({
                        x: Math.random() * (this.canvas.width - 40),
                        y: -50,
                        w: 40,
                        h: 40,
                        hp: 1 + Math.floor(this.score / 500),
                        speed: 2 + Math.random() * 2 + (this.score / 1000)
                    });
                    this.enemyTimer = 0;
                }

                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const e = this.enemies[i];
                    e.y += e.speed;

                    // Bullet Collision
                    for (let j = this.bullets.length - 1; j >= 0; j--) {
                        const b = this.bullets[j];
                        if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                            e.hp--;
                            this.bullets.splice(j, 1);
                            this.createExplosion(e.x + e.w/2, e.y + e.h/2, '#bc13fe');
                            if (e.hp <= 0) {
                                this.enemies.splice(i, 1);
                                this.score += 10;
                                this.updateUI();
                                break;
                            }
                        }
                    }

                    // Player Collision
                    if (this.active && e && e.x < this.player.x + 20 && e.x + e.w > this.player.x - 20 && e.y < this.player.y + 20 && e.y + e.h > this.player.y - 20) {
                        this.health -= 20;
                        this.enemies.splice(i, 1);
                        this.createExplosion(this.player.x, this.player.y, '#ff4757');
                        this.updateUI();
                        if (this.health <= 0) this.gameOver();
                    } else if (e && e.y > this.canvas.height) {
                        this.enemies.splice(i, 1);
                        this.health -= 5;
                        this.updateUI();
                        if (this.health <= 0) this.gameOver();
                    }
                }

                // Particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.05;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }

            createExplosion(x, y, color) {
                for(let i=0; i<10; i++) {
                    this.particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 1,
                        color
                    });
                }
            }

            draw() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Stars
                this.ctx.fillStyle = 'rgba(255,255,255,0.5)';
                this.stars.forEach(s => this.ctx.fillRect(s.x, s.y, s.s, s.s));

                // Player
                this.ctx.fillStyle = '#ff4757';
                this.ctx.shadowBlur = 15;
                this.ctx.shadowColor = '#ff4757';
                this.ctx.beginPath();
                this.ctx.moveTo(this.player.x, this.player.y - 20);
                this.ctx.lineTo(this.player.x - 20, this.player.y + 20);
                this.ctx.lineTo(this.player.x + 20, this.player.y + 20);
                this.ctx.fill();

                // Bullets
                this.ctx.fillStyle = '#00f2ff';
                this.ctx.shadowBlur = 10;
                this.ctx.shadowColor = '#00f2ff';
                this.bullets.forEach(b => {
                    this.ctx.beginPath();
                    this.ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                    this.ctx.fill();
                });

                // Enemies
                this.ctx.fillStyle = '#bc13fe';
                this.ctx.shadowBlur = 15;
                this.ctx.shadowColor = '#bc13fe';
                this.enemies.forEach(e => {
                    this.ctx.beginPath();
                    this.ctx.roundRect(e.x, e.y, e.w, e.h, 8);
                    this.ctx.fill();
                });

                // Particles
                this.ctx.shadowBlur = 0;
                this.particles.forEach(p => {
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.ctx.fillRect(p.x, p.y, 3, 3);
                });
                this.ctx.globalAlpha = 1;
                this.ctx.shadowBlur = 0;
            }

            gameOver() {
                this.active = false;
                const isNewHigh = GameUtils.saveScore('starwar', this.score);
                this.overlayMsg.innerHTML = `战机陨落 | 最终得分: ${this.score}<br>${isNewHigh ? '<b>新防卫纪录！</b>' : ''}`;
                if (isNewHigh) {
                    this.highScore = this.score;
                    this.updateUI();
                    GameUtils.showToast('记录刷新！', 'success');
                }
                this.overlay.style.display = 'flex';
            }
        }

        const game = new StarDefender();

        const handleInput = (clientX, clientY) => {
            const rect = game.canvas.getBoundingClientRect();
            game.player.x = (clientX - rect.left) * (game.canvas.width / rect.width);
            game.player.y = (clientY - rect.top) * (game.canvas.height / rect.height);
            
            // Constrain
            if (game.player.x < 20) game.player.x = 20;
            if (game.player.x > game.canvas.width - 20) game.player.x = game.canvas.width - 20;
            if (game.player.y < 20) game.player.y = 20;
            if (game.player.y > game.canvas.height - 20) game.player.y = game.canvas.height - 20;
        };

        window.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
        window.addEventListener('touchmove', e => {
            e.preventDefault();
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
            }
        }
    </script>
</body>
</html>
