<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星核保卫战 · 织星游艺场</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050510;
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: min(95vw, 600px);
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 50%;
            border: 2px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.05);
        }

        #game-canvas { width: 100%; height: 100%; }

        .hud {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .score-box {
            background: rgba(0,0,0,0.5);
            padding: 10px 30px;
            border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            text-align: center;
        }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; border-radius: 50%;
        }

        .btn {
            margin-top: 20px; padding: 15px 40px; background: #00f2ff;
            color: #000; border: none; border-radius: 50px; font-weight: 800;
            cursor: pointer; box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 30px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>

    <div class="game-container">
        <canvas id="game-canvas"></canvas>
        <div class="hud">
            <div class="score-box">
                <div style="font-size: 10px; color: #00f2ff; text-transform: uppercase;">Core Integrity</div>
                <div id="score" style="font-size: 24px; font-weight: 800; color: white;">0</div>
            </div>
        </div>

        <div id="overlay" class="overlay">
            <h1 style="color: #00f2ff; font-size: 3rem;">CORE DEFENDER</h1>
            <p id="msg" style="color: white; opacity: 0.6;">旋转护盾，阻挡从 360 度袭向核心的陨石。</p>
            <button class="btn" onclick="window.game.start()">激活星核</button>
        </div>
    </div>

    <script src="game-utils.js"></script>
    <script>
        class CoreDefender {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.scoreEl = document.getElementById('score');
                this.overlay = document.getElementById('overlay');
                this.msg = document.getElementById('msg');
                
                this.canvas.width = 600;
                this.canvas.height = 600;
                
                this.angle = 0;
                this.active = false;
                
                const handleMove = (clientX, clientY) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const rw = rect.width || 600;
                    const rh = rect.height || 600;
                    const x = clientX - (rect.left + rw / 2);
                    const y = clientY - (rect.top + rh / 2);
                    this.angle = Math.atan2(y, x);
                };

                // Mouse/Touch events bound to window for better responsiveness
                window.addEventListener('mousemove', e => {
                    if (this.active) handleMove(e.clientX, e.clientY);
                });
                window.addEventListener('touchmove', e => {
                    if (this.active) {
                        e.preventDefault();
                        handleMove(e.touches[0].clientX, e.touches[0].clientY);
                    }
                }, { passive: false });
            }

            init() {
                this.score = 0;
                this.enemies = [];
                this.particles = [];
                this.shieldWidth = Math.PI / 2;
                this.lastSpawn = 0;
                this.startTime = Date.now();
                this.scoreEl.textContent = '0';
            }

            start() {
                this.init();
                this.active = true;
                this.overlay.style.display = 'none';
                this.loop();
            }

            loop() {
                if (!this.active) return;
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }

            update() {
                const now = Date.now();
                const survivalTime = (now - this.startTime) / 1000;

                // Spawn enemies
                const spawnInterval = Math.max(200, 1000 - survivalTime * 15);
                if (now - this.lastSpawn > spawnInterval) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + (survivalTime / 20) + Math.random();
                    this.enemies.push({
                        x: 300 + Math.cos(angle) * 450,
                        y: 300 + Math.sin(angle) * 450,
                        angle: angle + Math.PI,
                        speed: speed,
                        r: 10
                    });
                    this.lastSpawn = now;
                }

                // Update Enemies
                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const e = this.enemies[i];
                    e.x += Math.cos(e.angle) * e.speed;
                    e.y += Math.sin(e.angle) * e.speed;

                    const dist = Math.hypot(e.x - 300, e.y - 300);
                    
                    // Shield Collision (Arc boundary check)
                    if (dist < 115 && dist > 85) {
                        const enemyAngle = Math.atan2(e.y - 300, e.x - 300);
                        let diff = Math.abs(enemyAngle - this.angle);
                        if (diff > Math.PI) diff = Math.PI * 2 - diff;
                        
                        if (diff < this.shieldWidth / 2) {
                            this.enemies.splice(i, 1);
                            this.score += 10;
                            this.scoreEl.textContent = this.score;
                            this.createExplosion(e.x, e.y, '#00f2ff', 8);
                            continue;
                        }
                    }

                    // Core Collision
                    if (dist < 35) {
                        this.gameOver();
                        break;
                    }
                }

                // Particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }

            createExplosion(x, y, color, count) {
                for(let i=0; i<count; i++) {
                    this.particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        life: 1,
                        color
                    });
                }
            }

            draw() {
                this.ctx.fillStyle = '#050510';
                this.ctx.fillRect(0, 0, 600, 600);

                // Grid background
                this.ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
                this.ctx.lineWidth = 1;
                for(let i=0; i<600; i+=60) {
                    this.ctx.beginPath(); this.ctx.moveTo(i, 0); this.ctx.lineTo(i, 600); this.ctx.stroke();
                    this.ctx.beginPath(); this.ctx.moveTo(0, i); this.ctx.lineTo(600, i); this.ctx.stroke();
                }

                // Core
                const pulse = Math.sin(Date.now() / 250) * 4;
                const grad = this.ctx.createRadialGradient(300, 300, 0, 300, 300, 35 + pulse);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.4, '#00f2ff');
                grad.addColorStop(1, 'transparent');
                this.ctx.fillStyle = grad;
                this.ctx.beginPath();
                this.ctx.arc(300, 300, 35 + pulse, 0, Math.PI*2);
                this.ctx.fill();

                // Shield
                this.ctx.save();
                this.ctx.strokeStyle = '#00f2ff';
                this.ctx.lineWidth = 12;
                this.ctx.lineCap = 'round';
                this.ctx.shadowBlur = 20;
                this.ctx.shadowColor = '#00f2ff';
                this.ctx.beginPath();
                this.ctx.arc(300, 300, 100, this.angle - this.shieldWidth/2, this.angle + this.shieldWidth/2);
                this.ctx.stroke();
                this.ctx.restore();

                // Enemies
                this.enemies.forEach(e => {
                    this.ctx.fillStyle = '#ff4757';
                    this.ctx.shadowBlur = 10;
                    this.ctx.shadowColor = '#ff4757';
                    this.ctx.beginPath();
                    this.ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });

                // Particles
                this.particles.forEach(p => {
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1;
            }

            gameOver() {
                this.active = false;
                const isNew = GameUtils.saveScore('coredefender', this.score);
                this.overlay.style.display = 'flex';
                this.msg.innerHTML = `防御分值: ${this.score}<br>${isNew ? '<b style="color:#00f2ff">核心能量场突破！(新纪录)</b>' : '核心已被陨石击穿'}`;
                if (isNew) GameUtils.showToast('记录刷新！', 'success');
            }
        }

        window.game = new CoreDefender();
    </script>
</body>
</html>
