<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>文章 · 星辰空间站</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 添加移动端文章内容适配样式（确保文字不溢出） -->
    <style>
        .post-content {
            max-width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        @media (max-width: 768px) {
            .post-content {
                text-align: left;   
                padding: 0 1rem;
                font-size: 1rem;
                line-height: 1.6;
            }
            .post-content pre {
                white-space: pre-wrap;
                overflow-x: auto;
                max-width: 100%;
                box-sizing: border-box;
            }
            .post-content code {
                word-break: break-all;
            }
            .post-content table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
                max-width: 100%;
                border-collapse: collapse;
            }
            .post-content img {
                max-width: 100%;
                height: auto;
            }
            .post-content blockquote {
                margin: 1rem 0;
                padding: 0.5rem 1rem;
                background: rgba(251,114,153,0.1);
                border-left: 4px solid #FB7299;
                word-break: break-word;
            }
            .post-content a {
                word-break: break-all;
                color: #FB7299;
            }
        }
    </style>
</head>

<body>
    <div class="blog-container">
        <!-- 二级页面组件化导航栏 -->
        <blog-navbar-secondary></blog-navbar-secondary>

        <!-- 全局侧边栏组件 -->
        <blog-sidebar></blog-sidebar>

        <!-- 文章详情容器（初始为空） -->
        <div class="profile-card glass" id="post-container" style="flex-direction: column; align-items: flex-start;">
            <!-- 动态填充文章内容 -->
        </div>

        <!-- 页脚 -->
        <blog-footer></blog-footer>
    </div>

    <script>
    async function loadPost() {
        const container = document.getElementById('post-container');
        if (!container) return;
    
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');
    
        if (!slug) {
            container.innerHTML = '<p style="color: red; text-align: center;">文章不存在</p>';
            return;
        }
    
        try {
            const response = await fetch(`/api/post/${slug}`);
            if (!response.ok) {
                if (response.status === 404) throw new Error('文章不存在');
                else throw new Error(`加载失败 (${response.status})`);
            }
            const post = await response.json();
    
            const date = new Date(post.updated_at);
            const formattedDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    
            let tagsHtml = '';
            if (post.tags) {
                tagsHtml = post.tags.split(',').map(tag => `#${tag.trim()}`).join(' · ');
            }
    
            const trimmed = (post.content || '').trim();
            const isLikelyHTML = trimmed.startsWith('<') && trimmed.includes('>');
            const renderedContent = isLikelyHTML ? trimmed : marked.parse(trimmed);
    
            container.innerHTML = `
                <h1 style="font-size: 2.5rem; color: #FB7299;">${post.title}</h1>
                <div class="card-meta" style="margin: 1rem 0; width: 100%;">
                    <span><i class="far fa-calendar"></i> ${formattedDate}</span>
                    <span><i class="fas fa-tag"></i> ${tagsHtml || '未分类'}</span>
                </div>
                <div class="post-content">
                    ${renderedContent}
                </div>
                <a href="index.html" class="load-more" style="margin: 2rem 0; align-self: center;">← 返回首页</a>
            `;
    
            // 执行插入内容中的脚本（使小游戏生效）
            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                    newScript.async = false;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
    
        } catch (error) {
            console.error(error);
            container.innerHTML = `<p style="color: red; text-align: center;">${error.message}</p>`;
        }
    }

        // 确保 DOM 加载完成后执行
        document.addEventListener('DOMContentLoaded', loadPost);

    </script>
</body>

</html>
