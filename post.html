<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>文章 · 织星屿</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 文章详情页专项样式 */
        :root {
            --post-max-width: 900px;
        }

        /* 阅读进度条 */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            z-index: 2000;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, #FB7299, #ff8aa5);
            width: 0%;
            transition: width 0.1s ease;
            box-shadow: 0 0 10px rgba(251, 114, 153, 0.5);
        }

        /* 主体布局 */
        .post-wrapper {
            max-width: var(--post-max-width);
            margin: 2rem auto;
            width: 100%;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 文章头部 (Hero Section) */
        .post-header {
            padding: 3rem 2.5rem;
            border-radius: 32px 32px 0 0;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: linear-gradient(135deg, rgba(251, 114, 153, 0.1) 0%, transparent 100%);
        }

        .post-title {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.3;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            font-family: 'Outfit', sans-serif;
            word-break: break-word;
        }

        .post-meta {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .post-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .post-meta i {
            color: #FB7299;
        }

        /* 文章内容区域 */
        .post-content {
            padding: 3rem 2.5rem;
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--text-main);
            border-radius: 0 0 32px 32px;
        }

        /* 文本元素样式 */
        .post-content p {
            margin-bottom: 1.5rem;
        }

        .post-content h2 {
            font-size: 2rem;
            margin: 2.5rem 0 1.2rem;
            color: #FB7299;
            border-bottom: 2px solid var(--primary-pink-alpha);
            padding-bottom: 8px;
            display: inline-block;
        }

        .post-content h3 {
            font-size: 1.5rem;
            margin: 2rem 0 1rem;
            color: var(--text-main);
        }

        /* 媒体元素支持 */
        .post-content img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            margin: 2rem auto;
            display: block;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: zoom-in;
        }

        .post-content img:hover {
            transform: scale(1.02);
        }

        /* 音频播放器样式 */
        .post-content audio {
            width: 100%;
            max-width: 500px;
            margin: 1.5rem auto;
            display: block;
            border-radius: 30px;
            filter: drop-shadow(0 4px 10px var(--pink-shadow));
        }

        /* 代码块样式 */
        .post-content pre {
            background: rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            border-radius: 16px;
            overflow-x: auto;
            margin: 1.5rem 0;
            border: 1px solid var(--glass-border);
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .dark-mode .post-content pre {
            background: rgba(255, 255, 255, 0.05);
        }

        .post-content code {
            background: var(--primary-pink-alpha);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-family: inherit;
            color: #FB7299;
        }

        /* 引用样式 */
        .post-content blockquote {
            margin: 2rem 0;
            padding: 1rem 1.5rem;
            background: var(--primary-pink-alpha);
            border-left: 5px solid #FB7299;
            border-radius: 0 12px 12px 0;
            font-style: italic;
            color: var(--text-secondary);
        }

        /* 列表样式 */
        .post-content ul, .post-content ol {
            margin: 1.5rem 0;
            padding-left: 1.5rem;
        }

        .post-content li {
            margin-bottom: 0.5rem;
        }

        /* 底部操作区 */
        .post-footer {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .back-home-btn {
            padding: 0.8rem 2.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--primary-pink);
            color: var(--primary-pink);
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-home-btn:hover {
            background: var(--primary-pink);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--pink-shadow);
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--glass-bg);
            border: 1px solid var(--primary-pink);
            color: #FB7299;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            background: #FB7299;
            color: white;
            transform: scale(1.1);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .post-wrapper {
                margin: 1rem 0;
            }

            .post-header {
                padding: 2rem 1.5rem;
                border-radius: 24px 24px 0 0;
            }

            .post-title {
                font-size: 1.8rem;
            }

            .post-meta {
                font-size: 0.9rem;
                gap: 1rem;
            }

            .post-content {
                padding: 1.5rem;
                font-size: 1.05rem;
                border-radius: 0 0 24px 24px;
            }

            .post-content h2 {
                font-size: 1.5rem;
            }

            .back-to-top {
                bottom: 20px;
                right: 20px;
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>
    <!-- 阅读进度条 -->
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="blog-container">
        <!-- 二级页面组件化导航栏 -->
        <blog-navbar-secondary></blog-navbar-secondary>

        <!-- 全局侧边栏组件 -->
        <blog-sidebar></blog-sidebar>

        <main class="post-wrapper" id="post-wrapper">
            <article class="glass" id="post-article">
                <!-- 骨架屏或加载状态 -->
                <div id="loading-state" style="padding: 5rem; text-align: center; color: var(--text-secondary);">
                    <i class="fas fa-spinner fa-spin fa-2x" style="color: #FB7299; margin-bottom: 1rem;"></i>
                    <p>正在穿越星河，请稍候...</p>
                </div>
            </article>

            <div class="post-footer">
                <a href="index.html" class="back-home-btn">
                    <i class="fas fa-arrow-left"></i> 返回星屿首页
                </a>
            </div>
        </main>

        <!-- 页脚 -->
        <blog-footer></blog-footer>
    </div>

    <!-- 回到顶部 -->
    <div class="back-to-top" id="backToTop">
        <i class="fas fa-chevron-up"></i>
    </div>

    <script>
        // ========== 阅读进度条控制 ==========
        window.onscroll = function() {
            updateProgressBar();
            updateBackToTop();
        };

        function updateProgressBar() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            const bar = document.getElementById("progressBar");
            if (bar) bar.style.width = scrolled + "%";
        }

        function updateBackToTop() {
            const btn = document.getElementById("backToTop");
            if (btn) {
                if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                    btn.classList.add("show");
                } else {
                    btn.classList.remove("show");
                }
            }
        }

        const backTopBtn = document.getElementById("backToTop");
        if (backTopBtn) {
            backTopBtn.onclick = function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
        }

        // ========== 文章加载逻辑 ==========
        async function loadPost() {
            const article = document.getElementById('post-article');
            if (!article) return;

            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                article.innerHTML = `
                    <div style="padding: 5rem; text-align: center; color: red;">
                        <i class="fas fa-exclamation-triangle fa-3x"></i>
                        <h2 style="margin-top: 1rem;">星标坐标错误</h2>
                        <p>找不到这篇文章，可能是它已经消失在黑洞中了。</p>
                        <a href="index.html" class="back-home-btn" style="margin: 2rem auto; width: fit-content;">返回首页</a>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`/api/post/${slug}`);
                if (!response.ok) {
                    if (response.status === 404) throw new Error('文章不存在');
                    else throw new Error(`信号干扰 (${response.status})`);
                }
                const post = await response.json();

                // 格式化日期
                const formattedDate = window.formatDateToBeijing(post.updated_at, {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: undefined,
                    minute: undefined,
                    second: undefined
                });

                // 处理标签
                let tagsHtml = '';
                if (post.tags) {
                    tagsHtml = post.tags.split(',').map(tag => `
                        <span class="tag"><i class="fas fa-hashtag"></i> ${tag.trim()}</span>
                    `).join('');
                }

                // 内容渲染判断
                const trimmed = (post.content || '').trim();
                const isLikelyHTML = trimmed.startsWith('<') && trimmed.includes('>');
                let renderedContent = isLikelyHTML ? trimmed : marked.parse(trimmed);

                article.innerHTML = `
                    <header class="post-header">
                        <h1 class="post-title">${post.title}</h1>
                        <div class="post-meta">
                            <span><i class="far fa-calendar-alt"></i> ${formattedDate}</span>
                            <span><i class="far fa-user"></i> ${post.author || '星际旅人'}</span>
                        </div>
                        <div class="post-item-tags" style="margin-top: 1.5rem; justify-content: center;">
                            ${tagsHtml || '<span class="tag">未分类</span>'}
                        </div>
                    </header>
                    <div class="post-content">
                        ${renderedContent}
                    </div>
                `;

                // 处理内容中的图片：添加点击放大查看
                const images = article.querySelectorAll('.post-content img');
                images.forEach(img => {
                    img.addEventListener('click', () => {
                        window.open(img.src, '_blank');
                    });
                });

                // 执行插入内容中的脚本
                const scripts = article.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                        newScript.async = false;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

                // 更新页面标题
                document.title = `${post.title} · 织星屿`;

            } catch (error) {
                console.error(error);
                article.innerHTML = `
                    <div style="padding: 5rem; text-align: center; color: red;">
                        <i class="fas fa-meteor fa-3x"></i>
                        <h2 style="margin-top: 1rem;">星路受阻</h2>
                        <p>${error.message}</p>
                        <a href="index.html" class="back-home-btn" style="margin: 2rem auto; width: fit-content;">重新连接</a>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>

</html>
