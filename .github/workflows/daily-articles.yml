name: Daily Articles Fetcher

on:
  schedule:
    # 每天凌晨 2:00 UTC 运行（北京时间上午 10:00）
    - cron: '0 0 * * sun'
  workflow_dispatch:   # 允许手动触发，方便测试

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests feedparser

      - name: Run fetcher script
        env:
          BLOG_API_URL: 'https://sibylpetal.sunny081209.cc/api/admin/post'
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: python scripts/fetch_articles.py
