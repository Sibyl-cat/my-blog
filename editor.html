<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章编辑 · 小电视の日常</title>
    <!-- 引入 Font Awesome 和全局样式 -->
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- 引入 Quill 富文本编辑器 -->
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.6/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.6/dist/quill.min.js"></script>
    <!-- 引入 marked 用于解析 MD 上传和预览 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body {
            background: linear-gradient(145deg, #ffe9f0, #ffd9e5);
            padding: 1rem;
        }
        .editor-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .editor-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(251, 114, 153, 0.3);
            box-shadow: 0 12px 28px rgba(251, 114, 153, 0.1);
        }
        .editor-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .back-btn {
            color: #FB7299;
            font-size: 1.5rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        .back-btn:hover {
            transform: translateX(-4px);
        }
        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1 1 250px;
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2a2a2a;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid rgba(251,114,153,0.3);
            border-radius: 30px;
            background: rgba(255,255,255,0.5);
            font-size: 1rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(251,114,153,0.3);
            color: #2a2a2a;
            text-decoration: none;
            font-size: 0.95rem;
        }
        .btn:hover {
            background: #FB7299;
            color: white;
        }
        .btn-primary {
            background: #FB7299;
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background: #ff8aa5;
            transform: scale(1.02);
        }
        /* 标签推荐样式 */
        .suggested-tag {
            background: rgba(251,114,153,0.1);
            border: 1px solid #FB7299;
            color: #FB7299;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-block;
            margin: 0.2rem;
        }
        .suggested-tag:hover {
            background: rgba(251,114,153,0.2);
        }
        .suggested-tag.selected {
            background: #FB7299;
            color: white;
        }
        /* Quill 编辑器样式 */
        #editor-container {
            height: 500px;
            margin-bottom: 1rem;
        }
        .ql-container {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 0 0 20px 20px;
            border: 1px solid rgba(251,114,153,0.3) !important;
        }
        .ql-toolbar {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px 20px 0 0;
            border: 1px solid rgba(251,114,153,0.3) !important;
            border-bottom: none !important;
        }
        /* Markdown 编辑器样式 */
        #markdown-editor-container {
            display: none;
        }
        #markdown-textarea {
            width: 100%;
            height: 500px;
            padding: 1rem;
            border: 1px solid rgba(251,114,153,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.5);
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
        }
        .md-preview {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: none;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .action-buttons .btn,
        .action-buttons label.btn {
            flex: 1;
            text-align: center;
            padding: 0.7rem 0.5rem;
            box-sizing: border-box;
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: rgba(0,200,0,0.2);
            border: 1px solid #00a800;
            color: #006400;
        }
        .message.error {
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff0000;
            color: #a80000;
        }
        @media (max-width: 768px) {
            .editor-card {
                padding: 1.5rem;
            }
            #editor-container, #markdown-textarea {
                height: 400px;
            }
            .action-buttons {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="editor-container">
    <!-- 返回按钮和页面标题 -->
    <div class="editor-card" style="padding: 1rem 2rem;">
        <div class="editor-header">
            <a href="admin.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h2 style="color: #FB7299; margin:0;">编辑文章</h2>
        </div>
    </div>

    <!-- 主编辑卡片 -->
    <div class="editor-card">
        <input type="hidden" id="slug" name="slug" value="">

        <!-- 标题和标签行 -->
        <div class="form-row">
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="title" placeholder="文章标题">
            </div>
            <div class="form-group">
                <label>标签 (逗号分隔)</label>
                <input type="text" id="tags" placeholder="教程,Cloudflare,前端">
            </div>
        </div>

        <!-- 标签推荐区域 -->
        <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem;">
            <button type="button" id="suggestTagsBtn" class="btn">推荐标签</button>
            <div id="suggested-tags" style="display: flex; flex-wrap: wrap; gap: 0.5rem; flex: 1;"></div>
        </div>

        <!-- 摘要 -->
        <div class="form-group">
            <label>摘要</label>
            <textarea id="excerpt" rows="3" placeholder="简短介绍..."></textarea>
        </div>

        <!-- 富文本编辑器容器（默认显示） -->
        <div id="rich-editor-container">
            <label>正文</label>
            <div id="editor-container"></div>
        </div>

        <!-- Markdown 编辑器容器（初始隐藏） -->
        <div id="markdown-editor-container">
            <label>正文 (Markdown)</label>
            <textarea id="markdown-textarea" placeholder="在此输入 Markdown 格式的文章..."></textarea>
            <div style="margin-top: 0.5rem;">
                <button id="previewMdBtn" class="btn" style="padding: 0.3rem 1rem;">预览</button>
            </div>
            <div id="markdown-preview" class="md-preview"></div>
        </div>

        <!-- 底部按钮组 -->
        <div class="action-buttons">
            <label for="uploadMd" class="btn" style="cursor: pointer;">
                <i class="fas fa-upload"></i> 上传MD
            </label>
            <button class="btn" id="saveDraftBtn">保存草稿</button>
            <button class="btn btn-primary" id="publishBtn">发表文章</button>
        </div>
        <input type="file" id="uploadMd" accept=".md, .markdown, text/markdown" style="display: none;">
        <div id="message" class="message"></div>
    </div>
</div>

<script>
    // ========== 全局变量 ==========
    let quill = null;
    let currentMode = 'rich';   // 'rich' 或 'markdown'
    let currentPost = null;

    // DOM 元素
    const slugHidden = document.getElementById('slug');
    const titleInput = document.getElementById('title');
    const tagsInput = document.getElementById('tags');
    const excerptInput = document.getElementById('excerpt');
    const saveDraftBtn = document.getElementById('saveDraftBtn');
    const publishBtn = document.getElementById('publishBtn');
    const messageDiv = document.getElementById('message');
    const uploadMd = document.getElementById('uploadMd');
    const suggestTagsBtn = document.getElementById('suggestTagsBtn');
    const suggestedTagsDiv = document.getElementById('suggested-tags');
    const richContainer = document.getElementById('rich-editor-container');
    const markdownContainer = document.getElementById('markdown-editor-container');
    const markdownTextarea = document.getElementById('markdown-textarea');
    const previewMdBtn = document.getElementById('previewMdBtn');
    const markdownPreview = document.getElementById('markdown-preview');

    // ========== 工具函数 ==========
    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        messageDiv.style.display = 'block';
        setTimeout(() => {
            messageDiv.style.display = 'none';
        }, 3000);
    }

    // 获取当前编辑器内容
    function getCurrentContent() {
        if (currentMode === 'rich') {
            return quill ? quill.root.innerHTML : '';
        } else {
            return markdownTextarea.value;
        }
    }

    // 设置编辑器内容
    function setContent(content) {
        if (currentMode === 'rich') {
            if (quill) quill.root.innerHTML = content || '';
        } else {
            markdownTextarea.value = content || '';
        }
    }

    // 初始化编辑器模式
    function initMode(mode) {
        currentMode = mode;
        if (mode === 'rich') {
            richContainer.style.display = 'block';
            markdownContainer.style.display = 'none';
            if (!quill) {
                quill = new Quill('#editor-container', {
                    theme: 'snow',
                    modules: {
                        toolbar: [
                            ['bold', 'italic', 'underline', 'strike'],
                            ['blockquote', 'code-block'],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            [{ 'script': 'sub'}, { 'script': 'super' }],
                            [{ 'indent': '-1'}, { 'indent': '+1' }],
                            [{ 'size': ['small', false, 'large', 'huge'] }],
                            [{ 'color': [] }, { 'background': [] }],
                            [{ 'align': [] }],
                            ['link', 'image'],
                            ['clean']
                        ]
                    },
                    placeholder: '在这里写文章...'
                });
            }
        } else {
            richContainer.style.display = 'none';
            markdownContainer.style.display = 'block';
        }
    }

    // ========== 加载文章内容 ==========
    async function loadPost(slug) {
        try {
            const response = await fetch(`/api/post/${slug}`);
            if (!response.ok) throw new Error('加载失败');
            const post = await response.json();

            slugHidden.value = post.slug;
            titleInput.value = post.title;
            tagsInput.value = post.tags || '';
            excerptInput.value = post.excerpt || '';

            // 根据 URL 参数 mode 或内容自动判断模式
            const urlParams = new URLSearchParams(window.location.search);
            const modeParam = urlParams.get('mode');
            if (modeParam === 'rich' || modeParam === 'markdown') {
                initMode(modeParam);
            } else {
                // 自动判断：如果内容以 < 开头且包含 >，则视为 HTML，使用富文本模式；否则用 Markdown
                const trimmed = (post.content || '').trim();
                const isLikelyHTML = trimmed.startsWith('<') && trimmed.includes('>');
                initMode(isLikelyHTML ? 'rich' : 'markdown');
            }

            setContent(post.content || '');
            currentPost = { slug: post.slug, is_published: post.is_published };
            showMessage('文章已加载', 'success');
        } catch (error) {
            console.error('加载失败:', error);
            showMessage('加载失败', 'error');
        }
    }

    // ========== 保存草稿 ==========
    saveDraftBtn.addEventListener('click', async () => {
        const content = getCurrentContent();

        const formData = new FormData();
        formData.append('slug', slugHidden.value);
        formData.append('title', titleInput.value);
        formData.append('content', content);
        formData.append('excerpt', excerptInput.value);
        formData.append('tags', tagsInput.value);

        saveDraftBtn.disabled = true;
        saveDraftBtn.textContent = '保存中...';

        try {
            const response = await fetch('/api/admin/post', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                showMessage('草稿保存成功', 'success');
                if (result.slug) {
                    slugHidden.value = result.slug;
                    currentPost = { slug: result.slug, is_published: currentPost ? currentPost.is_published : false };
                }
            } else {
                showMessage(result.error || '保存失败', 'error');
            }
        } catch (error) {
            showMessage('保存失败，请重试', 'error');
        } finally {
            saveDraftBtn.disabled = false;
            saveDraftBtn.textContent = '保存草稿';
        }
    });

    // ========== 发表文章 ==========
    publishBtn.addEventListener('click', async () => {
        if (!currentPost || !currentPost.slug) {
            showMessage('请先保存草稿', 'error');
            return;
        }
        if (currentPost.is_published) {
            showMessage('文章已发表，无需重复操作', 'error');
            return;
        }
        if (!confirm('确定要发表这篇文章吗？')) return;

        publishBtn.disabled = true;
        publishBtn.textContent = '发表中...';

        try {
            const response = await fetch('/api/admin/post/publish', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slug: currentPost.slug })
            });
            const result = await response.json();

            if (result.success) {
                showMessage('发表成功', 'success');
                currentPost.slug = result.newSlug;
                currentPost.is_published = true;
                slugHidden.value = result.newSlug;
                publishBtn.disabled = true;
                publishBtn.style.opacity = 0.5;
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1500);
            } else {
                showMessage(result.error || '发表失败', 'error');
                publishBtn.disabled = false;
            }
        } catch (error) {
            showMessage('发表失败', 'error');
            publishBtn.disabled = false;
        } finally {
            publishBtn.textContent = '发表文章';
        }
    });

    // ========== 上传 MD 文件 ==========
    uploadMd.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const allowedExts = ['.md', '.markdown'];
        const fileName = file.name;
        const ext = fileName.substring(fileName.lastIndexOf('.')).toLowerCase();
        if (!allowedExts.includes(ext) && file.type !== 'text/markdown') {
            alert('只支持上传 .md 或 .markdown 文件');
            e.target.value = '';
            return;
        }

        const maxSize = 1 * 1024 * 1024;
        if (file.size > maxSize) {
            alert('文件大小不能超过 1MB');
            e.target.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
            const content = event.target.result;
            if (currentMode === 'rich') {
                const html = marked.parse(content);
                setContent(html);
            } else {
                setContent(content);
            }
            showMessage('文件已加载到正文', 'success');
        };
        reader.onerror = () => alert('文件读取失败');
        reader.readAsText(file, 'UTF-8');
        e.target.value = '';
    });

    // ========== 标签推荐功能 ==========
    suggestTagsBtn.addEventListener('click', async () => {
        const title = titleInput.value;
        let content = '';
        if (currentMode === 'rich') {
            content = quill.getText(); // 获取纯文本
        } else {
            content = markdownTextarea.value;
        }
        if (!title && !content) {
            alert('请先填写标题或内容以便推荐标签');
            return;
        }
        try {
            const res = await fetch('/api/suggest-tags', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });
            const tags = await res.json();
            if (!Array.isArray(tags)) return;

            const limited = tags.slice(0, 5);
            suggestedTagsDiv.innerHTML = '';

            limited.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'suggested-tag';
                span.dataset.tag = tag;
                span.textContent = '#' + tag;
                span.addEventListener('click', () => updateTagSelection(tag));
                suggestedTagsDiv.appendChild(span);
            });

            const currentTags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t !== '');
            document.querySelectorAll('.suggested-tag').forEach(el => {
                if (currentTags.includes(el.dataset.tag)) {
                    el.classList.add('selected');
                }
            });
        } catch (err) {
            console.error('获取推荐标签失败:', err);
        }
    });

    function updateTagSelection(tag) {
        let currentTags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t !== '');
        const index = currentTags.indexOf(tag);
        if (index > -1) {
            currentTags.splice(index, 1);
        } else {
            currentTags.push(tag);
        }
        tagsInput.value = currentTags.join(', ');

        document.querySelectorAll('.suggested-tag').forEach(el => {
            if (currentTags.includes(el.dataset.tag)) {
                el.classList.add('selected');
            } else {
                el.classList.remove('selected');
            }
        });
    }

    // ========== Markdown 预览 ==========
    if (previewMdBtn) {
        previewMdBtn.addEventListener('click', () => {
            const md = markdownTextarea.value;
            const html = marked.parse(md);
            markdownPreview.innerHTML = html;
            markdownPreview.style.display = 'block';
        });
    }

    // ========== 页面初始化 ==========
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');
        const mode = urlParams.get('mode');

        if (slug) {
            // 编辑已有文章，加载内容
            loadPost(slug);
        } else {
            // 新建文章，根据 mode 参数初始化
            if (mode === 'rich' || mode === 'markdown') {
                initMode(mode);
            } else {
                initMode('rich'); // 默认富文本
            }
        }
    });
</script>
</body>
</html>
