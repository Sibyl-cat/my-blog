<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>文章编辑 · 织星屿</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="/assets/libs/quill.snow.css" rel="stylesheet">
    <script src="/assets/libs/quill.min.js"></script>
    <script src="/assets/libs/marked.min.js"></script>
    <script src="components.js"></script>
    <style>
        body {
            background: var(--body-bg);
            padding: 1rem;
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        .editor-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .editor-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 12px 28px var(--card-shadow);
        }
        .editor-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .back-btn {
            color: #FB7299;
            font-size: 1.5rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        .back-btn:hover {
            transform: translateX(-4px);
        }
        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1 1 250px;
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            background: var(--glass-bg);
            color: var(--text-main);
            font-size: 1rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(251,114,153,0.3);
            color: #2a2a2a;
            text-decoration: none;
            font-size: 0.95rem;
        }
        .btn:hover {
            background: #FB7299;
            color: white;
        }
        .btn-primary {
            background: #FB7299;
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background: #ff8aa5;
            transform: scale(1.02);
        }
        
        /* 模式切换器样式 */
        .mode-switcher {
            display: flex;
            background: rgba(251,114,153,0.1);
            border-radius: 30px;
            padding: 0.3rem;
            margin-bottom: 1.5rem;
            width: fit-content;
            border: 1px solid rgba(251,114,153,0.2);
        }
        .mode-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            color: #FB7299;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .mode-btn.active {
            background: #FB7299;
            color: white;
            box-shadow: 0 4px 12px rgba(251,114,153,0.3);
        }
        
        .suggested-tag {
            background: rgba(251,114,153,0.1);
            border: 1px solid #FB7299;
            color: #FB7299;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-block;
            margin: 0.2rem;
        }
        .suggested-tag:hover {
            background: rgba(251,114,153,0.2);
        }
        .suggested-tag.selected {
            background: #FB7299;
            color: white;
        }
        
        .editor-section-title {
            color: #FB7299;
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px dashed rgba(251,114,153,0.3);
            padding-bottom: 0.5rem;
        }
        .help-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.3rem;
            display: block;
        }

        #editor-container {
            height: 500px;
            margin-bottom: 1rem;
        }
        .ql-container {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 0 0 20px 20px;
            border: 1px solid rgba(251,114,153,0.3) !important;
        }
        .ql-toolbar {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px 20px 0 0;
            border: 1px solid rgba(251,114,153,0.3) !important;
            border-bottom: none !important;
        }
        #markdown-editor-container {
            display: none;
        }
        #markdown-textarea {
            width: 100%;
            height: 500px;
            padding: 1rem;
            border: 1px solid rgba(251,114,153,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.5);
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
        }
        .md-preview {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: none;
            border: 1px solid rgba(251,114,153,0.2);
        }
        
        /* 移动端底部固定操作栏 */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .action-buttons .btn,
        .action-buttons label.btn {
            flex: 1;
            text-align: center;
            padding: 0.7rem 0.5rem;
            box-sizing: border-box;
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: rgba(0,200,0,0.2);
            border: 1px solid #00a800;
            color: #006400;
        }
        .message.error {
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff0000;
            color: #a80000;
        }
        @media (max-width: 768px) {
            .editor-card {
                padding: 1.5rem;
            }
            .mode-switcher {
                width: 100%;
                justify-content: center;
            }
            .mode-btn {
                flex: 1;
                justify-content: center;
                padding: 0.5rem;
                font-size: 0.9rem;
            }
            #editor-container, #markdown-textarea {
                height: 400px;
            }
            .action-buttons {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
                padding: 1rem;
                margin: 0;
                box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
                z-index: 100;
                flex-direction: row;
            }
            /* 避免被底部栏遮挡 */
            body {
                padding-bottom: 80px; 
            }
        }
    </style>
</head>
<body>
    <div class="blog-container">
        <!-- 二级页面组件化导航栏 -->
        <blog-navbar-secondary></blog-navbar-secondary>
        
        <!-- 全局侧边栏组件 -->
        <blog-sidebar></blog-sidebar>

        <div class="editor-container">
    <div class="editor-card" style="padding: 1rem 2rem;">
        <div class="editor-header">
            <a href="admin.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h2 style="color: #FB7299; margin:0;">编辑文章</h2>
        </div>
    </div>

    <div class="editor-card">
        <input type="hidden" id="slug" name="slug" value="">

        <!-- 模式切换区 -->
        <div class="mode-switcher">
            <button type="button" class="mode-btn active" data-mode="rich" id="btnRichMode">
                <i class="fas fa-magic"></i> 小白模式
            </button>
            <button type="button" class="mode-btn" data-mode="markdown" id="btnMdMode">
                <i class="fab fa-markdown"></i> 专家模式
            </button>
        </div>

        <div class="editor-section-title"><i class="fas fa-info-circle"></i> 基础信息</div>
        
        <div class="form-row">
            <div class="form-group">
                <label>给文章起个好名字吧</label>
                <input type="text" id="title" placeholder="例如：我的第一篇博客">
            </div>
            <div class="form-group">
                <label>添加标签 <span class="help-text">用逗号分隔，方便分类归档</span></label>
                <input type="text" id="tags" placeholder="例如：日记, 随笔, 教程">
            </div>
        </div>

        <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
            <button type="button" id="suggestTagsBtn" class="btn"><i class="fas fa-lightbulb"></i> 智能推荐标签</button>
            <div id="suggested-tags" style="display: flex; flex-wrap: wrap; gap: 0.5rem; flex: 1;"></div>
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
            <label>文章摘要 <span class="help-text">一段简短的话，吸引读者点进来看看（选填）</span></label>
            <textarea id="excerpt" rows="2" placeholder="这篇内容主要讲了什么..."></textarea>
        </div>

        <div class="editor-section-title"><i class="fas fa-pen-nib"></i> 开始创作</div>

        <div id="rich-editor-container">
            <label>正文内容 <span class="help-text">就像用 Word 一样简单</span></label>
            <div id="editor-container"></div>
        </div>

        <div id="markdown-editor-container">
            <label>Markdown 源码 <span class="help-text">支持标准的 Markdown 语法</span></label>
            <div style="position: relative;">
                <textarea id="markdown-textarea" placeholder="# 在此输入标题..."></textarea>
                <label for="uploadMd" class="btn" style="position: absolute; top: 1rem; right: 1.5rem; cursor: pointer; padding: 0.3rem 0.8rem; background: rgba(251,114,153,0.1); border: 1px solid #FB7299; color: #FB7299;">
                    <i class="fas fa-file-upload"></i> 导入 .md 文件
                </label>
            </div>
            <div style="margin-top: 0.5rem;">
                <button id="previewMdBtn" class="btn" style="padding: 0.3rem 1rem;"><i class="fas fa-eye"></i> 实时预览</button>
            </div>
            <div id="markdown-preview" class="md-preview"></div>
        </div>

        <div class="action-buttons" id="actionButtons"></div>
        <input type="file" id="uploadMd" accept=".md, .markdown, text/markdown" style="display: none;">
        <div id="message" class="message"></div>
    </div>
</div>

<script>
    // ========== 全局变量 ==========
    let quill = null;
    let currentMode = 'rich';   // 'rich' 或 'markdown'
    let currentPost = null;
    let lastSavedContent = '';        // 最后一次保存的内容
    let autoSaveTimer = null;
    const AUTO_SAVE_INTERVAL = 30000; // 30秒

    // DOM 元素
    const slugHidden = document.getElementById('slug');
    const titleInput = document.getElementById('title');
    const tagsInput = document.getElementById('tags');
    const excerptInput = document.getElementById('excerpt');
    const messageDiv = document.getElementById('message');
    const uploadMd = document.getElementById('uploadMd');
    const suggestTagsBtn = document.getElementById('suggestTagsBtn');
    const suggestedTagsDiv = document.getElementById('suggested-tags');
    const richContainer = document.getElementById('rich-editor-container');
    const markdownContainer = document.getElementById('markdown-editor-container');
    const markdownTextarea = document.getElementById('markdown-textarea');
    const previewMdBtn = document.getElementById('previewMdBtn');
    const markdownPreview = document.getElementById('markdown-preview');

    // ========== 工具函数 ==========
    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        messageDiv.style.display = 'block';
        setTimeout(() => {
            messageDiv.style.display = 'none';
        }, 3000);
    }

    function showAutoSaveMessage() {
        let msgDiv = document.getElementById('autoSaveMsg');
        if (!msgDiv) {
            msgDiv = document.createElement('div');
            msgDiv.id = 'autoSaveMsg';
            msgDiv.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: rgba(0,0,0,0.7);
                color: white;
                padding: 8px 16px;
                border-radius: 30px;
                font-size: 0.8rem;
                z-index: 9999;
                transition: opacity 0.3s;
                opacity: 1;
            `;
            document.body.appendChild(msgDiv);
        }
        msgDiv.textContent = '草稿已自动保存';
        msgDiv.style.opacity = '1';
        setTimeout(() => {
            msgDiv.style.opacity = '0';
        }, 2000);
    }

    function getCurrentContent() {
        if (currentMode === 'rich') {
            return quill ? quill.root.innerHTML : '';
        } else {
            return markdownTextarea.value;
        }
    }

    function setContent(content) {
        if (currentMode === 'rich') {
            if (quill) quill.root.innerHTML = content || '';
        } else {
            markdownTextarea.value = content || '';
        }
    }

    function hasUnsavedChanges() {
        return getCurrentContent() !== lastSavedContent;
    }

    function initMode(mode) {
        currentMode = mode;
        
        // 更新UI按钮状态
        const btnRich = document.getElementById('btnRichMode');
        const btnMd = document.getElementById('btnMdMode');
        if (mode === 'rich') {
            btnRich.classList.add('active');
            btnMd.classList.remove('active');
            richContainer.style.display = 'block';
            markdownContainer.style.display = 'none';
            if (!quill) {
                quill = new Quill('#editor-container', {
                    theme: 'snow',
                    modules: {
                        toolbar: [
                            ['bold', 'italic', 'underline', 'strike'],
                            ['blockquote', 'code-block'],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            [{ 'script': 'sub'}, { 'script': 'super' }],
                            [{ 'indent': '-1'}, { 'indent': '+1' }],
                            [{ 'size': ['small', false, 'large', 'huge'] }],
                            [{ 'color': [] }, { 'background': [] }],
                            [{ 'align': [] }],
                            ['link', 'image'],
                            ['clean']
                        ]
                    },
                    placeholder: '在这里写下你的灵感...'
                });
            }
        } else {
            btnRich.classList.remove('active');
            btnMd.classList.add('active');
            richContainer.style.display = 'none';
            markdownContainer.style.display = 'block';
        }
    }

    // 绑定模式切换按钮事件
    document.getElementById('btnRichMode').addEventListener('click', () => {
        if (currentMode !== 'rich') {
            // 同步内容 (可选：把 MD 转成 HTML 放进富文本)
            const mdContent = markdownTextarea.value;
            if (mdContent && !quill.root.innerHTML.trim()) {
                quill.root.innerHTML = marked.parse(mdContent);
            }
            initMode('rich');
        }
    });

    document.getElementById('btnMdMode').addEventListener('click', () => {
        if (currentMode !== 'markdown') {
            // 同步内容 (可选：这里把 HTML 转 Markdown 比较复杂，暂时提示用户)
            const richContent = quill ? quill.root.innerHTML : '';
            if (richContent.trim() && richContent !== '<p><br></p>' && !markdownTextarea.value) {
                // 如果需要转换HTML到MD，可以使用第三方库，这里为了轻量化暂不自动双向转换
                markdownTextarea.value = "<!-- 请注意：从富文本切换到 Markdown，格式可能需要手动调整 -->\n\n" + richContent;
            }
            initMode('markdown');
        }
    });

    // ========== 文章加载 ==========
        async function loadPost(slug) {
        try {
            const response = await fetch(`/api/post/${slug}`);
            if (!response.ok) throw new Error('加载失败');
            const post = await response.json();
    
            slugHidden.value = post.slug;
            titleInput.value = post.title;
            tagsInput.value = post.tags || '';
            excerptInput.value = post.excerpt || '';
    
            // 获取 URL 参数中的 mode（用户明确选择）
            const urlParams = new URLSearchParams(window.location.search);
            const modeParam = urlParams.get('mode');
    
            if (modeParam === 'rich' || modeParam === 'markdown') {
                // 如果用户指定了模式，优先使用
                initMode(modeParam);
            } else {
                // 自动判断：包含 <script> 则强制 markdown，否则普通 HTML 判断
                const trimmed = (post.content || '').trim();
                const hasScript = /<script\b/i.test(trimmed);
                const isLikelyHTML = trimmed.startsWith('<') && trimmed.includes('>');
    
                if (hasScript) {
                    initMode('markdown');
                } else if (isLikelyHTML) {
                    initMode('rich');
                } else {
                    initMode('markdown');
                }
            }
    
            setContent(post.content || '');
            currentPost = { slug: post.slug, is_published: Number(post.is_published) };
            renderButtons();
            showMessage('文章已加载', 'success');
        } catch (error) {
            console.error('加载失败:', error);
            showMessage('加载失败', 'error');
        }
    }

    // ========== 动态按钮渲染 ==========
    function renderButtons() {
        const container = document.getElementById('actionButtons');
        if (!container) return;

        const isNew = !slugHidden.value;
        if (isNew) {
            container.innerHTML = `
                <button id="saveDraftBtn" class="btn"><i class="fas fa-save"></i> 存为草稿</button>
                <button id="publishNewBtn" class="btn btn-primary"><i class="fas fa-paper-plane"></i> 直接发布</button>
            `;
            document.getElementById('saveDraftBtn').addEventListener('click', () => savePost(0));
            document.getElementById('publishNewBtn').addEventListener('click', () => savePost(1));
        } else {
            const isPublished = currentPost && currentPost.is_published === 1;
            const toggleText = isPublished ? '<i class="fas fa-undo"></i> 撤回为草稿' : '<i class="fas fa-paper-plane"></i> 重新发布';
            container.innerHTML = `
                <button id="saveBtn" class="btn"><i class="fas fa-save"></i> 仅保存更改</button>
                <button id="toggleStatusBtn" class="btn btn-primary">${toggleText}</button>
            `;
            document.getElementById('saveBtn').addEventListener('click', () => savePost());
            document.getElementById('toggleStatusBtn').addEventListener('click', () => {
                const newStatus = isPublished ? 0 : 1;
                savePost(newStatus);
            });
        }
    }

    // ========== 统一保存/发布/切换 ==========
    async function savePost(isPublished = null) {
        const formData = new FormData();
        formData.append('slug', slugHidden.value);
        formData.append('title', titleInput.value);
        formData.append('content', getCurrentContent());
        formData.append('excerpt', excerptInput.value);
        formData.append('tags', tagsInput.value);
        if (isPublished !== null) {
            formData.append('is_published', isPublished);
        }

        const activeBtn = document.querySelector('#saveDraftBtn, #publishNewBtn, #saveBtn, #toggleStatusBtn');
        const originalText = activeBtn?.textContent;
        if (activeBtn) {
            activeBtn.disabled = true;
            activeBtn.textContent = '处理中...';
        }

        try {
            const response = await fetch('/api/admin/post', { method: 'POST', body: formData });
            const result = await response.json();

            if (result.success) {
                showMessage('操作成功', 'success');
                // 更新最后保存的内容
                lastSavedContent = getCurrentContent();

                if (!slugHidden.value && result.slug) {
                    window.location.href = `editor.html?slug=${result.slug}`;
                    return;
                }

                if (isPublished !== null) {
                    if (currentPost) currentPost.is_published = isPublished;
                    renderButtons();
                } else {
                    if (currentPost) await loadPost(currentPost.slug);
                    else if (slugHidden.value) await loadPost(slugHidden.value);
                }
            } else {
                showMessage(result.error || '操作失败', 'error');
                if (activeBtn) {
                    activeBtn.disabled = false;
                    activeBtn.textContent = originalText;
                }
            }
        } catch (error) {
            console.error('操作失败:', error);
            showMessage('网络错误，请重试', 'error');
            if (activeBtn) {
                activeBtn.disabled = false;
                activeBtn.textContent = originalText;
            }
        }
    }

    // ========== 自动保存 ==========
    async function autoSave() {
        if (!hasUnsavedChanges()) return;
        // 只在有内容时自动保存
        const hasContent = titleInput.value.trim() || getCurrentContent().trim();
        if (!hasContent) return;

        const formData = new FormData();
        formData.append('slug', slugHidden.value);
        formData.append('title', titleInput.value);
        formData.append('content', getCurrentContent());
        formData.append('excerpt', excerptInput.value);
        formData.append('tags', tagsInput.value);
        // 不传递 is_published，保持原有状态

        try {
            const response = await fetch('/api/admin/post', { method: 'POST', body: formData });
            const result = await response.json();
            if (result.success) {
                lastSavedContent = getCurrentContent();
                showAutoSaveMessage();
                if (result.slug && !slugHidden.value) {
                    slugHidden.value = result.slug;
                    if (currentPost) currentPost.slug = result.slug;
                }
            }
        } catch (err) {
            console.error('自动保存失败', err);
        }
    }

    function startAutoSaveTimer() {
        if (autoSaveTimer) clearInterval(autoSaveTimer);
        autoSaveTimer = setInterval(() => {
            autoSave();
        }, AUTO_SAVE_INTERVAL);
    }

    function stopAutoSaveTimer() {
        if (autoSaveTimer) {
            clearInterval(autoSaveTimer);
            autoSaveTimer = null;
        }
    }

    // ========== 上传MD文件 ==========
    uploadMd.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const allowedExts = ['.md', '.markdown'];
        const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
        if (!allowedExts.includes(ext) && file.type !== 'text/markdown') {
            alert('只支持上传 .md 或 .markdown 文件');
            e.target.value = '';
            return;
        }
        if (file.size > 1024 * 1024) {
            alert('文件大小不能超过 1MB');
            e.target.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = (ev) => {
            const content = ev.target.result;
            if (currentMode === 'rich') setContent(marked.parse(content));
            else setContent(content);
            showMessage('文件已加载到正文', 'success');
            lastSavedContent = getCurrentContent(); // 文件加载后视为已保存状态？不，因为未保存，但可以重置比较基准
        };
        reader.onerror = () => alert('文件读取失败');
        reader.readAsText(file, 'UTF-8');
        e.target.value = '';
    });

    // ========== 标签推荐 ==========
    suggestTagsBtn.addEventListener('click', async () => {
        const title = titleInput.value;
        let content = currentMode === 'rich' ? (quill?.getText() || '') : markdownTextarea.value;
        if (!title && !content) {
            alert('请先填写标题或内容以便推荐标签');
            return;
        }

        try {
            const res = await fetch('/api/suggest-tags', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });
            const tags = await res.json();
            if (!Array.isArray(tags)) return;

            const limited = tags.slice(0, 5);
            suggestedTagsDiv.innerHTML = '';
            limited.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'suggested-tag';
                span.dataset.tag = tag;
                span.textContent = '#' + tag;
                span.addEventListener('click', () => updateTagSelection(tag));
                suggestedTagsDiv.appendChild(span);
            });

            const currentTags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t);
            document.querySelectorAll('.suggested-tag').forEach(el => {
                if (currentTags.includes(el.dataset.tag)) el.classList.add('selected');
                else el.classList.remove('selected');
            });
        } catch (err) {
            console.error('获取推荐标签失败:', err);
        }
    });

    function updateTagSelection(tag) {
        let currentTags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t);
        const index = currentTags.indexOf(tag);
        if (index > -1) currentTags.splice(index, 1);
        else currentTags.push(tag);
        tagsInput.value = currentTags.join(', ');

        document.querySelectorAll('.suggested-tag').forEach(el => {
            if (currentTags.includes(el.dataset.tag)) el.classList.add('selected');
            else el.classList.remove('selected');
        });
    }

    // ========== Markdown 预览 ==========
    if (previewMdBtn) {
        previewMdBtn.addEventListener('click', () => {
            const md = markdownTextarea.value;
            markdownPreview.innerHTML = marked.parse(md);
            markdownPreview.style.display = 'block';
        });
    }

    // ========== 页面退出前检查 ==========
    window.addEventListener('beforeunload', (e) => {
        if (hasUnsavedChanges()) {
            e.preventDefault();
            e.returnValue = '您有未保存的更改，确定要离开吗？';
            return e.returnValue;
        }
    });

    // ========== 页面初始化 ==========
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');
        const mode = urlParams.get('mode');

        if (slug) {
            loadPost(slug);
        } else {
            if (mode === 'rich' || mode === 'markdown') initMode(mode);
            else initMode('rich');
            renderButtons();
            lastSavedContent = ''; // 新建时无保存内容
        }
        startAutoSaveTimer();

        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', () => {
            stopAutoSaveTimer();
        });
    });
</script>
    </div>
</body>
</html>
