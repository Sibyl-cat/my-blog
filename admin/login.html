<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>登录 · 织星屿</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script src="/components.js"></script>
    <style>
        body {
            min-height: 100vh;
            background: var(--body-bg);
            transition: all 0.3s ease;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem 1rem;
            position: relative;
            z-index: 1;
        }

        /* 装饰背景 */
        .decor-star {
            position: fixed;
            font-size: 10rem;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
            animation: floatSlow 12s infinite;
        }
        .star-1 { bottom: -2rem; left: -2rem; }
        .star-2 { top: -2rem; right: -2rem; font-size: 8rem; animation-delay: -5s; }

        @keyframes floatSlow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 30px) rotate(15deg); }
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 40px;
            padding: 3.5rem 3rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px var(--card-shadow), 0 0 30px var(--pink-shadow);
            width: 100%;
            max-width: 440px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            margin-bottom: 2.5rem;
        }

        .login-header i.main-icon {
            font-size: 3.5rem;
            color: var(--primary-pink);
            background: var(--primary-pink-alpha);
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px var(--pink-shadow);
            transform: rotate(-5deg);
            transition: all 0.3s;
        }

        .login-card:hover .login-header i.main-icon {
            transform: rotate(0deg) scale(1.1);
        }

        h1 {
            color: var(--primary-pink);
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .sub {
            color: var(--text-secondary);
            font-size: 1rem;
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
            padding-left: 0.5rem;
        }

        label i {
            color: var(--primary-pink);
            margin-right: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 1rem 1.4rem;
            border: 1.5px solid var(--glass-border);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-size: 1.05rem;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-pink);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 4px var(--primary-pink-alpha);
        }

        .btn-login {
            width: 100%;
            padding: 1.1rem;
            background: var(--primary-pink);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            box-shadow: 0 8px 15px var(--pink-shadow);
        }

        .btn-login:hover {
            background: var(--primary-pink-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px var(--pink-shadow);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .register-link {
            margin-top: 2rem;
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .register-link a {
            color: var(--primary-pink);
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            transition: all 0.2s;
        }

        .register-link a:hover {
            text-decoration: underline;
            color: var(--primary-pink-hover);
        }

        .error-message {
            color: #ff4d4f;
            font-size: 0.9rem;
            margin-top: 1rem;
            min-height: 1.2rem;
            font-weight: 500;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.2s;
            padding: 0.5rem 1rem;
            border-radius: 12px;
        }

        .back-home:hover {
            color: var(--primary-pink);
            background: var(--primary-pink-alpha);
        }

        @media (max-width: 480px) {
            .login-card { 
                padding: 2.5rem 1.5rem; 
                border-radius: 30px;
            }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="blog-container">
        <!-- 二级页面组件化导航栏 -->
        <blog-navbar-secondary></blog-navbar-secondary>
        
        <!-- 全局侧边栏组件 -->
        <blog-sidebar></blog-sidebar>

        <div class="login-wrapper">
            <!-- 装饰元素 -->
            <div class="decor-star star-1">🌟</div>
            <div class="decor-star star-2">🌸</div>

            <div class="login-card">
                <div class="login-header">
                    <i class="fas fa-user-astronaut main-icon"></i>
                    <h1>织星屿</h1>
                    <div class="sub">✨ 坠落人间的星海 · 管理中心 ✨</div>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> 用户名</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" placeholder="输入管理员账号" autocomplete="username" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> 密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="输入您的密码" autocomplete="current-password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-login">
                        <i class="fas fa-rocket"></i> 开启星际之旅
                    </button>
                    <div class="error-message" id="loginError"></div>
                </form>
                <div class="register-link">
                    还没有账号？ <a href="/register.html">立即申请加入</a>
                </div>
                <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> 返回星屿首页</a>
            </div>
        </div>

        <blog-footer></blog-footer>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('loginError');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorMsg.textContent = '请输入用户名和密码';
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/admin.html';
                } else {
                    errorMsg.textContent = data.error || '登录失败';
                }
            } catch (err) {
                errorMsg.textContent = '网络错误，请稍后重试';
            }
        });
    </script>
    </div>
</body>
</html>
