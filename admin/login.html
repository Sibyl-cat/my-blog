<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>登录 · 织星屿</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script src="/components.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: var(--body-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        /* 可爱装饰 */
        body::before {
            content: "🌟";
            font-size: 12rem;
            position: absolute;
            bottom: -50px;
            left: -50px;
            opacity: 0.1;
            pointer-events: none;
            animation: floatSlow 12s infinite;
        }
        body::after {
            content: "🌸";
            font-size: 8rem;
            position: absolute;
            top: -30px;
            right: -30px;
            opacity: 0.1;
            pointer-events: none;
            animation: floatSlow 10s infinite reverse;
        }
        @keyframes floatSlow {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, 20px) rotate(10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 3rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 45px var(--card-shadow);
            width: 100%;
            max-width: 420px;
            text-align: center;
            transition: all 0.3s;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            margin-bottom: 2rem;
        }
        .login-header i {
            font-size: 4rem;
            color: #FB7299;
            background: rgba(255,255,255,0.5);
            padding: 1rem;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        h1 {
            color: #FB7299;
            font-size: 2rem;
            margin-top: 1rem;
            font-weight: 600;
        }
        .sub {
            color: #888;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2a2a2a;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1px solid rgba(251,114,153,0.3);
            border-radius: 60px;
            background: rgba(255,255,255,0.7);
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #FB7299;
            box-shadow: 0 0 0 3px rgba(251,114,153,0.2);
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: #FB7299;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-login:hover {
            background: #ff8aa5;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251,114,153,0.3);
        }
        .register-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #666;
        }
        .register-link a {
            color: #FB7299;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #ff4d4f;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        .back-home {
            display: inline-block;
            margin-top: 1rem;
            color: #888;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .back-home:hover {
            color: #FB7299;
        }
        @media (max-width: 480px) {
            .login-card { padding: 1.8rem; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="blog-container">
        <!-- 二级页面组件化导航栏 -->
        <blog-navbar-secondary></blog-navbar-secondary>
        
        <!-- 全局侧边栏组件 -->
        <blog-sidebar></blog-sidebar>

        <div class="login-card" style="margin: 4rem auto;">
        <div class="login-header">
            <i class="fas fa-user-astronaut"></i>
            <h1>✨ 织星屿 · 坠落人间的星海 ✨</h1>
            <div class="sub">欢迎回来，管理员大人</div>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> 用户名</label>
                <input type="text" id="username" placeholder="你的用户名" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> 密码</label>
                <input type="password" id="password" placeholder="••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-rocket"></i> 登录
            </button>
            <div class="error-message" id="loginError"></div>
        </form>
        <div class="register-link">
            还没有账号？ <a href="/register.html">立即注册</a>
        </div>
        <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('loginError');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorMsg.textContent = '请输入用户名和密码';
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/admin.html';
                } else {
                    errorMsg.textContent = data.error || '登录失败';
                }
            } catch (err) {
                errorMsg.textContent = '网络错误，请稍后重试';
            }
        });
    </script>
    </div>
</body>
</html>
