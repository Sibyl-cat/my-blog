<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>标签文章 · 星辰空间站</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
</head>

<body>
    <div class="blog-container">
        <!-- 二级页面组件化导航栏 -->
        <blog-navbar-secondary></blog-navbar-secondary>

        <!-- 全局侧边栏组件 -->
        <blog-sidebar></blog-sidebar>

        <!-- 标签信息卡片 -->
        <div class="profile-card glass" id="tag-info" style="margin-bottom: 2rem; text-align: center;">
            <!-- 动态填充标签名 -->
        </div>

        <h2 class="section-title"><i class="fas fa-pen-fancy" style="color:#FB7299; margin-right:12px;"></i>包含此标签的文章
        </h2>

        <div class="article-grid" id="post-grid">
            <!-- 动态加载 -->
        </div>

        <!-- 页脚 -->
        <blog-footer></blog-footer>
    </div>>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tagName = urlParams.get('name');
        if (!tagName) {
            window.location.href = 'tags.html';
        }

        async function loadTagPosts() {
            try {
                const res = await fetch(`/api/posts/tag?name=${encodeURIComponent(tagName)}`);
                const posts = await res.json();

                // 显示标签信息
                document.getElementById('tag-info').innerHTML = `
                <h1 style="color: #FB7299; font-size: 2.5rem;">#${tagName}</h1>
                <p style="font-size: 1.2rem; color: #444;">共 ${posts.length} 篇文章</p>
            `;

                // 渲染文章卡片
                const grid = document.getElementById('post-grid');
                if (posts.length === 0) {
                    grid.innerHTML = '<p style="text-align: center; color: #666;">暂无文章</p>';
                    return;
                }

                let html = '';
                posts.forEach(post => {
                    const date = new Date(post.updated_at);
                    // 强制显示北京时间 (UTC+8)
                    const formattedDate = date.toLocaleDateString('zh-CN', {
                        timeZone: 'Asia/Shanghai',
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit'
                    }).replace(/\//g, '-');
                    const tags = post.tags ? post.tags.split(',').map(t => `<span class="tag">#${t.trim()}</span>`).join('') : '';
                    html += `
                    <article class="article-card glass">
                        <div class="card-meta">
                            <span><i class="far fa-calendar"></i> ${formattedDate}</span>
                        </div>
                        <a href="post.html?slug=${post.slug}" style="text-decoration: none; color: inherit;">
                            <h3 class="card-title">${post.title}</h3>
                        </a>
                        <p class="card-excerpt">${post.excerpt || ''}</p>
                        <div class="card-tags">${tags}</div>
                    </article>
                `;
                });
                grid.innerHTML = html;
            } catch (err) {
                console.error('加载失败:', err);
                document.getElementById('post-grid').innerHTML = '<p style="color: red;">加载失败</p>';
            }
        }

        loadTagPosts();
    </script>
</body>

</html>
