<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>文章管理 · 织星屿</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <style>
        /* ========== 原有样式保持不变 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: var(--body-bg);
            min-height: 100vh;
            padding: 2rem;
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        .admin-container {
            width: 100%;               /* 占满父容器宽度 */
            max-width: none;           /* 移除最大宽度限制 */
            margin: 0 auto;            /* 仍可保留居中，但宽度100%时居中无意义，可删除 */
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            min-height: calc(100vh - 4rem); /* 视口高度减去 body 的内边距，使容器撑满 */
        }
        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 12px 28px var(--card-shadow);
        }
        h2 {
            color: #FB7299;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            border-bottom: 2px solid #FB7299;
            padding-bottom: 0.5rem;
        }
        .post-list {
            list-style: none;
            max-height: 600px;
            overflow-y: auto;
        }
        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid rgba(251, 114, 153, 0.2);
            cursor: pointer;
            transition: background 0.2s;
        }
        .post-item:hover {
            background: rgba(251, 114, 153, 0.1);
        }
        .post-item .title {
            font-weight: 600;
            color: var(--text-main);
        }
        .post-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(251, 114, 153, 0.3);
            text-decoration: none;
            color: #2a2a2a;
        }
        .btn:hover {
            background: #FB7299;
            color: white;
        }
        .btn-danger {
            background: rgba(255, 100, 100, 0.2);
            border-color: #ff4d4f;
        }
        .btn-danger:hover {
            background: #ff4d4f;
            color: white;
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: rgba(0, 200, 0, 0.2);
            border: 1px solid #00a800;
            color: #006400;
        }
        .message.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #a80000;
        }
        .admin-container {
            min-height: 100vh;
        }
        .left-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .left-panel .post-list {
            flex: 1;
            overflow-y: auto;
        }
        .logout-container {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(251,114,153,0.3);
        }
        .welcome-message {
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
            background: rgba(251,114,153,0.15);
            border-radius: 24px;
            font-size: 1.3rem;
            color: #FB7299;
            border: 1px solid rgba(251,114,153,0.3);
        }
        .welcome-message i {
            margin-right: 0.5rem;
        }
        #username {
            font-weight: 600;
            color: #FB7299;
        }
        .btn-user {
            background: rgba(251,114,153,0.15);
            border: 1px dashed #FB7299;
            color: #FB7299;
            text-decoration: none;
        }
        .btn-user:hover {
            background: #FB7299;
            color: white;
            border-color: #FB7299;
            text-decoration: none;
        }
        /* 开关样式 */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(251,114,153,0.1);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
        }
        .switch-label {
            color: #FB7299;
            font-weight: 600;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            margin-left: 0.5rem;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #FB7299;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        /* 右侧面板占位样式 */
        .right-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .right-panel p {
            font-size: 1.5rem;
            color: #FB7299;
            margin-bottom: 1rem;
        }
        .right-panel .new-link {
            display: inline-block;
            padding: 1rem 2rem;
            background: #FB7299;
            color: white;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .right-panel .new-link:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(251,114,153,0.3);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .admin-container {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 1rem;
            }
            .panel {
                padding: 1.5rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            .post-item {
                padding: 1rem;
                font-size: 1rem;
            }
            .post-actions .btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.9rem;
            }
            .logout-container {
                margin-top: 0.8rem;
                padding-top: 0.8rem;
            }
            #logoutBtnLeft {
                padding: 0.8rem;
            }
        }
        @media (max-width: 400px) {
            .post-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .post-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    
        /* 模式选择气泡 */
        .mode-bubble {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(251,114,153,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 0.5rem;
            min-width: 160px;
            z-index: 1000;
            margin-bottom: 8px;
        }
        .mode-bubble .bubble-arrow {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(251,114,153,0.3);
        }
        .mode-option {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.6rem 1rem;
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #2a2a2a;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.2rem;
            transition: all 0.2s ease;
        }
        .mode-option:hover {
            background: rgba(251,114,153,0.15);
            transform: translateX(4px);
            color: #FB7299;
        }
        .option-desc {
            font-size: 0.75rem;
            color: #888;
            font-weight: normal;
        }
        
    </style>
</head>
<body>
    <div class="blog-container">
        <!-- 二级页面组件化导航栏 -->
        <blog-navbar-secondary></blog-navbar-secondary>
    
        <!-- 全局侧边栏组件 -->
        <blog-sidebar></blog-sidebar>
        <div class="admin-container">    
            <!-- 左侧：文章列表 -->
            <div class="panel left-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem;">
                    <h2 style="margin-bottom: 0;"><i class="fas fa-list"></i> 文章列表</h2>
                    <a href="/users.html" class="btn btn-user" id="userManagementBtn" style="display: none;">
                        <i class="fas fa-users"></i> 用户管理
                    </a>
                </div>
    
                <!-- 作者问候语 -->
                <div class="welcome-message glass">
                    <i class="fas fa-user-circle"></i> 你好，<span id="username">加载中...</span>！
                </div>
    
                <!-- 修复模式开关容器（初始隐藏） -->
                <div id="maintenance-switch-container" class="switch-container" style="display: none;">
                    <span class="switch-label"><i class="fas fa-tools"></i> 修复模式</span>
                    <label class="switch">
                        <input type="checkbox" id="maintenanceToggle">
                        <span class="slider round"></span>
                    </label>
                    <span id="maintenance-status" style="color:#666; font-size:0.9rem;"></span>
                </div>
    
                <div class="post-list">
                    <h3 style="color:#FB7299; margin-bottom:0.5rem;">已发表</h3>
                    <div id="published-posts" style="margin-bottom:1.5rem;"></div>
                    <h3 style="color:#FB7299; margin-bottom:0.5rem;">草稿箱</h3>
                    <div id="draft-posts"></div>
                </div>
    
                <div class="logout-container">
                    <button id="logoutBtnLeft" class="btn" style="width: 100%; background: rgba(255,255,255,0.3); border: 1px solid #FB7299;">
                        <i class="fas fa-sign-out-alt"></i> 注销
                    </button>
                </div>
            </div>
    
            <!-- 右侧：占位面板（提示新建文章） -->
            <div class="panel right-panel">
                <p><i class="fas fa-pencil-alt" style="color:#FB7299;"></i> 点一点，让文字发光</p>
                <p><i class="fas fa-star" style="color:#FB7299;"></i> 或者</p>
                <div style="position: relative;">
                    <a href="#" id="newPostLink" class="new-link"><i class="fas fa-plus"></i> 种下一颗新种子</a>
                    <div id="modeBubble" class="mode-bubble" style="display: none;">
                        <div class="bubble-arrow"></div>
                        <button class="mode-option" data-mode="rich">
                            🌸 随便写写（富文本）
                            <span class="option-desc">像写日记一样简单</span>
                        </button>
                        <button class="mode-option" data-mode="markdown">
                            ⌨️ 硬核码字（Markdown）
                            <span class="option-desc">懂代码的玩法</span>
                        </button>
                    </div>
                </div>
                <p><i class="fas fa-home" style="color:#FB7299;"></i> 或者</p>
                <a href="index.html" class="btn" style="background: transparent; border: 1px solid #FB7299;">
                    <i class="fas fa-arrow-left"></i> 回首页看看
                </a>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局变量 ====================
        const publishedContainer = document.getElementById('published-posts');
        const draftContainer = document.getElementById('draft-posts');
        const messageDiv = document.getElementById('message'); // 可能没有，但保留
        const usernameSpan = document.getElementById('username');
        const logoutBtn = document.getElementById('logoutBtnLeft');
        const userManagementBtn = document.getElementById('userManagementBtn');

        // 修复模式开关相关
        const maintenanceContainer = document.getElementById('maintenance-switch-container');
        const maintenanceToggle = document.getElementById('maintenanceToggle');
        const maintenanceStatus = document.getElementById('maintenance-status');

        let currentUserRole = null;

        // ==================== 工具函数：显示消息（可选，用于删除等操作）====================
        function showMessage(text, type) {
            if (!messageDiv) return;
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        // ==================== 加载当前用户信息 ====================
        async function loadCurrentUser() {
            try {
                const res = await fetch('/api/user/me');
                if (!res.ok) throw new Error('获取用户失败');
                const user = await res.json();
                if (user.username) {
                    usernameSpan.textContent = user.username;
                    currentUserRole = user.role;

                    // 控制用户管理按钮（仅admin可见）
                    if (userManagementBtn) {
                        userManagementBtn.style.display = user.role === 'admin' ? 'inline-block' : 'none';
                    }

                    // 处理修复模式开关（仅 admin/superadmin 可见）
                    if (user.role === 'admin' || user.role === 'superadmin') {
                        maintenanceContainer.style.display = 'flex';
                        await loadMaintenanceStatus();
                    } else {
                        maintenanceContainer.style.display = 'none';
                    }
                } else {
                    usernameSpan.textContent = '访客';
                }
            } catch (err) {
                console.error('获取用户信息失败:', err);
                usernameSpan.textContent = '未知';
            }
        }

        // ==================== 加载修复模式状态 ====================
        async function loadMaintenanceStatus() {
            try {
                const res = await fetch('/api/admin/maintenance/status');
                if (!res.ok) throw new Error('获取状态失败');
                const data = await res.json();
                maintenanceToggle.checked = data.enabled;
                maintenanceStatus.textContent = data.enabled ? '已开启' : '已关闭';
            } catch (err) {
                console.error('获取修复模式状态失败', err);
                maintenanceStatus.textContent = '状态未知';
            }
        }

        // ==================== 切换修复模式 ====================
        if (maintenanceToggle) {
            maintenanceToggle.addEventListener('change', async (e) => {
                const enable = e.target.checked;
                try {
                    const res = await fetch('/api/admin/maintenance/toggle', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ enable })
                    });
                    const data = await res.json();
                    if (data.success) {
                        showMessage(enable ? '修复模式已开启' : '修复模式已关闭', 'success');
                        maintenanceStatus.textContent = enable ? '已开启' : '已关闭';
                    } else {
                        showMessage('操作失败：' + (data.error || '未知错误'), 'error');
                        maintenanceToggle.checked = !enable;
                    }
                } catch (err) {
                    showMessage('网络错误，请重试', 'error');
                    maintenanceToggle.checked = !enable;
                }
            });
        }

        // ==================== 加载文章列表 ====================
        async function loadPosts() {
            try {
                const response = await fetch('/api/admin/posts');
                if (!response.ok) throw new Error('加载失败');
                const posts = await response.json();

                publishedContainer.innerHTML = '';
                draftContainer.innerHTML = '';

                if (posts.length === 0) {
                    publishedContainer.innerHTML = '<p style="text-align:center;">暂无文章</p>';
                    return;
                }

                posts.forEach(post => {
                    // 只显示标题，不显示作者或slug
                    const html = `
                        <div class="post-item" data-slug="${post.slug}" data-published="${post.is_published}">
                            <div style="flex: 1;">
                                <a href="editor.html?slug=${post.slug}" style="text-decoration: none; color: inherit;">
                                    <span class="title">${post.title}</span>
                                </a>
                            </div>
                            <div class="post-actions">
                                <a href="editor.html?slug=${post.slug}" class="btn">编辑</a>
                                <button class="btn btn-danger" onclick="deletePost('${post.slug}')">删除</button>
                            </div>
                        </div>
                    `;

                    if (post.is_published == 1) {
                        publishedContainer.innerHTML += html;
                    } else {
                        draftContainer.innerHTML += html;
                    }
                });
            } catch (error) {
                console.error(error);
                publishedContainer.innerHTML = '<p style="color: red;">加载失败</p>';
            }
        }

        // ==================== 删除文章 ====================
        window.deletePost = async function(slug) {
            if (!confirm(`确定要删除文章 "${slug}" 吗？`)) return;

            const formData = new FormData();
            formData.append('slug', slug);

            try {
                const response = await fetch('/api/admin/post/delete', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    showMessage('删除成功', 'success');
                    loadPosts();
                } else {
                    showMessage(result.error || '删除失败', 'error');
                }
            } catch (error) {
                showMessage('删除失败', 'error');
            }
        };

        // ==================== 注销按钮 ====================
        logoutBtn.addEventListener('click', async () => {
            if (confirm('确定要注销吗？')) {
                try {
                    const response = await fetch('/api/logout', {
                        method: 'POST',
                        credentials: 'same-origin'
                    });
                    if (response.ok) {
                        window.location.replace('/admin/login.html');
                    } else {
                        alert('注销失败');
                    }
                } catch (error) {
                    alert('注销出错');
                }
            }
        });

        // ==================== 初始加载 ====================
        loadCurrentUser();
        loadPosts();
     // ==================== 新建文章模式选择 ====================
        const newPostLink = document.getElementById('newPostLink');
        const modeBubble = document.getElementById('modeBubble');
        
        // 显示/隐藏气泡
        newPostLink.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            // 切换显示
            if (modeBubble.style.display === 'none') {
                modeBubble.style.display = 'block';
            } else {
                modeBubble.style.display = 'none';
            }
        });
        
        // 点击选项
        document.querySelectorAll('.mode-option').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const mode = btn.dataset.mode;
                window.location.href = `editor.html?mode=${mode}`;
            });
        });
        
        // 点击页面其他地方关闭气泡
        document.addEventListener('click', (e) => {
            if (!newPostLink.contains(e.target) && !modeBubble.contains(e.target)) {
                modeBubble.style.display = 'none';
            }
        });
    </script>
</body>
</html>
