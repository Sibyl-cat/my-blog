<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>管理后台 · 织星屿</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <style>
        :root {
            --admin-pink: #FB7299;
            --admin-pink-light: rgba(251, 114, 153, 0.1);
            --admin-pink-glow: 0 0 15px rgba(251, 114, 153, 0.3);
        }

        body {
            padding: 0;
            display: block; /* Override flex from style.css */
            min-height: 100vh;
            background-attachment: fixed;
        }

        .admin-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
            gap: 0;
        }

        /* 侧边栏 */
        .admin-sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 100;
        }

        .admin-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--admin-pink);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
            padding-left: 0.5rem;
        }

        .admin-nav {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem 1.2rem;
            border-radius: 16px;
            color: var(--text-main);
            text-decoration: none;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-item i {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
            color: var(--admin-pink);
        }

        .nav-item:hover, .nav-item.active {
            background: var(--admin-pink-light);
            color: var(--admin-pink);
            transform: translateX(5px);
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        /* 主内容区 */
        .admin-main {
            padding: 2rem 3rem;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .header-title h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0.5rem 1.2rem;
            background: var(--glass-bg);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px var(--pink-shadow);
        }

        .admin-header-tools {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--glass-bg);
            padding: 1.5rem;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--admin-pink);
            box-shadow: var(--admin-pink-glow);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: var(--admin-pink-light);
            color: var(--admin-pink);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .stat-info .count {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--admin-pink);
        }

        .stat-info .label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* 内容板块 */
        .content-section {
            background: var(--glass-bg);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            padding: 2rem;
            box-shadow: 0 8px 32px var(--card-shadow);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            color: var(--admin-pink);
            font-weight: 600;
        }

        /* 列表项 */
        .post-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .post-card:hover {
            background: var(--admin-pink-light);
            border-color: var(--admin-pink-alpha);
            transform: scale(1.01);
        }

        .post-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .post-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            text-decoration: none;
        }

        .post-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
        }

        .status-badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-published { background: #e6f7ed; color: #1f8b4d; }
        .status-draft { background: #fff1f0; color: #f5222d; }

        .post-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            text-decoration: none;
        }

        .btn-edit { background: var(--admin-pink); }
        .btn-delete { background: #ff4d4f; }
        .action-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* 新建文章按钮 */
        .new-post-btn {
            background: var(--admin-pink);
            color: white;
            padding: 0.8rem 1.8rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px var(--pink-shadow);
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .new-post-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--pink-shadow);
            filter: brightness(1.1);
        }

        /* 模式气泡 */
        .mode-bubble {
            position: absolute;
            bottom: calc(100% + 15px);
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 0.8rem;
            min-width: 220px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            animation: fadeInScale 0.3s ease-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .mode-option {
            width: 100%;
            padding: 12px 15px;
            border: none;
            background: transparent;
            color: var(--text-main);
            text-align: left;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .mode-option:hover {
            background: var(--admin-pink-light);
            color: var(--admin-pink);
        }

        .mode-option .opt-title { font-weight: 600; font-size: 0.95rem; }
        .mode-option .opt-desc { font-size: 0.75rem; opacity: 0.7; }

        /* 开关样式优化 */
        .switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.8rem 1.2rem;
            background: rgba(0,0,0,0.03);
            border-radius: 15px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--admin-pink); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* 移动端适配 */
        @media (max-width: 992px) {
            .admin-layout { grid-template-columns: 1fr; }
            .admin-sidebar { display: none; } /* 或改为顶部条/抽屉 */
            .admin-main { padding: 1.5rem 1rem; }
            
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 600px) {
            .admin-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .header-user { width: 100%; justify-content: center; }
            .stats-grid { grid-template-columns: 1fr; }
            .section-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .post-card { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .post-actions { align-self: flex-end; }
            .new-post-btn { width: 100%; justify-content: center; }
        }

        /* 底部导航 (仅移动端可见) */
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: none;
            justify-content: space-around;
            padding: 0.8rem 0;
            z-index: 1000;
        }

        @media (max-width: 992px) {
            .mobile-nav { display: flex; }
            body { padding-bottom: 80px; }
        }

        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
        }

        .mobile-nav-item.active { color: var(--admin-pink); }
        .mobile-nav-item i { font-size: 1.3rem; }

    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 (桌面端) -->
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <i class="fas fa-rocket"></i> 织星管理
            </div>
            <nav class="admin-nav">
                <a href="#" class="nav-item active"><i class="fas fa-file-alt"></i> 内容管理</a>
                <a href="/users.html" class="nav-item" id="sidebarUserMgmt" style="display: none;"><i class="fas fa-users"></i> 用户管理</a>
                <a href="index.html" class="nav-item"><i class="fas fa-home"></i> 访问首页</a>
            </nav>
            
            <div class="sidebar-footer">
                <div id="maintenance-switch-container" class="switch-container" style="display: none; margin-bottom: 1.5rem;">
                    <div style="flex: 1;">
                        <div style="font-size: 0.9rem; font-weight: 600; color: var(--admin-pink);">修复模式</div>
                        <div id="maintenance-status" style="font-size: 0.7rem; color: var(--text-muted);">已关闭</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="maintenanceToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <button id="logoutBtnLeft" class="nav-item" style="width: 100%; border: none; background: transparent; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> 注销登录
                </button>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="admin-main">
            <!-- 头部 -->
            <header class="admin-header">
                <div class="header-title">
                    <h1>内容管理</h1>
                    <p style="color: var(--text-muted);">欢迎回来，<span id="username" style="color: var(--admin-pink); font-weight: 600;">...</span></p>
                </div>
                <div class="admin-header-tools">
                    <night-mode-toggle></night-mode-toggle>
                    <div class="header-user">
                        <i class="fas fa-user-circle" style="color: var(--admin-pink); font-size: 1.5rem;"></i>
                        <span id="header-username">管理员</span>
                    </div>
                </div>
            </header>

            <!-- 统计 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-paper-plane"></i></div>
                    <div class="stat-info">
                        <span class="count" id="stat-published">0</span>
                        <span class="label">已发布文章</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-edit"></i></div>
                    <div class="stat-info">
                        <span class="count" id="stat-drafts">0</span>
                        <span class="label">草稿箱内容</span>
                    </div>
                </div>
            </div>

            <!-- 文章列表板块 -->
            <section class="content-section">
                <div class="section-header">
                    <div class="section-title"><i class="fas fa-list-ul"></i> 文章列表</div>
                    <div style="position: relative;">
                        <button id="newPostLink" class="new-post-btn">
                            <i class="fas fa-plus"></i> 新建文章
                        </button>
                        <div id="modeBubble" class="mode-bubble">
                            <button class="mode-option" data-mode="rich">
                                <span class="opt-title">🌸 富文本编辑器</span>
                                <span class="opt-desc">所见即所得，适合日常写作</span>
                            </button>
                            <button class="mode-option" data-mode="markdown">
                                <span class="opt-title">⌨️ Markdown 编辑器</span>
                                <span class="opt-desc">沉浸式排版，适合技术分享</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="posts-container">
                    <div style="margin-bottom: 2rem;">
                        <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;">
                            <i class="fas fa-check-circle" style="color: #52c41a;"></i> 已发布
                        </h3>
                        <div id="published-posts">
                            <!-- 动态加载 -->
                        </div>
                    </div>

                    <div>
                        <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;">
                            <i class="fas fa-clock" style="color: #faad14;"></i> 草稿箱
                        </h3>
                        <div id="draft-posts">
                            <!-- 动态加载 -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 移动端导航 -->
    <nav class="mobile-nav">
        <a href="#" class="mobile-nav-item active"><i class="fas fa-file-alt"></i><span>内容</span></a>
        <a href="/users.html" class="mobile-nav-item" id="mobileUserMgmt" style="display: none;"><i class="fas fa-users"></i><span>用户</span></a>
        <a href="index.html" class="mobile-nav-item"><i class="fas fa-home"></i><span>首页</span></a>
        <a href="#" id="mobileLogout" class="mobile-nav-item"><i class="fas fa-sign-out-alt"></i><span>注销</span></a>
    </nav>

    <script>
        // ==================== 全局变量 ====================
        const publishedContainer = document.getElementById('published-posts');
        const draftContainer = document.getElementById('draft-posts');
        const usernameSpan = document.getElementById('username');
        const headerUsername = document.getElementById('header-username');
        const logoutBtn = document.getElementById('logoutBtnLeft');
        const mobileLogout = document.getElementById('mobileLogout');
        
        const sidebarUserMgmt = document.getElementById('sidebarUserMgmt');
        const mobileUserMgmt = document.getElementById('mobileUserMgmt');

        const statPublished = document.getElementById('stat-published');
        const statDrafts = document.getElementById('stat-drafts');

        // 修复模式相关
        const maintenanceContainer = document.getElementById('maintenance-switch-container');
        const maintenanceToggle = document.getElementById('maintenanceToggle');
        const maintenanceStatus = document.getElementById('maintenance-status');

        let currentUserRole = null;

        // ==================== 统一消息提醒 ====================
        function showNotification(text, type = 'success') {
            // 这里可以集成更高级的 Toast，目前先用简单 alert 或控制台
            console.log(`[${type}] ${text}`);
            // alert(text); 
        }

        // ==================== 加载当前用户信息 ====================
        async function loadCurrentUser() {
            try {
                const res = await fetch('/api/user/me');
                if (!res.ok) throw new Error('获取用户失败');
                const user = await res.json();
                if (user.username) {
                    usernameSpan.textContent = user.username;
                    headerUsername.textContent = user.username;
                    currentUserRole = user.role;

                    // 控制管理功能
                    const isAdmin = user.role === 'admin' || user.role === 'superadmin';
                    if (sidebarUserMgmt) sidebarUserMgmt.style.display = isAdmin ? 'flex' : 'none';
                    if (mobileUserMgmt) mobileUserMgmt.style.display = isAdmin ? 'flex' : 'none';

                    if (isAdmin) {
                        maintenanceContainer.style.display = 'flex';
                        await loadMaintenanceStatus();
                    }
                }
            } catch (err) {
                console.error('获取用户信息失败:', err);
                usernameSpan.textContent = '未知';
            }
        }

        // ==================== 加载维护模式状态 ====================
        async function loadMaintenanceStatus() {
            try {
                const res = await fetch('/api/admin/maintenance/status');
                const data = await res.json();
                maintenanceToggle.checked = data.enabled;
                maintenanceStatus.textContent = data.enabled ? '已开启' : '已关闭';
                maintenanceStatus.style.color = data.enabled ? 'var(--admin-pink)' : 'var(--text-muted)';
            } catch (err) {
                console.error('加载维护状态失败');
            }
        }

        // ==================== 切换维护模式 ====================
        maintenanceToggle.addEventListener('change', async (e) => {
            const enable = e.target.checked;
            try {
                const res = await fetch('/api/admin/maintenance/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enable })
                });
                const data = await res.json();
                if (data.success) {
                    maintenanceStatus.textContent = enable ? '已开启' : '已关闭';
                    maintenanceStatus.style.color = enable ? 'var(--admin-pink)' : 'var(--text-muted)';
                } else {
                    maintenanceToggle.checked = !enable;
                }
            } catch (err) {
                maintenanceToggle.checked = !enable;
            }
        });

        // ==================== 加载文章列表 ====================
        async function loadPosts() {
            try {
                const response = await fetch('/api/admin/posts');
                if (!response.ok) throw new Error('加载失败');
                const posts = await response.json();

                publishedContainer.innerHTML = '';
                draftContainer.innerHTML = '';

                let pubCount = 0;
                let draftCount = 0;

                if (posts.length === 0) {
                    publishedContainer.innerHTML = '<p style="text-align:center; padding: 2rem; color: var(--text-muted);">空空如也，快去创作吧~</p>';
                }

                posts.forEach(post => {
                    const isPublished = post.is_published == 1;
                    if (isPublished) pubCount++; else draftCount++;

                    const card = `
                        <div class="post-card">
                            <div class="post-info">
                                <a href="editor.html?slug=${post.slug}" class="post-title">${post.title}</a>
                                <div class="post-meta">
                                    <span><i class="far fa-calendar-alt"></i> ${post.slug}</span>
                                    <span class="status-badge ${isPublished ? 'status-published' : 'status-draft'}">
                                        ${isPublished ? '已发布' : '草稿'}
                                    </span>
                                </div>
                            </div>
                            <div class="post-actions">
                                <a href="editor.html?slug=${post.slug}" class="action-btn btn-edit" title="编辑">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button class="action-btn btn-delete" onclick="deletePost('${post.slug}')" title="删除">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    `;

                    if (isPublished) {
                        publishedContainer.innerHTML += card;
                    } else {
                        draftContainer.innerHTML += card;
                    }
                });

                statPublished.textContent = pubCount;
                statDrafts.textContent = draftCount;

            } catch (error) {
                console.error(error);
                publishedContainer.innerHTML = '<p style="color: red;">文章列表加载失败</p>';
            }
        }

        // ==================== 删除文章 ====================
        window.deletePost = async function(slug) {
            if (!confirm(`确定要删除文章 "${slug}" 吗？此操作不可逆。`)) return;

            const formData = new FormData();
            formData.append('slug', slug);

            try {
                const response = await fetch('/api/admin/post/delete', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    loadPosts();
                } else {
                    alert('删除失败: ' + (result.error || '未知错误'));
                }
            } catch (error) {
                alert('网络错误，请稍后重试');
            }
        };

        // ==================== 注销逻辑 ====================
        async function handleLogout() {
            if (!confirm('确定要退出登录吗？')) return;
            try {
                const res = await fetch('/api/logout', { method: 'POST' });
                if (res.ok) window.location.replace('/admin/login.html');
            } catch (err) {
                alert('注销失败');
            }
        }

        logoutBtn.addEventListener('click', handleLogout);
        mobileLogout.addEventListener('click', (e) => { e.preventDefault(); handleLogout(); });

        // ==================== 新建文章气泡交互 ====================
        const newPostLink = document.getElementById('newPostLink');
        const modeBubble = document.getElementById('modeBubble');

        newPostLink.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            modeBubble.style.display = modeBubble.style.display === 'block' ? 'none' : 'block';
        });

        document.querySelectorAll('.mode-option').forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                window.location.href = `editor.html?mode=${mode}`;
            });
        });

        document.addEventListener('click', (e) => {
            if (!newPostLink.contains(e.target) && !modeBubble.contains(e.target)) {
                modeBubble.style.display = 'none';
            }
        });

        // ==================== 初始执行 ====================
        loadCurrentUser();
        loadPosts();
    </script>
</body>
</html>
