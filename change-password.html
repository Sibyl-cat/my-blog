<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <title>修改密码 · 星辰空间站</title>
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./components.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: var(--body-bg);
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        .change-password-container {
            max-width: 450px;
            width: 100%;
        }
        .change-card {
            padding: 2rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2a2a2a;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid rgba(251,114,153,0.3);
            border-radius: 30px;
            background: rgba(255,255,255,0.5);
            font-size: 1rem;
        }
        .btn {
            width: 100%;
            padding: 0.8rem;
            background: #FB7299;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #ff8aa5;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(251,114,153,0.3);
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            display: none;
            text-align: center;
        }
        .message.success {
            background: rgba(0,200,0,0.2);
            border: 1px solid #00a800;
            color: #006400;
        }
        .message.error {
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff0000;
            color: #a80000;
        }
        .back-link {
            display: block;
            margin-top: 1.5rem;
            text-align: center;
            color: #FB7299;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="blog-container">
        <!-- 二级页面组件化导航栏 -->
        <blog-navbar-secondary></blog-navbar-secondary>
        
        <!-- 全局侧边栏组件 -->
        <blog-sidebar></blog-sidebar>

        <div class="change-password-container" style="margin: 2rem auto;">
            <div class="change-card glass">
            <h2 style="color:#FB7299; margin-bottom:1rem;"><i class="fas fa-key"></i> 修改密码</h2>
            <form id="passwordForm">
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> 当前密码</label>
                    <input type="password" id="oldPassword" placeholder="请输入当前密码" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-key"></i> 新密码</label>
                    <input type="password" id="newPassword" placeholder="请输入新密码" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> 确认新密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
                </div>
                <button type="submit" class="btn">确认修改</button>
                <div id="message" class="message"></div>
                <a href="profile.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回个人主页</a>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('passwordForm');
        const oldPasswordInput = document.getElementById('oldPassword');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmInput = document.getElementById('confirmPassword');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPassword = oldPasswordInput.value;
            const newPassword = newPasswordInput.value;
            const confirm = confirmInput.value;

            if (!oldPassword || !newPassword) {
                showMessage('当前密码和新密码不能为空', 'error');
                return;
            }
            if (newPassword !== confirm) {
                showMessage('两次输入的新密码不一致', 'error');
                return;
            }
            if (newPassword.length < 6) {
                showMessage('新密码长度至少6位', 'error');
                return;
            }

            try {
                const res = await fetch('/api/user/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        oldPassword,
                        newPassword
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage('密码修改成功！请重新登录', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin/login.html';
                    }, 2000);
                } else {
                    showMessage(data.error || '修改失败', 'error');
                }
            } catch (err) {
                showMessage('网络错误', 'error');
            }
        });
    </script>
        </div>
    </div>
</body>
</html>
